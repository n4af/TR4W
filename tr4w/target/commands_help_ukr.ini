DESCRIPTION=Якщо встановити параметр у FALSE, всі звукові сигнали, згенеровані програмою, на динаміці комп'ютера будуть заблоковані.
ALIAS=ДОЗВОЛИТИ ЗВУКОВИЙ СИГНАЛ 

