DEFAULT=164 
DESCRIPTION=Цей параметр дозволяє обмежити кількість спотів, які відображатимуть карту діапазону. Вище межі споти, що відображаються, будуть зосереджені на робочій частоті. Значення має бути парним числом від 30 до 1000. 
ALIAS=

[BAND MAP DUPE DISPLAY] 
DEFAULT=TRUE 
DESCRIPTION=Параметр визначає, чи показувати раніше спрацьовані кореспонденти на карті діапазону (TRUE) чи ні (FALSE). 
ALIAS=ВІДБИРАТИ ПОВТОРИ НА КАРТІ ДІАПАЗОНУ 

[BAND MAP ENABLE] 
DEFAULT=FALSE 
DESCRIPTION=Команда визначає, чи відображається карта діапазонів. Якщо ви запустили TR4W з відключеною картою діапазонів, потрібно перезапустити програму для того, щоб увімкнути відповідний відеорежим. 
ALIAS=УВІМКНИТИ КАРТУ ДІАПАЗОНУ 

[BAND MAP GUARD BAND] 
DEFAULT=200 
DESCRIPTION=Карта діапазонів вкаже, блимаючи, що частота вашого зв'язаного за допомогою інтерфейсу трансівера близька до запису на карті діапазону. Налаштування параметра дозволяє коригувати, наскільки мають бути близькі частоти трансівера і записи на карті діапазону, щоб викликати миготіння. 
ALIAS=ДІАПАЗОН ЗАХОПЛЕННЯ КАРТИ ДІАПАЗОНУ 

[BAND MAP ITEM HEIGHT] 
DEFAULT=17 
DESCRIPTION=Висота комірки у вікні картки діапазону (у пікселях). ALIAS=ВИСОТА осередку у вікні карти Діапазону 

[BAND MAP ITEM WIDTH] 
DEFAULT=139 
DESCRIPTION=Ширина комірки у вікні карти діапазону (у пікселях). ALIAS=ШИРИНА КОМІРКИ У ВІКНЕ КАРТИ ДІАПАЗОНУ 

[BAND MAP MULTS ONLY] 
DEFAULT=FALSE 
DESCRIPTION=ВІДБИРАТИ В КАРТІ ДІАПАЗОНУ ТІЛЬКИ МНОЖНИКІ 
ALIAS=ВІДБИРАТИ В КАРТІ ДІАПАЗОНУ ТІЛЬКИ МНОЖНИКІ 

[BAND MAP SPLIT MODE] 
DEFAULT=BY CUTOFF FREQ 
DESCRIPTION=Команда дозволяє точніше визначити вид модуляції під час роботи з рознесенням частот. Запропоновано два варіанти: встановлювати CW/PHONE за значенням BAND MAP CUTOFF FREQUENCY або вважати, що спліт завжди працюємо PHONE. 
ALIAS=ВИЗНАЧЕННЯ ВИДУ МОДУЛЯЦІЇ ПРИ РОБОТІ З РІЗНОМ ЧАСТОТ 

[BAND] 
DEFAULT=160 
DESCRIPTION=Якщо трансівер не пов'язаний інтерфейсом з комп'ютером, можна вибрати, який діапазон увімкне програма при запуску. Після запуску програми використовуйте Alt-B або Alt-V, щоб вибрати потрібний діапазон. Деякі змагання, які відбуваються лише на одному діапазоні, не дозволять вам змінювати діапазони після того, як хоча б одне QSO було зроблено (див. MULTIPLE BANDS). 
ALIAS=ДІАПАЗОН 

[BEEP ENABLE] 
