DESCRIPTION=Якщо встановити параметр у TRUE, то при використанні мережі всі дані, що надходять з TNC, передаються всім комп'ютерам у мережі, тому вони можуть переглядатися командою Control+B. Команди також можуть бути передані з будь-якого комп'ютера мережі на TNC. Зверніть увагу, що дані не будуть передані, доки не натиснуто клавішу ENTER. 
ALIAS=РЕТРАНСЛЮВАТИ ВСЕ ДАНІ ПАКЕТУ 

[CALL WINDOW SHOW ALL SPOTS]
DEFAULT=FALSE
DESCRIPTION=При значенні параметра TRUE у режимі пошуку всі позивні будуть з'являтися у вікні введення позивного при перебудові діапазону, навіть якщо вони не відображені на карті діапазону. Наприклад, якщо BAND MAP DUPE DISPLAY=FALSE, то повтори не показані на карті діапазону, але вони будуть відображатися у вікні введення позивного.
ALIAS=ПОКАЗАТИ ВСЕ 

