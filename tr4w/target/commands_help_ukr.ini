[WK KEYER COMPENSATION]
DEFAULT=0
DESCRIPTION= Значення: ціле число від (0 до 250) * 1 мсек. Компенсація ключа дозволяє додати фіксовану величину до довжини всіх точок та тире. Використання QSK на сучасних трансіверах може призвести до скорочення елементів dit і dah, що особливо помітно на високих швидкостях. Winkeyer2 дозволяє рівномірно збільшувати довжину елементів dit та dah, щоб компенсувати це. Налаштування виконуються з кроком в одну мілісекунду. Максимальне регулювання становить 250 мсек. Компенсація клавіш дуже схожа на зважування в тому сенсі, що будь-які коригування, додані до точок і точок, віднімаються з інтервалу, тому швидкість не змінюється. Різниця між зважуванням і компенсацією полягає в тому, що компенсація не залежить від швидкості, тому якщо вибрано 10 мс ключової компенсації, завжди буде додаватися 10 мсек, незалежно від швидкості.
