[ADD DOMESTIC COUNTRY]
DEFAULT=NONE
DESCRIPTION=Ідентифікатор країни. Коли програма обробляє деякі країни як внутрішні множники, а решту країн інакше, ви можете додавати країни до оброблюваних для внутрішніх множників. Зазвичай цей список уже встановлений параметром CONTEST, але за допомогою цієї команди можна додати стільки країн до списку, скільки захочете. Ви можете очистити заданий за замовчуванням список за допомогою ADD DOMESTIC COUNTRY=CLEAR, а потім додати значення. Переконайтеся, що ідентифікатор країни, яку ви додаєте, відповідав тому, що є у файлі CTY.DAT. 
ALIAS=ДОДАТИ ВНУТРІШНЮ КРАЇНУ  

[ALL CW MESSAGES CHAINABLE]
DEFAULT=FALSE
DESCRIPTION=Зазвичай, коли ви натискаєте функціональну клавішу CW повідомлення в той час, коли передається інше повідомлення, попереднє повідомлення буде перервано і розпочато нове. Однак якщо встановити цей параметр у TRUE, то нове повідомлення не буде починатися, доки старе не передано повністю. Ви також можете встановити цю функцію тільки для вибраних CW повідомлень, поміщаючи Control-D на початку тексту. 
ALIAS=ВСЕ CW ПОВІДОМЛЕННЯ НАСЛІДНІ  

[ALLOW AUTO UPDATE]
DEFAULT=TRUE
DESCRIPTION=Після редагування будь-якого зв'язку під час роботи в мережі інформація про відредагований зв'язок буде надіслана всім клієнтським програмам TR4W. Кожна клієнтська програма знайде цей зв'язок у своєму лозі за унікальним ідентифікатором та замінить його відредагованим зв'язком. При значенні команди ALLOW AUTO UPDATE рівному TRUE після заміни зв'язку буде виконано операцію RESCORE для коректного відображення повторів, окулярів та множників з урахуванням змін. При значенні, що дорівнює FALSE, зроблені зміни будуть актуальними при ручному виклику пункту меню Commands -> Rescore. 
ALIAS=ДОЗВОЛИТИ АВТО ОБНОВЛЕННЯ 

[ALT-D BUFFER ENABLE]
DEFAULT=FALSE
DESCRIPTION=Функция не реализована.
ALIAS=ВИКОРИСТУВАТИ БУФФЕР ALT-D

[ALWAYS CALL BLIND CQ]
DEFAULT=FALSE
DESCRIPTION=Ця функція додана спеціально для роботи у змаганнях типу СПРИНТ у режимі «2 радіо». У цьому випадку часто зустрічається ситуація, коли потрібно передавати загальний виклик на другому радіо в той час, поки на першому йде прийом номера станції, якою ви залишите частоту. Зазвичай це робиться клавішами F7 або F8, які за промовчанням передають CQ на неактивному радіо. Якщо встановити ALWAYS CALL BLIND CQ=TRUE, то передача CQ (а точніше повідомлення з Exchange memory F7) розпочнеться автоматично після надсилання повідомлення CQ EXCHANGE. Зверніть увагу, що в цьому випадку вам доведеться встигнути вчасно знайти частоту для передачі загального виклику. 
ALIAS=АВТОМАТИЧНО ПЕРЕДАВАТИ CQ У СПРИНТІ  

[ASK FOR FREQUENCIES] 
DEFAULT=FALSE 
DESCRIPTION=Якщо ви використовуєте карту діапазону, але не маєте пов'язаного за допомогою інтерфейсу трансівера, то програма зазвичай запитуватиме частоти станцій, для яких ви робите перевірку на повтор. Такі запити можна вимкнути встановленням цього параметра у FALSE. ALIAS=ПИТАННЯ ЧАСТОТИ 

[AUTO CALL TERMINATE] 
DEFAULT=FALSE 
DESCRIPTION=Коли цей перемикач встановлений у TRUE, і ви перебуваєте в режимі CW, програма може автоматично завершувати введення позивного, яке ви набираєте у відповідь на CQ. За командами START SENDING NOW KEY або AUTO SEND CHARACTER COUNT програма зрозуміє, що позивний повністю переданий, тільки коли всі символи, введені у вікно позивні, були передані. Наприклад, відповів 4U1ITU. Можна запустити передачу вручну - якщо після введення 4U1I натисніть клавішу START SENDING NOW KEY, програма почне передавати 4U1I. Якщо ви ввели новий символ, перш ніж закінчилася передача 4U1I, цей символ також буде переданий. Коли набір нових символів буде завершено, автоматично продовжиться передача CQ EXCHANGE. 
ALIAS=АВТОМАТИЧНЕ ЗАВЕРШЕННЯ ВВЕДЕННЯ ПОЗИВНОГО 

[AUTO DISPLAY DUPE QSO] 
DEFAULT=FALSE 
DESCRIPTION=Коли параметр встановлено в TRUE і вводиться повторне QSO в режимі CQ, програма автоматично покаже рядки з лога про попередні QSO з цією станцією. 
ALIAS=АВТОВІДОБРАЖЕННЯ ПОВТОРНИХ QSO 

[AUTO DUPE ENABLE CQ] 
DEFAULT=TRUE 
DESCRIPTION=Коли ви перебуваєте в режимі CQ і цей перемикач має значення TRUE, то раніше спрацьований кореспондент, який вас знову викликає, буде передано замість контрольного номера повідомлення QSO BEFORE MESSAGE. Якщо перемикач має значення FALSE, то буде здійснено нормальний обмін і QSO буде зареєстровано з нулем очок за QSO. Значення за промовчанням TRUE. Зручно встановити значення FALSE під час введення лога вручну після змагань. 
ALIAS=ПОВТОРНІ QSO ДОПУСКАЮТЬСЯ В РЕЖИМІ CQ 

[AUTO DUPE ENABLE S AND P] 
DEFAULT=TRUE 
DESCRIPTION=Якщо цей перемикач має значення TRUE, то коли в режимі пошуку спробуєте викликати клавішею ENTER раніше спрацьованого кореспондента, програма не передаватиме виклик. Ви можете встановити FALSE у змаганнях подібних до Internet Sprint, де доводиться часто викликати ту саму станцію в різний час. 
ALIAS=ПОВТОРНІ QSO ДОПУСКАЮТЬСЯ В РЕЖИМІ ПОШУКУ 

[AUTO QSL INTERVAL] 
DEFAULT=0 
DESCRIPTION=Значення: будь-яке ціле число N. Зазвичай, коли ви натискаєте клавішу ENTER, щоб зареєструвати QSO, то буде надіслано повідомлення QSL MESSAGE. Команда AUTO QSL INTERVAL може використовуватися, щоб замість довгого QSL MESSAGE передати короткий QUICK QSL MESSAGE, і лише через N разів QSL MESSAGE. Ця команда зазвичай використовується у великому pile-up. Якщо ви встановлюєте AUTO QSL INTERVAL=3, то QUICK QSL MESSAGE передаватиметься, кожне третє QSO. Значення нуль відключає цю особливість, і QSL MESSAGE передається щоразу. 
ALIAS=ІНТЕРВАЛИ АВТО QSL ПОВІДОМЛЕНЬ 

[AUTO QSO NUMBER DECREMENT] 
DEFAULT=TRUE 
DESCRIPTION=Коли цей параметр має значення TRUE, то незалежно від режиму пошуку або загального виклику при порожньому полі прийнятного позивного натискання будь-якої функціональної клавіші із записаним номером, що передається (#), зменшує останній на одиницю. Функція корисна, якщо кореспондент перепитує надісланий номер, а зв'язок вже записано в журнал. 
ALIAS=АВТОЗМЕНШЕННЯ НОМЕРУ QSO 

[AUTO RETURN TO CQ MODE] 
DEFAULT=TRUE 
DESCRIPTION=Коли цей параметр має значення TRUE і в режимі пошуку при порожніх полях позивного та обміну натиснута клавіша ENTER, програма автоматично переходить в режим CQ. 
ALIAS=АВТОПОВЕРНЕННЯ В РЕЖИМ CQ 

[AUTO S&P ENABLE SENSITIVITY] 
DEFAULT=500 
DESCRIPTION=Команда визначає, як швидко ви повинні крутити валкодер трансівера, щоб програма автоматично переключилася в режим пошуку, за умови, що значення команди AUTO SP ENABLE дорівнює TRUE. 
ALIAS=ЧУТНІСТЬ ПЕРЕМИКАННЯ У РЕЖИМ ПОШУКУ 

[AUTO S&P ENABLE] 
DEFAULT=FALSE 
DESCRIPTION=Коли цей параметр має значення TRUE, програма автоматично перейде в режим пошуку, якщо виявиться, що частота налаштування змінилася більше ніж на один кілогерц за секунду. 
ALIAS=АВТОВИХІД З РЕЖИМУ CQ У РЕЖИМ ПОШУКУ 

[AUTO SEND CHARACTER COUNT] 
DEFAULT=0 
DESCRIPTION=Програма може починати передавати позивну станцію, що відповідає на ваш CQ, після того, як деяке число символів (від 0 до 6) введено у вікно позивного. Наприклад, якщо у файлі tr4w.ini встановлено AUTO SEND CHARACTER COUNT=3, і вас викликає 4U1ITU, то програма почне передати позивний після того, як набрано символи 4U1. Якщо параметр AUTO CALL TERMINATE=TRUE, програма передасть повідомлення CQ EXCHANGE. Коли значення AUTO SEND CHARACTER COUNT не дорівнює 0, вище вікна позивного з'явиться стрілка, яка вказує, з якого символу почнеться CW передача. Ви можете вимкнути цю функцію командою Alt - (рисочка). Стрілка зникне. Щоб розв'язати цей режим, натисніть клавішу Alt і стрілка знову з'явиться. ALIAS=АВТО ПЕРЕДАЧА ПІСЛЯ ВВЕДЕННЯ ВИЗНАЧЕНОГО ЧИСЛА СИМВОЛОВ 

[AUTO TIME INCREMENT] 
DEFAULT=0 
DESCRIPTION=Якщо ви вводите звіт вручну, функція AUTO TIME INCREMENT може бути дуже корисною. Установка не нульового значення n призведе до того, що час збільшуватиметься на одну хвилину після кожних зв'язків n. Нульове значення вимикає функцію. 
ALIAS=АВТОМАТИЧНЕ ЗБІЛЬШЕННЯ ЧАСУ 

[AUTO-CQ DELAY TIME] 
DEFAULT=3000 
DESCRIPTION=Тривалість паузи (мілісекунд) між повтореннями повідомлення в режим Auto-CQ. Значення та функціональна клавіша, в яку записано необхідне повідомлення, встановлюються у вікні Alt+Q. Повторення режиму Auto-CQ після запису зв'язку журнал виконується командою Alt+C. У процесі роботи режиму Auto-CQ величину тривалості паузи можна змінювати кнопками PageUp та PageDown. 
ALIAS=ЧАС ПОТВОРЕННЯ ЗАГАЛЬНОГО ВИКЛИКУ 

[BAND MAP ALL BANDS] 
DEFAULT=FALSE 
DESCRIPTION=При встановленому значення TRUE на карті діапазону відображаються записи для всіх діапазонів. Якщо FALSE, то на карті показані позивні лише вибраного діапазону. 
ALIAS=НА КАРТІ ДІАПАЗОНУ ПОКАЗАНІ ВСЕ ДІАПАЗОНИ 

[BAND MAP ALL MODES] 
DEFAULT=FALSE 
DESCRIPTION=При встановленому TRUE на карті діапазону відображаються записи для всіх режимів (CW та SSB). Якщо FALSE, то будуть відображені лише записи з поточним видом модуляції. 
ALIAS=НА КАРТІ ДІАПАЗОНУ ПОКАЗАНІ ВСЕ РЕЖИМИ

[BAND MAP CALL WINDOW ENABLE] 
DEFAULT=TRUE 
DESCRIPTION=При встановленому значенні TRUE та роботі на пошук, як тільки ви налаштуєтеся на частоту, про яку є запис у карті діапазону, то позивний та інформація контрольного номера станції буде поміщена у вікно позивного. Це дозволяє відновлювати запис, просто натискаючи клавішу "пробіл". Інформація обміну допомагає швидко ідентифікувати станцію. Якщо без натискання клавіші "пробіл" почати вводити новий позивний, вікно позивного спочатку буде очищено. 
ALIAS=ДОЗВОЛЯЄТЬСЯ АВТО ВСТАВКА З КАРТИ ДІАПАЗОНУ 

[BAND MAP CUTOFF FREQUENCY] 
DEFAULT=0 
DESCRIPTION= Дозволяє змінювати для кожного діапазону частоту, нижче за яку передбачається режим CW, а вище - SSB. Коли ви вводите частоту (Гц), TR4W автоматично визначає діапазон, для якого ви визначаєте нову частоту зрізу. Щоб визначити нові частоти зрізу для декількох діапазонів, просто увімкніть команду стільки разів, скільки необхідно у файлі * .CFG, по одному разу для кожної частоти зрізу. 
ALIAS=

[BAND MAP DECAY TIME] 
DEFAULT=60 
DESCRIPTION=Кількість хвилин, через які запис на карті діапазону остаточно згасне. 
ALIAS=ЧАС ЖИТТЯ ЗАПИСУ НА КАРТІ ДІАПАЗОНУ 

[BAND MAP DISPLAY CQ] 
DEFAULT=TRUE 
DESCRIPTION=Команда визначає, чи відображатиметься на карті діапазону частоти загального виклику. 
ALIAS=ВІДБИРАТИ НА КАРТІ ДІАПАЗОНУ ЧАСТОТИ CQ 

