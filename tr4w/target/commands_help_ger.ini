[RADIO TCP SERVER PORT]
DEFAULT=52002
DESCRIPTION=Dies ist der Port, auf dem TR4W hoert um mit der Station zu kommunizieren. This is the port that TR4W listens for input to interact with the radio it is controlling. Implementiert ist das DXLab Commander Protokoll, sodass ANDERE Programme das von TR4W genutzte Geraet verwenden koennen. Zu beachten ist, dass dieses Protokoll TR4W NICHT ermoeglicht das Geraet mit dem DXLab's Commander zu steuern. Dies ist hauptsaechlich fuer eingehende Verbindungen, die es WSJT-X ermoeglicht das TR4W Geraet zu steuern.

[RADIO ONE CW BY CAT]
DEFAULT=FALSE
DESCRIPTION=Wird dies vom Geraet unterstuetzt, nutzt es die CAT-Kommandos zur Sendung von CW anstelle von RTS oder WinKeyer. Geraete die dies unterstuetzen sind Elecraft K3/KX3 und Icom 9100, 7700, 7800, 7850, 7851. Sie koennen im Benutzerhandbuch des Geraets unter CI-V Kommandos nach dem Kommando 17 suchen. Gibt es dieses Kommando, dann unterstuetzt das Geraet dieses Feature. YAESU unterstuetzt dieses Feature NICHT.
[RADIO ONE CW SPEED SYNC]
DEFAULT=FALSE
DESCRIPTION=When the CW speed is adjusted in the program, this sends a CAT command to the attached radio to change the speed of the internal keyer. As this goes with the CW BY CAT command, this is only implemented for Elecraft and Icom radios.

[RADIO ONE FT1000MP CW REVERSE]
DEFAULT=FALSE
DESCRIPTION=Haben Sie ein Yaesu FT100, FT817, FT847, FT857, FT897, FT920 or FT1000MP mit dem Computer verbunden, bestimmt dieser Parameter, ob das Geraet den Normalmodus oder Reversemodus fuer CW benutzt (FALSE=CW, TRUE = CW(R).

[RADIO ONE ICOM FILTER BYTE]
DEFAULT=2
