[RADIUS OF EARTH]
DEFAULT=0.00
DESCRIPTION=Wert:Beliebige Zahl. Dieser Parameter kann an Stelle des internen Wertes fuer die Berechnung des Erdradius genoomen werden, der fuer die Entfernungs berechnung benutzt wird. Der neue Radius ist in Kilometern anzugeben. Steht der Wert auf 0, nimmt TR4W den interne Wert(6378.1370 km3).

[RANDOM CQ MODE]
DEFAULT=FALSE
DESCRIPTION=Ist dieser Parameter TRUE, verhaelt sich die Auto-CQ Funktion anders wenn CQ MEMORY F1 gewaehlt wird. Anstatt die fuer F1 gespeicherte Auto-CQ Sequenz auszugeben, werden nach dem Zufallsprinzip die Sequenzen zwischen F1 und F4 genommen. Leere Messages von F1 bis F4 werden ignoriert.

[RATE DISPLAY]
DEFAULT=QSOS
DESCRIPTION=Wert: QSOS oder QSO POINTS. Die Anzeige der Raten zeigt die Rate der gefahrenen QSO oder die Rate wie die QSO-Punkte steigen.

[RELAY CONTROL PORT]
DEFAULT=NONE
DESCRIPTION=

[REMAINING MULT DISPLAY MODE]
DEFAULT=HILIGHT
DESCRIPTION=Wert: NONE, ERASE, HILIGHT. Dieses Kommando erlaubt die Festlegung wie mit den verbleibenen Multipliern verfahren werden soll. Ist NONE aktiv, werden keine restlichen Multiplier angezeigt. Ist ERASE aktiv, werden die Multiplier aus der Liste entfernt wenn sie gearbeitet wurden. Ist HILIGHT aktiv, werden noch nicht gearbeitete Multiplier hervorgehoben angezeigt. 

[REMINDER]
DEFAULT=
DESCRIPTION=Wiedervorlagen sind Nachrichten, die programmiert sind zu bestimmten Zeiten oder zu besonderen Anlaessen angezeigt werden.

[ROTATOR PORT]
DEFAULT=NONE
DESCRIPTION=Wert: SERIAL 1 bis SERIAL 6. Dieses Kommando wird zur Auswahl eines seriellen Ports, ueber den Kommandos zur Rotorsteuerung gesendet werden (wird gesetzt mit dem Kommando ROTATOR TYPE). Mit dem Ctrl-P Kommando wird dem Rotor die Richtung des im Rufzeichenfenster angezeigten Landes gesendet.  

[ROTATOR TYPE]
DEFAULT=NONE
DESCRIPTION=Wert: DCU1, ORION oder YAESU. Setzt den Rotortyp.

[ROW COUNT]
DEFAULT=5
DESCRIPTION=Anzahl der im Hauptfenster angezeigten Logzeilen.

[SAY HI ENABLE]
DEFAULT=FALSE
DESCRIPTION=Sind CW-Messages programmiert, die Namen aus der TRMASTER Datei enthalten, bestimmt das Kommando SAY HI ENABLE If wie die Namen tatsaechlich angewandt werden. Das erlaubt die Programmierung vom Messages, welche Namen enthalten, aber sie zu deaktivieren ohne vorher die Message zu bearbeiten.

[SAY HI RATE CUTOFF]
DEFAULT=200
DESCRIPTION=Steht SAY HI ENABLE auf TRUE, stoppt TR4W die Begruessung der anderen Station, wenn die Senderate den Wert von SAY HI RATE CUTOFF uebersteigt. 

[SCORE POSTING URL]
DEFAULT=http://post.contestonlinescore.com/
DESCRIPTION=

[SCORE READING URL]
DEFAULT=https://contestonlinescore.com/scoreboard/
DESCRIPTION=

[SCP COUNTRY STRING]
DEFAULT=NONE
DESCRIPTION=Wert: Komma-separierte Liste von Laender-Prefixen. Dieses Kommando erlaubt die Begrenzung der Anzeige von Stationen durch die Super Check Partial Funktion. Die Eingabe einer Komma-separierten Liste mit Laenderprefixen (z.B.., K, VE, KL7, KH6, KP2, KP4) werden nur die Stationen aus dieser Liste angezeigt, wenn ein Super Check Partial durchgefuehrt wird. Standardmaessig werden Stationen aus allen Laendern angezeigt. Setzt man ein ! oder ein  - vor die Eintraege in der Liste, dann werden nur nicht in der Liste enthaltene Laender beim Super Check Partial angezeigt.

[SCP MINIMUM LETTERS]
DEFAULT=0
DESCRIPTION=Wert: 0, 3, 4, oder 5. Steht dieser Parameter auf nicht-null, wird automatisch der Super Check Partial aktiviert. Wird die Anzahl der Zeichen festgelegt, werden Partial Calls automatisch angezeigt. Fuer die Funktionalitaet muss das Programm auf eine TRMASTER.DTA zugreifen koennen.

[SEND COMPLETE FOUR LETTER CALL]
DEFAULT=FALSE
DESCRIPTION=Das } Zeichen in einer CW-Message sendet den Prefix oder den Suffix eines korrigierten Calls. Steht dieser Parameter auf TRUE, wird das komplette Call gesendet, wenn nur vier Zeichen lang ist.

[SERIAL PORT DEBUG]
DEFAULT=FALSE
DESCRIPTION=

[SERVER ADDRESS]
DEFAULT=LOCALHOST
DESCRIPTION=Name oder IP Adresse des Computers auf dem TR4WSERVER laeuft. 

[SERVER PASSWORD]
DEFAULT=TR4WSERVER
DESCRIPTION=Wert: 10 Zeichen langer String. Passwort fuer die Verbindung zum TR4WSERVER.

[SERVER PORT]
DEFAULT=1061
DESCRIPTION=Ethernet-Port ueber den die Verbindung zum TR4WSERVER laeuft.

[SHIFT KEY ENABLE]
DEFAULT=TRUE
DESCRIPTION=Mit den Shift-Tasten koennen die RIT und die Frequenz von Kenwood und einigen Yaesu Geraeten justiert werden. Steht der Parameter auf FALSE, ist das Feature deaktiviert.

[SHORT 0]
DEFAULT=T
DESCRIPTION=Wert: Beliebiges Zeichen. Bestimmt das Zeichen, das anstatt der 0 in einer QSO-Nummer gesendet wird, wenn SHORT INTEGERS auf TRUE steht.

[SHORT 1]
DEFAULT=A
DESCRIPTION=Wert:Beliebiges Zeichen. Bestimmt das Zeichen, das anstatt der 1 in einer QSO-Nummer gesendet wird, wenn SHORT INTEGERS auf TRUE steht.  

[SHORT 2]
DEFAULT=2
DESCRIPTION=Wert:Beliebiges Zeichen. Bestimmt das Zeichen, das anstatt der 2 in einer QSO-Nummer gesendet wird, wenn SHORT INTEGERS auf TRUE steht.

[SHORT 9]
DEFAULT=N
DESCRIPTION=Wert:Beliebiges Zeichen. Bestimmt das Zeichen, das anstatt der 9 in einer QSO-Nummer gesendet wird, wenn SHORT INTEGERS auf TRUE steht.  

[SHORT INTEGERS]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, erlaubt TR4W die Abkuerzungen von Ziffern, wenn sie als Teil der QSO-Nummer gegeben werden. Mit Alt-P oder SHORT 0, SHORT 1, SHORT 2, and SHORT 9 koennen Abkuerzungen programmiert werden.

[SHOW DOMESTIC MULTIPLIER NAME]
DEFAULT=FALSE
DESCRIPTION=

[SHOW FREQUENCY IN LOG]
DEFAULT=TRUE 
DESCRIPTION=Steht dieser Wert auf TRUE, wird im Cabrillo Log die aktuelle QSO-Frequenz ersetzt. 

[SHOW GRIDLINES]
DEFAULT=FALSE
DESCRIPTION=

[SHOW TYPED CALLSIGN]
DEFAULT=TRUE
DESCRIPTION=Steht der Wert auf TRUE, wird das im Eingabefeld eingegebene Call im "Netzwerk"-Fenster angezeigt.


[SINGLE BAND SCORE]
DEFAULT=All
DESCRIPTION=Mit diesem Kommando kann man erzwingen, dass die Punkteberechnung nur fuer QSOs eines bestimmten Bandes erfolgt. Wird die Einstellung von SINGLE BAND SCORE waehrend eines Contests geaendert, muss vor dem Neustart von TR4W die *.RST Datei geloescht werden.

[SINGLE RADIO MODE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, wechselt TR4W mit dem Alt-R Kommando nicht die Stationen. 

[SKIP ACTIVE BAND]
DEFAULT=FALSE
DESCRIPTION=Werden zwei Geraete eingesetzt und SKIP ACTIVE BAND ist TRUE, schaltet TR4W auf das Band des zweiten Geraetes, wenn Alt-B oder Alt-V ausgefuehrt wird. 

[SLASH MARK CHAR]
DEFAULT=/
DESCRIPTION=Wert: Jedes Zeichen. Will man eine andere Taste fuer / belegen, dann kann dieses Kommando benutzt werden. Das ist fuer einige europaeischen Tastaturen bequemer.

[SPACE BAR DUPE CHECK ENABLE]
DEFAULT=TRUE
DESCRIPTION=Drueckt man die <Leertaste> wenn ein Call im Eingabefenster ist, macht TR4W automatisch einen Dupecheck. Steht kein Call im Eingabefenster und man drueckt die <Leertaste>, dann geht das Programm in den S&P-Modus und sendet das eigene Call. Ist SPACE BAR DUPE CHECK ENABLE auf FALSE, wird immer in den S&P-Modus geschaltet und das eigene Call gesendet, selbst wenn das Eingabefenster nicht leer ist.

[SPRINT QSY RULE]
DEFAULT=FALSE
DESCRIPTION=Steht der Parameter auf TRUE, wechselt TR4W automatisch in den CQ-Mode, nach Beendigung eines QSO im S&P-Modus. Wird ein Sprint Contest ausgewaehlt, dann steht dieser Parameter automatisch auf TRUE. Mehr Informationen ueber Sprint-Conteste sind im Abschnitt 6.18.1 zu finden. Dieser Parameter sollte nur im Sprintcontest auf TRUE gesetzt werden. Fuer aehnliche (aber nicht komplett identische) Verhaltensqeisen in anderen Contesten siehe AUTO S&P ENABLE Kommando.

[START SENDING NOW KEY]
DEFAULT=?'? (Hochkomma, nicht Apostroph)
DESCRIPTION=Wert: Beliebige Taste. Arbeitet man Stationen in CW und ein Anrufer hat bereits sein Call gesendet und man hat die Eingabe seines Calls noch nicht abgeschlossen, kann man die START SENDING NOW KEY Taste druecken. Dadurch werden die schon eingegebenen Zeichen gesendet und auch die nach dem Druecken der Taste bis <Enter> gedrueckt wird.  Man kann START SENDING NOW KEY auf die <Leertaste> legen mit dem Kommando START SENDING NOW KEY = SPACE, wenn der Cursor im Eingabefeld steht und wenn bisher hoechstens ein Zeichen eingegeben wurde.

[STATIONS CALLSIGNS MASK]
DEFAULT=NONE
DESCRIPTION=

[STEREO CONTROL PIN]
DEFAULT=9
DESCRIPTION=Wert: 5 oder 9. Dieses Kommando legt die Pin-Nummer fest, die fuer die Stereoansteuerung benoetigt wird mit STEREO CONTROL PORT. Verwendet man Port 5, dann kann dieser Port nicht mehr fuer DVK benutzt werden.; wird Port 9 verwendet, dann kann dieser Port nicht mehr fuer die Bandausgabe verwendet werden.

[STEREO CONTROL PORT]
DEFAULT=NONE
DESCRIPTION=

[STEREO PIN HIGH]
DEFAULT=FALSE
DESCRIPTION=Dieses Kommando setzt den Status des STEREO CONTROL PIN mit dem STEREO CONTROL PORT. Dieser Wert kann mit der Funktion TOGGLESTEREOPIN getauscht werden.

[SWAP PACKET SPOT RADIOS]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, entscheidet TR4W welches Geraet einen Packet Spot bekommt, wenn Ctrl-U und die linke/rechte Cursor-Taste benutzt wird. Dies ist sinnvoll, wenn das Geraet als Station 2 konfiguriert ist und auf der linken Seite steht.  

[SWAP PADDLES]
DEFAULT=FALSE
DESCRIPTION=Dieser Parameter tauscht die dit/dah Eingaben auf dem Paddle-Port. Dies ist schoen, wenn das Paddle verkehrt verdrahtet ist.

[SWAP RADIO RELAY SENSE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, tauscht TR4W die Relais-Polaritaet zur Steuerung des Geraetes.

[TAIL END KEY]
DEFAULT=]
DESCRIPTION=Wert: Beliebige Taste.  Das TAIL END KEY Kommando erlaubt es bei Beendigung eines QSO im CQ Mode schon Anrufe zu erwidern. 
[TELNET SERVER]
DEFAULT=sk3w.se:8000
DESCRIPTION=Adresse des voreingestellten DX-Clusters.

[TEN MINUTE RULE]
DEFAULT=NONE
DESCRIPTION=Wert: NONE oder TIME OF FIRST QSO. Dieser Parameter waehlt das Verfahren fuer die zehn Minuten Regel. Der TIME OF FIRST QSO Mode berechnet die vergangangene Zeit ab dem ersten QSO auf dem aktiven Band und zeigt sie an.

[TUNE ALT-D ENABLE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, dann zeigt sich das folgende Verhalten: ist man im CQ Mode am aktiven Geraet und an der inaktiven Station ueber das Band dreht, werden Calls aus der Bandmap (wenn es keine Dupes sind) automatisch uebernommen und koennen dann mit dem Alt-D Kommando gearbeitet werden. Dadurch entfaellt die Eingabe des Calls per Hand.

[TUNE WITH DITS]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, sendet TR4w eine Reihe von dits mit 75 WPM, wenn Ctrl-Left-Shift gedrueckt wird.

[TWO RADIO MODE]
DEFAULT=FALSE
DESCRIPTION=Wert: TRUE oder FALSE. Steht dieser Parameter auf TRUE, ist TR4W im SO2R Modus. Siehe Sektion

[UDP BROADCAST APP INFO]
DEFAULT=FALSE
DESCRIPTION=Wenn TRUE, sendet TR4W ein XML Broadcast mit den Informationen zum Programm an alle verbundenen Programme. Dies ist kompatibel mit dem N1MM Format UDP Broadcast, so dass Programme wie Qsorder, ClubPi und N1MM to DXKeeper Gateway diese Funktion nutzen koennen.

[UDP BROADCAST CONTACT INFO]
DEFAULT=FALSE
DESCRIPTION=Wenn TRUE, sendet TR4W ein XML Broadcast mit den Informationen zum Programm an alle verbundenen Programme. Dies ist kompatibel mit dem N1MM Format UDP Broadcast, so dass Programme wie Qsorder, ClubPi und N1MM to DXKeeper Gateway diese Funktion nutzen koennen.

[UDP BROADCAST RADIO INFO]
DEFAULT=FALSE
DESCRIPTION=Wenn TRUE, sendet TR4W immer dann ein XML Broadcast wenn die Station die Frequenz aendert. Die ist kompatibel mit N1MM Broadcast. Damit koennen Programme wie 2Tone und Geraete die diese Daten abhoeren (z.B. Palstar's HF-Auto) diese Daten verarbeiten.

[UDP BROADCAST ROTOR]
DEFAULT=FALSE
DESCRIPTION=Wenn TRUE, sendet TR4W ein XML Broadcast zum Drehen eines Rotors, der durch ein externes Rotorkontrollprogramm wie N1MM Rotator Control oder PstRotatorof gesteuert wird. Die Broadcast wird ueber den Rotorport (Standard=12040) gesendet.

[UDP BROADCAST PORT]
DEFAULT=12060
DESCRIPTION=Der UDP Broadcast Port ueber den alle Daten gesendet werden (ausser Rotor Informationen).

[UDP BROADCAST ROTOR PORT]
DEFAULT=12040
DESCRIPTION=Der UDP Broadcast Port ueber den alle Messages zur Rotorkontrolle gesendet werden. 

[UDP BROADCAST ADDRESS]
DEFAULT=127.0.0.1
DESCRIPTION=Die IPv4 Adresse an die alle UDP Messages gesendet werden. ueber 127.0.0.1 werden die Daten an den lokalen Computer gesendet. Ist ein Geraet in einem anderen Netz, sollte eine IP-Adresse mit 255 am Ende benutzt werden. Beispiel: Hat der Log Computer die IP Adresse 192.168.1.10, dann wuerde die Broadcast an alle Geraete im Subnetz geschickt werden. 

[UDP BROADCAST ALL QSOS]
DEFAULT=FALSE
DESCRIPTION=Wenn TRUE, werden Kontakte, die aus dem Netz empfangen werden, ebenfalls als Broadcast via UDP gesendet. Dies erlaubt inm einzelnen Computer alle QSO's i Netz zu ereilen. Bedenken Sie bitte, dass die anderen Computer im Netzwerk diesen Parameter oder UDP BROADCAST CONTACT INFO aktiviert haben, da sonst alle Computer broadcasten. 

[UNKNOWN COUNTRY FILE ENABLE]
DEFAULT=FALSE
DESCRIPTION=Dieser Parameter bestimmt die Erstellung eines unbekannten Country Files. Die Datei beinhaltet alle QSO's mit Stationen deren Country nicht ermittelt werden kann. Dies ist optimal um neue Multiplier herauszufinden. Standardmaessig heisst diese Datei UNKNOWN.CTY, aber man kann den Namen mit dem Kommando UNKNOWN COUNTRY FILE NAME aendern. Unbekannte Countries kann man auch nach dem Contest mit der Multiplier Check Prozedur ermitteln.

[UNKNOWN COUNTRY FILE NAME]
DEFAULT=UNKNOWN.CTY
DESCRIPTION=Wert: Jeder gueltige Dateiname. TR4W speicher logeintraege von QSO's mit unbekanntem Country in der benannten Datei, wenn UNKNOWN COUNTRY FILE ENABLE auf TRUE steht.

[USE CONTROL PORT]
DEFAULT=FALSE
DESCRIPTION=

[USE RECORDED SIGNS]
DEFAULT=FALSE
DESCRIPTION=

[USER INFO SHOWN]
DEFAULT=NONE
DESCRIPTION=Dieser Wert deckt sich mit Feldern in der TRMASTER Datei. Angezeigt werden kann dies fuer die gerade gearbeitete Station direkt unterhalb der Rufzeicheneingabe. Wird CUSTOM gewaehlt, wird der Rapport mit Hilfe des CUSTOM USER STRING gebildet. Dies gestattet die Auswahl aus mehreren Datenfelder und deren Anzeige in beliebiger Reihenfolge.

[VHF BAND ENABLE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, gestattet TR4W die Auswahl von VHF und UHF Baendern durch druecken von Alt-B und Alt-V.

[WAIT FOR STRENGTH]
DEFAULT=TRUE
DESCRIPTION=When you use the [ character in a CW message, TR4W will allow you to enter the strength of an RST report by pressing a single numeric key. If WAIT FOR STRENGTH is TRUE, the program will wait for you to enter the strength before continuing the CW message. If WAIT FOR STRENGTH is FALSE and you haven?t pressed a key by the time the program is ready to send the strength, it will act as if you had pressed the 9 key and proceed with the message.

[WAKE UP TIME OUT]
DEFAULT=0
DESCRIPTION=TR4W can keep track of how many minutes have passed since your last QSO. If this number reaches a programmable limit, an alarm will sound once a minute until you work somebody. This is useful for long contests where you operate until brain death and need 20 or 30 minutes to become functional again. Since this is a dangerous time to try to set an alarm, the program will automatically start counting the minutes. The wake up time out alarm is disabled if the alarm has been set.

[WARC BAND ENABLE]
DEFAULT=FALSE
DESCRIPTION=Dieses Kommando ermoeglicht das Arbeiten auf 30, 17 und 12 Meter. Standardmaessig steht dieser Parameter auf FALSE, ausser man arbeitet im General QSO Mode.

[WEIGHT]
DEFAULT=1.00
DESCRIPTION=Wert: 0.5 bis 1.5. Dieses Kommando bestimmt die Gewichtung bei CW ueber den Computer. Beispiel: Ein Wert von 1.05 verlaengert die Dauer von von Dot und Dash um 5 Prozent.

[WILDCARD PARTIALS]
DEFAULT=TRUE
DESCRIPTION=Dieses Kommando bestimmt das Verhalten der Partial Call Funktion. Steht der Parameter auf FALSE, werden nur Calls angezeigt, die gerade eingegeben werden. Steht der Parameter auf TRUE (Standard), werden die eingegebenen Zeichen des Calls ueberall innerhalb der Partial Calls angezeigt. Dadurch wird ein Partial Check durch die Eingabe von Suffix oder Prefix ermoeglicht, anstat nur der Eingabe eines Prefix. Ist die Ausfuehrung dieses Features sehr langsam, dann sollte der Parameter auf FALSE gesetzt werden. Es werden nur Partial Calls aus den Dupesheets angezeigt. Es koennen fuer die Anzeige Wildcards verwendet werden. 


[WK AUTOSPACE]
DEFAULT=FALSE
DESCRIPTION=Wird mit der Eingabe des naechsten Zeíchens laenger als ein dit oder dah gewartet, interpretiert Winkeyer2 das als Abstand zwischen Buchstaben und sendet kein weiteres dit oder dah bis der zeitliche Buchstaben-Abstand erreicht ist.

[WK CT SPACING]
DEFAULT=FALSE
DESCRIPTION=Winkeyer2 unterstuezt reduzierten Wortabstand im Contest um ein dit. Anstatt 7 dits setzt der Parameter WK CT SPACING=TRUE den Abstand auf sechs dits.

[WK DIT DAH RATIO]
DEFAULT=50
DESCRIPTION=Modifiziert das Verhaeltnis zwischen dit und dah. Der Stansard ist 1:3 (dit:dah) Die Formel um das Verhaeltnis dah/dit zu bestimmen ist: DAH/DIT = 3*(nn/50). Ein Wert von 50 ist 1:3, der Wert von 33 wuerde 1:2 bedeuten und ein Wert 66 wuerde 1:4 bedeuten.

[WK ENABLE]
DEFAULT=FALSE
DESCRIPTION=Winkeyer benutzen anstatt des internen Keyers.

[WK FIRST EXTENSION]
DEFAULT=0
DESCRIPTION=Wert: Integer im Bereich von (0 to 250) * 1 mSecs. Beim Winkeyer2 gibt es oft Probleme mit aelteren Transceivern die ein langsameres Breakin Verhalten haben. Tritt dies auf, werden das erste Dit oder Dah zerhackt und gekuerzt. Um dies zu kompensieren sollte das erste Zeichen ein fixe Laenge erhalten.

[WK IGNORE SPEED POT]
DEFAULT=TRUE
DESCRIPTION=Wenn TRUE, ignoriert TR4W aenderungen der Winkeyer Geschwindigkeit.

[WK KEYER COMPENSATION]
DEFAULT=0
DESCRIPTION=Wert: Integer im Bereich von (0 to 250) * 1 mSecs.  Keying Compensation erlaubt das Hinzufuegen einer festen Verlaengerung zur Laenge aller Dits und Dahs. QSK Betrieb mit modernen Transceivern kann zur Verkuerzung der Dit und Dah Zeichen besonders bei hohen Geschwindigkeiten fuehren. Winkeyer2 erlaubt es die Zeichenlaenge gleichbleibend zu erhoehen um diesen Effekt zu kompensieren. Die Anpassung erfolgt in Schritten von einer Millisekunde. Die groesste Anpassung ist 250 Millisekunden. Diese Anpassung ist vergleichbar mit Gewichtung von Zeichen bei der jede Anpassung von Dits und Dahs vom Zeichenabstand abgezogen wird, wobei die Geschwindigkeit nicht geaendert wird. Der Unterschied zwischen Anpassung und Kompensation ist, das die Kompensation unabhaengig von der Geschwindigkeit ist.

[WK KEYER MODE]
DEFAULT=IAMBIC B
DESCRIPTION=Im Iambic Mode macht Winkeyer2 die Dits und Dahs automatisch davon abhaengig welches Paddle gedrueckt wird. Im Bug Mode macht Winkeyer2 keinen Unterschied. Man kann auch bei direkter Tastung den Bug Mode nutzen oder wenn man Winkeyer2 mit einem anderen Keyer nutzen will. Einfach den Bug Mode setzen und mit Eingabe von Dah den Winkyer2 betreiben . In jedem der Iambic Modes werden abwechselnd Dits und Dahs gegeben, wenn die Paddles gedrueckt gehalten werden. Im B Mode wird abwechselnd ein zusaetzliches Dit oder Dah gesendet wenn beide Paddle freigegeben werden. Im Ultimatic Mode wird, wenn beide Paddle gedrueckt sind, dauernd das Zeichen des zuletzt gedrueckten Paddles gesendet. 

[WK LEADIN TIME]
DEFAULT=0
DESCRIPTION=Wert: Integer im Bereich von  (0 bis 250) * 10 MSek. Das ist die Zeitverzoegerung zwischen dem Druecken der PTT und dem Beginn der CW Aussendung.

[WK PADDLE ONLY SIDETONE]
DEFAULT=FALSE
DESCRIPTION=Im WK2 kann man waehlen zwischen Sideton bei Tasteneingabe oder Stummschaltung bei CW ueber die Tastatur.

[WK PADDLE SWAP]
DEFAULT=FALSE
DESCRIPTION=Feature fuer Rechts- oder Linkshaender. 

[WK PADDLE SWITCHPOINT]
DEFAULT=50
DESCRIPTION=VWert: Integer im Bereich von 10 - 90%. Dies bestimmt, wann der Winkeyer2 einen neuen Tastendruck erwartet nachdem der Vorherige abgeschlossen ist. Ist der Abstand zu gering sendet der Keyer ungewollte Dits und Dahs. Ist der Abstand zu gross, bleibt der Keyer stecken. Der Standard fuer ein Dit ist 50. Der Abstand wird kalkuliert mit der Formel DELAY_TIME = (SWITCHPOINT*DIT_TIME)/50 und ist anpassbar in Prozent (Dauer eines Dit). Wobei der SWTCHPOINT eine Wert zwischen 10 und 90 ist.

[WK PORT]
DEFAULT=NONE
DESCRIPTION=Serieller Port mit dem Winkeyer verbunden ist.

[WK SIDETONE FREQUENCY]
DEFAULT=800
DESCRIPTION=Definiert die WK2 Sidetone-Frequenz. Die Fequenz ist geringfuegig anders als beim WK1.

[WK SIDETONE ENABLE]
DEFAULT=TRUE
DESCRIPTION=Legt fest, ob der Sideton des Winkeyers aktiv ist.

[WK TAIL TIME]
DEFAULT=0
DESCRIPTION=Wert: Integer im Breich von (0 bis 250) * 10 mSecs. bestimmt, wie lange der Transmitter nach Ende der Aussendung auf Sendung bleibt.

[WK WEIGHT]
DEFAULT=50
DESCRIPTION=Wert: Integer im Bereich von 10 - 90%. Dieses Kommando erlaubt die proportionale Anpassung durch Addition oder Subtraktion von der Laenge aller gesendeten Dits und Dahs. Beim Wert von 50 erfolgt keine aenderung. Werte kleiner 50 verringern die Gewichtung und Werte groesser 50 erhoehen die Gewichtung. Zu beachten ist, dass die Gewichtung keinen Einfluss auf die Sendegeschwindigkeit hat. Reduzierung der Gewichtung laesst den Ton duenner erscheinen waehrend eine Erhoehung der Gewichtung den Ton verstaerkt. Die Gewichtung folgt der Geschwindigkeit. Bei einer festen Gewichtung bleibt der Ton bei allen Geschwindigkeiten gleich.


[WINDOW SIZE]
DEFAULT=5
DESCRIPTION=Das relative Verhaeltnis von 1 bis 15 zur Festelegung der Groesse des Hauptfensters.

[WSJT-X BROADCAST PORT]
DEFAULT=2237
DESCRIPTION=Wird mit einer integrierten WSJT-X Instanz gearbeitet, ist dies der UDP-Port auf dem TR4W auf Meldungen von WSJT-X horcht. Wird der Port geaendert, muss der korrespondierende Eintrag in den WSJT-X Einstellungen ebenfalls geaendert werden. Dies funktioniert ebenfalls mit Meldungen von JT-Alert, aber nicht gleichzeitig, um dopplete Logeintraege zu vermeiden.

[WSJT-X ENABLED]
DEFAULT=TRUE
DESCRIPTION=Wenn TRUE, bietet TR4W den the UDP Server auf dem WSJT-X Broadcast Port an. Diese Option erlaubt einem dies auf FALSE zu setzen, damit TR4W nicht JT-Alert oder andere Anwendungen auf dem Broadcast Port behindert. Es schuetzt TR4W ebenfalls vor der unnoetigen Ausfuehrung von Kommandos.
[WSJT-X SEND HIGHLIGHTS]
DEFAULT=TRUE
DESCRIPTION=Wenn TRUE und in WSJT-X werden CQ-Messages dekodiert, wird das Call in den QSOB4 oder Mult Farben, basierend auf den Farben im TR4W Callsign Status, angezeigt. Setzt man den Wert auf FALSE, werden die originalen WSJT-X Farben angezeigt, genau so wie bei der der Benutzung von GENERAL LOG.
 
[ZONE MULTIPLIER]
DEFAULT=NONE
DESCRIPTION=Dieser Parameter bestimmt wie TR4W mit Zonen Multipliern umgeht. Normalerweise wird das im *.CFG File des Contest Statements festgelegt.

