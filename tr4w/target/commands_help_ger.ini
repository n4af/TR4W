[ADD DOMESTIC COUNTRY]
DEFAULT=NONE
DESCRIPTION=Values:Gueltige Laender ID.  ADD DOMESTIC COUNTRY = CLEAR Behandelt TR4W einige Laender als inlaendische Multiplier und den Rest des Landes anders, dann kann man Laender zur inlaendischen Liste hinzufuegen. Mormalerweise wird diese Liste ueber die Contesteinstellungen generiert, aber man kann mit diesem Kommando so viele Laender wie gewuenscht der inlaendischen List hinzufuegen. Man kann zu Beginn die Standardliste mit dem Kommando ADD DOMESTIC COUNTRIE = CLEAR leeren und dann wie benoetigt Laender hinzufuegen. Die Laender IDs muessen mit denen der CTY:DAT uebereinstimmen.

[ALL CW MESSAGES CHAINABLE]
DEFAULT=FALSE
DESCRIPTION=Normalerweise, wenn man eine belegte Funktionstastedrueckt waehrend eine CW-Message gerade abgespielt wird, wird diese Message abgebrochen und die neue Message startet. Wird dieses Flag auf TRUE gesetzt, startet die neue Message erst nach Beendigung der vorherigen. Man kann dies auch erreichen, wenn man ein CTRL-D zu Beginn der Message eingibt.

[ALLOW AUTO UPDATE]
DEFAULT=TRUE
DESCRIPTION=Erlaubt die Neuberechnung der Punkte nach Aenderung eines QSO im Netzwerkmodus.

[ALT-D BUFFER ENABLE]
DEFAULT=FALSE
DESCRIPTION=Dieses Kommando prueft, ob der ALT-D Puffer aktiv ist. Ist diese FLAG aktiv, bekommt TR4W Calls und Frequenzen aus der Bandmap und fuehrt einen Dupecheck im Log der zweiten Station aus.

[ALWAYS CALL BLIND CQ]
DEFAULT=FALSE
DESCRIPTION=Diese Funktion ist prinzipiell gemacht und sinnvoll fuer Conteste wie z. B Sprint, wenn TR4W mit zwei Stationen arbeitet. In so einer Situation, wenn man auf der zweiten Station CQ ruft, waehrend man Rapporte mit der Station austauscht, der dann anschliessend die Frequenz ueberlassen wird. Normalerweise erfolgt das durch druecken von F7 oder F8, womit man standardmaessig auf der inaktiven Station beginnt CQ zu rufen. Durch das Setzen von ALWAYS CALL BLIND CQ auf TRUE, wird automatisch ein CQ-Ruf ausgeloest, sobald der Rapportaustausch beendet ist (gesendet wird was auch immer im F7 Puffer steht). Zu beachten ist, dass natuerlich vorher eine freie Frequenz fuer den CQ-Ruf gefunden wurde.

[ASK FOR FREQUENCIES]
DEFAULT=FALSE
DESCRIPTION=Wird die Bandmap oder Packest Spots von einer Station ohne Steuerung durch TR4W genutzt, fragt das Programm nach der Frequenz der Station und wie Dupechecks durchgefuehrt werden sollen. Steht dieser Parameter auf FALS, fragt TR4W nicht mehr nach diesen Frequenzen.

[AUTO CALL TERMINATE]
DEFAULT=FALSE
DESCRIPTION=Wird in CW gearbeitet und dieser Parameter steht auf TRUE, kann TR4W als Reaktion auf die Eingabe von Rufzeichen die Eingabe automatisch abbrechen. Gekoppelt mit START SENDING NOW KEY oder AUTO SEND CHARACTER COUNT, nimmt TR4W an, dass das Call komplett ist, wenn alle eingegebenen Zeichen Im Call Window gesendet wurden GESENDET WURDEN. Nehmen wir z. B. an, dass 4U1ITU auf unser CQ geantwortet hat. drueckt man die mit START SENDING NOW KEY definierte Taste nach der Eingabe von 4U1I, sendet das Programm 4U1I. Gibt man ein oder mehrere zusaetzliche Zeichen ein, bevor der Sendevorgang abgeschlossen ist, sendet TR4W diese Zeichen ebnefalls. Werden keine weiteren Zeichen gesendet, wird automatisch das CQ EXCHANGE gesendet. TR4W arbeit genauso, als wenn die Funktion AUTO SEND CHARACTER COUNT das Programm veranlasst mit dem Senden des Calls zu beginnen. In diesem Fall ist es moeglich einer Station zu antworten indem die gleiche Anzahl von Tastaturanschlaegen gemacht werden, als in deren Callsign sind. 

[AUTO DISPLAY DUPE QSO]
DEFAULT=FALSE
DESCRIPTION=Wennman im CQ-Mode eine Doppel-QSO f#hrt und der parameter ist TRUE, zeigt TR4W automatisch die Logeintraege der vorherigen QSO(s) mit dieser Station an. Dieses Kommndo funktioniert nicht, wenn AUTO DUPE ENABLE CQ auf FALSE steht.

[AUTO DUPE ENABLE CQ]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE und ein Dupe ruft an waehrend man im CQ-Mode ist, dann wird die QSO BEFORE MESSAGE anstatt des regulaeren Rapports gesendet. Steht dieser Parameter auf FALSE, wird der normale Rapport gesendet und das QSO mit null Punkten gespeichert. Es ist sinnvoll diesen Parameter auf FALSE zu setzen, wenn das Log nach einem Contest haendisch bearbeitet wird.

[AUTO DUPE ENABLE S AND P]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE wenn im S&P Mode versucht wird einen Dupe anzurufen, wird TR4W diese Station nicht anrufen. Eventuell setzt man diesen Parameter auf FALSE in einem Contest wie dem Internet Sprint, in dem man die gleiche Station mehrmals auf dem selben Band arbeiten kann.

[AUTO QSL INTERVAL]
DEFAULT=0
DESCRIPTION=Drueckt man <ENTER> um ein QSO zu loggen, wird die QSL MESSAGE gesendet. Das AUTO QSL INTERVAL Kommando wird benutzt, um stattdessen die QUICK QSL MESSAGE zu senden, ausser das an Stelle von AUTO QSL INTERVAL die QSL MESSAGE gesendet wird. Befindet man sich in einem Pileup wird dies normalerweise so gemacht. Setz man AUTO QSL INTERVAL auf 3, wird die QUICK QSL MESSAGE gesendet, ausser bei jedem dritten QSO. Setzt man den Wert auf null, wird dieses Feature deaktiviert. In diesem Fall wird die QSL MESSAGE nach jedem QSO gesendet.

[AUTO QSO NUMBER DECREMENT]
DEFAULT=TRUE
DESCRIPTION=Enthaelt ein S&P Rapport eine QSO-Nummer, kann man in die Situation kommen, dass eine Station um die Wiederholung des Rapports bittet. Drueckt man dann F2, wird die naechsthoehere QSO-Nummer gesendet, was dann aber um eine Stelle zu hoch ist. Um dieses Problem zu umgehen, kann man AUTO QSO NUMBER DECREMENT auf TRUE setzen. Dies veranlasst TR4W, wenn die Eingabefelder fuer Call und Seriennummer leer sind, die richtige QSO-Nummer zu senden.

[AUTO RETURN TO CQ MODE]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE und die Eingabefelder fuer Call und Rapport sind leer, wird durch druecken von <ENTER> zurueck in den CQ-Mode gewechselt.

[AUTO S&P ENABLE SENSITIVITY]
DEFAULT=500
DESCRIPTION=Legt fest, wie schnell man den VFO (Hz/sec) veraendern muss, und AUTO S&P ENABLE auf TRUE gesetzt ist, um automatisch in den S&P-Modus zu wechseln.

[AUTO S&P ENABLE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, wechselt TR4W automatisch in den S&P-Mode, wenn erkannt wird, dass man den VFO schnell veraendert hat. Beachte dazu auch AUTO S&P ENABLE SENSITIVITY. 

[AUTO SEND CHARACTER COUNT]
DEFAULT=0
DESCRIPTION=TR4W kann mit der Aussendung des Calls einer anrufenden Station schon nach der Eingabe weniger Zeichen beginnen. Die Anzahl der Zeichen wird bestimmt durch das AUTO SEND CHARACTER COUNT Kommando. Wird z.B. AUTO SEND CHARACTER COUNT auf 3 gesetzt und 4U1ITU ruft uns an, beginnt das Programm nach der Eingabe von 4U1 zu senden. Ist AUTO CALL TERMINATE aktiv, sendet das Programm die CQ AUTO EXCHANGE Message nach Aussendung aller eingegebenen Zeichen. Ist AUTO SEND CHARACTER COUNT groesser Null, erscheint oberhalb des Eingabefelds fuer das Call ein Pfeil an der Stelle, an der TR4W mit dem Senden des Calls beginnt. Man kann dieses Kommando mit ALT -- deaktivieren und der Pfeil verschwindet. Zur Reaktivierung nochmals ALT -- eingeben und der Pfeil erscheint wieder. Mit der Backspace Taste koennen noch nicht gesendete Zeichen geloescht werden.

[AUTO TIME INCREMENT]
DEFAULT=0
DESCRIPTION=Wird ein Log per Hand gefuehrt, kann das AUTO TIME INCREMENT Kommando sehr sinnvoll sein. Ein Wert groesser Null veranlasst den Zaehler nach jeden QSO hochzuzaehlen. Der Wert Null deaktiviert das Kommando.

[AUTO-CQ DELAY TIME]
DEFAULT=3000
DESCRIPTION=

[BAND MAP ALL BANDS]
DEFAULT=FALSE
DESCRIPTION= Wenn TRUE, werden in der Bandmap die Eintraege aller Baender angezeigt. Wenn FALSE, werden nur die Eintraege des aktuellen Bandes angezeigt. Steht der Curosr in der Bandmap, kann die Umschaltung mit der Taste "B" erfolgen. 

[BAND MAP ALL MODES]
DEFAULT=FALSE
DESCRIPTION=Wenn True, werden in der Bandmap alle Modes angezeigt. Wenn FALSE, werden nur die Eintraege des aktuellen Modes angezeigt. Steht der Curosr in der Bandmap, kann die Umschaltung mit der Taste "M" erfolgen.

[BAND MAP CALL WINDOW ENABLE]
DEFAULT=TRUE
DESCRIPTION=Wenn TRUE, und man kann den VFO auf eine Frequenz mit einer Station in der Bandmap einstellen, werden das Call und die Rapportinformationen im Eingabefenster angezeigt. Dies ermmoeglicht durch druecken der Leertaste die Aktualisierung des Eintrags. Die Anzeige der Rapportinformationen ermoeglicht die schnelle Identifizierung der Station. Wird mit der Eingabe eines anderen Calls begonnen, wird vorher das Eingabefenster geloescht.

[BAND MAP CUTOFF FREQUENCY]
DEFAULT=0
DESCRIPTION=Erlaubt die bandweise aenderung der Frequenz unterhalb derer der Mode als CW interpretiert wird und oberhalb als SSB interpretiert wird. Gibt man eine Frequenz (in Hz) ein, erkennt TR4W  automatisch wofuer eine neue Endfrequenz definiert wurde. Um neue Endfrequenzen fuer mehrere Baender festzulegen, kann das Kommando so oft wie noetig in die *.cfg Datei eingefuegt werden. Fuer jede Endfrequenz ein eigener Eintrag.

[BAND MAP DECAY TIME]
DEFAULT=60
DESCRIPTION=Damit wird bestimmt, wieviel Minuten ein Eintrag in der Bandmap zu sehen ist.Der Wert muss eine Zahl kleiner 32.768 sein. Erneuert eine Station die QSX Information, dann wird der alte Eintrag geloescht.

[BAND MAP DISPLAY CQ]
DEFAULT=TRUE
DESCRIPTION=Wenn FALSE, erscheinen CQ Eingaben nicht in der Bandmap. 

[BAND MAP DISPLAY LIMIT]
DEFAULT=164
DESCRIPTION=Dieser Parameter erlaubt die Begrenzung der Anzahl der sichtbaren Spots in der Bandmap. Wird das Limitueberschritten,  sammeln sich die Spots oberhalb der Arbeitsfrequenz. Der Wert muss eine Zahl zwischen 30 und 1000 sein.

[BAND MAP DUPE DISPLAY]
DEFAULT=TRUE
DESCRIPTION=Bestimmt, ob in der Bandmap auch Frequenzen einschliesst auf denen man schon CQ gerufen hat. 

[BAND MAP ENABLE]
DEFAULT=FALSE
DESCRIPTION=Legt fest, ob die Bandmap angezeigt wird. Weiter Informationen im Kapitel 6.13. Start man TR4W ohne die Bandmap aktiviert zu haben, muss man das Programm erneut starten um dien korrekten Videomode fuer die Anzeige zu haben. D

[BAND MAP GUARD BAND]
DEFAULT=200
DESCRIPTION=Wete: Integer (Hz). Die Bandmap zeigt einen Eintrag hervorgehoben an, der in der Naehe der eigenen Arbeitsfrequenz ist. 

[BAND MAP MULTS ONLY]
DEFAULT=FALSE
DESCRIPTION=

[BAND MAP SPLIT MODE]
DEFAULT=BY CUTOFF FREQ
DESCRIPTION=Dieser Parameter erlaubt die Behandlung von Stationen, die in der Bandmap zu sehen sind und im Split Modus arbeiten. Die Standardeinstelung erlaubt die gewuenschte Begrenzung der CW und Phonie Bereiche mit dem Kommando BAND MAP CUTOFF FREQUENCY.

[BAND]
DEFAULT=160
DESCRIPTION= Auswahl des Bandes mit dem TR4W startet und wenn noch keine Verbindungen gemacht wurden. Nach dem Programmstart kann mit ALT-B oder ALT-V das Band gewechselt werden. Einige Conteste sind Single-Band Conteste und das Band kann nicht gewechselt werden.

[BANDMAP ITEM HEIGHT]
DEFAULT=17
DESCRIPTION= Hoehe des Eintrags im Bandmap Fenster. 

[BANDMAP ITEM WIDTH]
DEFAULT=139
DESCRIPTION= Breite des Eintrags im Bandmap Fenster.

[BEEP ENABLE]
DEFAULT=TRUE
DESCRIPTION=Wenn FALSE, werden alle von TR4W generierten Toene nicht ueber den PC Lautsprecher ausgegeben. 

[BEEP EVERY 10 QSOS]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Wert auf TRUE, ertoent nach jedem zehnten QSO ein kurzen Piepton. Dies ist sinnvoll, wenn nach einem Contest Logeingaben per Hand gemacht werden um sicherzustellen, dass man keine QSO uebersprungen hat. 

[BOLD FONT]
DEFAULT=TRUE
DESCRIPTION=Set die Schrift im Programmfenster auf fett.

[BROADCAST ALL PACKET DATA]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE und man arbeitet vernetzt, werden alle vom TNC kommenden  Daten an alle Computer im Netzwerk gesendet, wo man die Nachrichten mit CTRL-B ansehen kann. Kommandos koennen auch von jedem Computer an den TNC gesendet werden. Die Daten werden aber erst angezeigt, wenn <ENTER> gedrueckt wurde.

[CALL WINDOW SHOW ALL SPOTS]
DEFAULT=FALSE
DESCRIPTION=Falls TRUE, und man dreht im S&P Modus ueber das Band, werden alle in TR4W bekannten Calls im Rufzeichenfenster angezeigt und erscheinen nicht in der Bandmap. Steht z.B. BAND MAP DUPE DISPLAY auf FALSE, erscheinen Dupes nicht in der Bandmap, aber sie werden im Rufzeichenfenster angezeigt, wenn CALL WINDOW SHOW ALL SPOTS auf TRUE gesetzt ist.

[CALLSIGN UPDATE ENABLE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, analysiert TR4W das Rapportfenster auf der Suche nach Calls, findet es ein Call, dann verfaehrt das Programm so, als wenn das Call im Rufzeichenfenster geaendert wurde. Man muss exakt das komplette Call eingeben. Steht dieser Parameter auf TRUE und drueckt man CTRL-U, wird das Call im Rapportfenster gesendet (anderenfalls im Rufzeichenfenster).

[CATEGORY-ASSISTED]
DEFAULT=NON-ASSISTED
DESCRIPTION=Wird zum Erstellen einer Cabrillo-Datei und zur Anzeige des Punktestands in Online Systemen benutzt.

[CATEGORY-BAND]
DEFAULT=ALL
DESCRIPTION=Wird zum Erstellen einer Cabrillo-Datei und zur Anzeige des Punktestands in Online Systemen benutzt.

[CATEGORY-MODE]
DEFAULT=CW
DESCRIPTION=Wird zum Erstellen einer Cabrillo-Datei und zur Anzeige des Punktestands in Online Systemen benutzt.

[CATEGORY-OPERATOR]
DEFAULT=SINGLE-OP
DESCRIPTION=Wird zum Erstellen einer Cabrillo-Datei und zur Anzeige des Punktestands in Online Systemen benutzt.

[CATEGORY-POWER]
DEFAULT=HIGH
DESCRIPTION=Wird zum Erstellen einer Cabrillo-Datei und zur Anzeige des Punktestands in Online Systemen benutzt.

[CATEGORY-TRANSMITTER]
DEFAULT=ONE
DESCRIPTION=Wird zum Erstellen einer Cabrillo-Datei und zur Anzeige des Punktestands in Online Systemen benutzt.

[CHECK LOG FILE SIZE]
DEFAULT=FALSE
DESCRIPTION=Falls TRUE, prueft TR4W die *.trw Datei des Logs um sicherzustellen, dass die Groesse fuer die Anzahl der Kontakte ausreichend ist. Dieses Feature warnt vor einem Plattenfehler und schuetzt vor Datenverlust. Tritt dieser Fehler auf, sollte sofort eine Datensicherung auf ein anderes Laufwerk gemacht werden und die Platte mit einem Disk Utility Programm geprueft werden, ob verlorene Daten restauriert werden koennen. Anschliessend sollte der Computer neu gestartet werden.

[CLEAR DUPE SHEET]
DEFAULT=FALSE
DESCRIPTION= Das Programm wird das Dupesheetfenster leeren, wenn dieser Parameter in einer *.cfg Datei auf TRUE steht und mit CTRL-V ausgefuehrt wird. Waehrend des Programmstarts werden die Dupesheets nicht geleert.
[CODE SPEED]
DEFAULT=35
DESCRIPTION=Mit diesem Parameter wird CW Startgeschwindigkeit beim Start von TR4W gesetzt. Waehrend der Programmausfuehrung kann mit den Pg-Up/Pg-Dow Tasten die Geschwindigkeit um 3 Zeichen veraendert (Parameter CW SPEED INCREMENT) werden.

[COLUMN DUPESHEET ENABLE]
DEFAULT=FALSE
DESCRIPTION=Dieser Parameter bestimmt das Aussehen der sichtbaren Dupesheets im VGA Modus unterhalb des normalen Programmfensters. Falls TRUE, zeigt TR4W jedes Dupesheet in einer eigenen Spalte. Das macht es leichter ein spezielles Call schneller zu finden. Werden mehr als 25 Dupes angezeigt, wird wieder zur Normalanzeige umgeschaltet.

[COMPLETE CALLSIGN MASK]
DEFAULT=NONE
DESCRIPTION= Ein String definiert ein "Mask Call", das in die Eingabezeile eingetragen wird, wenn die mit dem Kommando <03>COMPLETECALL<04> programmierte Funktionstaste gedrueckt wird.

[COMPUTER ID]
DEFAULT=
DESCRIPTION=Werte: A bis Z oder leer. Besteht die Computer ID aus einem Buchstaben, wird der Buchstabe direkt hinter der QSO-Nummer eingetragen. Dies ist hilfreich fuer die Separierung der Logs nach Computer ID in einer Multi-Multi Umgebung.

[COMPUTER NAME]
DEFAULT=New
DESCRIPTION=Der Name des Computers im TR4W Netzwerk. Der Name wird im Fenster "Netzwerk" angezeigt.

[CONFIRM EDIT CHANGES]
DEFAULT=TRUE
DESCRIPTION=Dieser Parameter bestimmt, ob man nach der aenderung (mit CTRL-E) der letzten fuenf QSOs abspeichern will (z. B. im editierbaren Logfenster). Normalerweise fragt TR4W im er vor der Speicherung von aenderungen. Sellt man diesen Parameter auf FALS, fragt TR4W nicht mehr.

[CONNECTION AT STARTUP]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE und ist das DX-Cluster Fenster offen, versucht das Programm beim Start die Verbindung zum Cluster herzustellen.

[CONNECTION COMMAND]
DEFAULT=NONE
DESCRIPTION=Dieser String bestimmt den Dtring, welcher beim Verbinden an das DX-Cluster gesendet wird.

[CONTACTS PER PAGE]
DEFAULT=50
DESCRIPTION=Bestimmt die Anzahl der sichtbaren Kontakte im Logfenster.

[CONTEST NAME]
DEFAULT=NONE
DESCRIPTION=Dieser Parameter beinhaltet den Namen des Contests. TR4W fuegt das eigene Call und das Jahr zum CONTEST TITLE hinzu. 

[CONTEST TITLE]
DEFAULT=NONE
DESCRIPTION=Der Name des Contests wird in der Kopfzeile des Bildschirms und im Header des Logs angezeigt. 

[CONTEST]
DEFAULT=DUMMY CONTEST
DESCRIPTION=Das CONTEST Statement teilt TR4W mit an welchem Contest man teilnehmen will.

[COUNT DOMESTIC COUNTRIES]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, veranlasst TR4W inlaendische QSOs als DX Country zu werten. (Gedacht fuer eventuell auftretende inlaendische Multiplier) 

[COUNTRY INFORMATION FILE]
DEFAULT=NONE
DESCRIPTION=Mit diesem Kommando wird eine Textdatei bestimmt, die bis zu fuenf Zeilen Text pro Land enthalten kann (Laender werden in der CTY.DAT definiert). Dieser Text wird im editierbaren Logfenster angezeigt, wenn eine Station gearbeitet wird. Die Dateistruktur wird gebildet aus der Country ID (wie in der CTY.DAT) in der ersten Zeile, gefolgt von fuenf Textzeilen. Eine Leerzeile bestimmt das Ende des Datensatzes, gefolgt von der naechsten Coubtry ID. Es gibt keine Beschraenkung hinsichtlich der Dateigroesse und der Anzahl der Laender.

[CUSTOM CARET]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE, werden Rufzeichen- und Rapportfenster rechteckig dargestellt. 

[CUSTOM INITIAL EXCHANGE STRING]
DEFAULT=NONE
DESCRIPTION=Dieser String bestimmt was im Rapportfenster eingegeben werden kann, wenn INITIAL EXCHANGE den Wert CUSTOM hat. Gewaehlt werden koennen die folgenden Felder in beliebiger Reihenfolge: CHECK, CQZONE, FOC, GRID, ITUZONE, NAME, OLDCALL, QTH, SECTION, TENTEN, USER1, USER2, USER3, USER4 and USER5.

[CUSTOM USER STRING]
DEFAULT=NONE
DESCRIPTION=Dieser String bestimmt wie eine User Info angezeigt wird, wenn USER INFO SHOWN auf den Wert CUSTOM gesetzt wird. Gewaehlt werden koennen die folgenden Felder in beliebiger Reihenfolge: CHECK, CQZONE, FOC, GRID, ITUZONE, NAME, OLDCALL, QTH, SECTION, TENTEN, USER1, USER2, USER3, USER4 and USER5.

[CW ENABLE]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf FALSE, kann der Computer kein CW Signal senden, ausser mit der Taste.

[CW SPEED FROM DATABASE]
DEFAULT=FALSE
DESCRIPTION=Steht dieserParameter auf TRUE, sieht TR4W in der TRMASTER Database nach, ob es fuer die zu arbeitende Station ein Eintrag ueber die CW Geschwindigkeit gibt, wenn ja, dann wird der Rapport in der Geschwindigkeit gegeben. Nach senden der QSL Message oder einem neuen CQ Ruf wird zur alten Geschwindigkeit zurueckgekehrt (wenn das QSO abgebrochen wurde).

[CW SPEED INCREMENT]
DEFAULT=3
DESCRIPTION=

[CW TONE]
DEFAULT=700
DESCRIPTION=Der Computer kann das CW Signal zum Mithoeren ueber den Lautsprecher ausgeben. Mit diesem Parameter kann die Tonhoehe eingestellt werden. Wird der Wert auf Null gesetzt, wird der Mithoerton abgeschaltet. Das PADDLE MONITOR TONE Kommande stellt separat die Tohoehe der Paddle Aussendung ein.

[DE ENABLE]
DEFAULT=TRUE
DESCRIPTION=Dieser Parameter bestimmt, ob ein DE vor dem eigenen Call bei Verwendung der F1 Taste im S&P Mode gesendet wird. Wird das DE nicht gewuenscht (was bei den meisten Operatern der Fall ist), muss der Parameter auf FALSE gesetzt werden.

[DEBUG LOG LEVEL]
DEFAULT=NONE
DESCRIPTION=Steht normalerweise auf NONE. Im Fehlerfall gibt es die folgenden Optionen: NONE, FATAL, ERROR, WARN, INFO, DEBUG, and TRACE. Im TR4W Directory nach einer Datei tr4w-debug.log sehen.


[DIGITAL MODE ENABLE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, kann mit Alt-M DIG als Mode gewaehlt werden. DIG ist ein besonderer Mode, abgegrenzt von CW und SSB. Dieses Feature dient zum Loggen digitaler QSOs waehrend des ARRL Field Day.

[DISPLAY REFRESH]
DEFAULT=1
DESCRIPTION=Anzahl zur Zwischenseicherung von Sots (1-10) bevor ein Refresh des Bildschirms stattfindet. Dies dient der Reduzierung von Bildschirmflimmern.

[DISTANCE MODE]
DEFAULT=KM
DESCRIPTION=Dieser Parameter bestimmt die Anzeige der Distanz zur Station die gerade gearbeitet wird. Die Entfernung wird zusammen mit der Beamrichtung angezeigt. Der Wert der Entfernung ist abhaengig von Wert in RADIUS OF EARTH.

[DIT DAH RATIO]
DEFAULT=3
DESCRIPTION=Ratio dit/dah in CW.

[DOMESTIC FILENAME]
DEFAULT=NONE
DESCRIPTION=Mit diesem Kommando kann man den vom Programm benutzten Dateinamen der nationalen Multiplier Datei festlegen. This command allows you to specify the name of the domestic multiplier file that will be used by the program. Dieser wird normalerweise von TR4W automatisch aus den Contets Parametern des Contests bestmmt. Wie auch immer kann man mit diesem Parameter einen eigenen Namen fuer die Multiplier Datei festlegen. Denken Sie daran, den DOMESTIC MULTIPLIER Parameter auf den WertDOMESTIC FILE zu setzen, damit TR4W diese Einstellungen verwendet..

[DOMESTIC MULTIPLIER]
DEFAULT=NONE
DESCRIPTION=Dieser Parameter definiert die Art der inlaendischen Multiplier.

[DUPE CHECK SOUND]
DEFAULT=DUPE BEEP
DESCRIPTION=Wird durch druecken der Leertaste ein Dupe Check ausgeloest, antwortet TR4W mit einem Beep falls ein Dupe festgestellt wird. Wie auch immer kann der Beep abgestellt werden oder stattdessen ein Fanfare ertoenen lassen.

[DUPE SHEET AUTO RESET]
DEFAULT=TRUE
DESCRIPTION=Wenn TRUE, leert das Programm automatisch die Dupe Sheets nach jeder Tour in Multi-Tour Contesten. 


[DVK ENABLE]
DEFAULT=FALSE
DESCRIPTION=Dieser Parameter legt fest, ob DVK aktiviert ist.

[DVK PATH]
DEFAULT=DVK
DESCRIPTION=

[DVK RECORDER]
DEFAULT=NONE
DESCRIPTION=

[DX MULTIPLIER]
DEFAULT=NONE
DESCRIPTION=Dieser Parameter bestimmt die Art der DX Multiplier die im Programm verwendet werden.

[ESCAPE EXITS SEARCH AND POUNCE]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE, schaltet TR4W durch druecken von <Esc> im S&P Mode um in den CQ Mode. Steht dieser Parameter auf FALSE, kann man nur mit Shift-Tab in den CQ Mode umschalten. Wird gerade auf dem zweiten Transceiver ein QSO gefahren, wird FALS ignoriert. Das ermoeglicht den Abbruch des QSO auf der zweiten Station mit <ESC> wenn der Parameter auf FALSE steht.

[EXCHANGE MEMORY ENABLE]
DEFAULT=TRUE
DESCRIPTION=Dieser Parameter bestimmt welchen Austauschspeicher TR4W nutzen soll. Dieser Speicher ist nuetzlich wenn dieselbe Station auf mehreren Baendern oder verschiedenen Modes gearbeitet wird und wenn der Rapport entweder eine Klasse (z.B. ARRL Field Day, Power (ARRL DX), Alter (All Asian), Name, ITU (IARU), Zone oder nationales QTH) ist. Wurde im Contest die Station schon gearbeitet, wird die gespeicherte Information automatisch angezeigt. Zu beachten ist, wenn TR4W beendet wird, werden die Information und die *.RST Datei geloescht.

[EXCHANGE RECEIVED]
DEFAULT=UNKNOWN
DESCRIPTION=Dieser Parameter gibt Tr4W an, welcher Rapport erwartet wird. Normalerweise wird das in der *.CFG Datei des Contests eingestellt.

[FARNSWORTH ENABLE]
DEFAULT=FALSE
DESCRIPTION=Wird die CW Geschwindigkeit verringert, wird oft gewuenscht die Pause zwischen den Zeichen zu vergroessern. Aktivierung von FARNSWORTH ENABLE verringerdt die Pause zwischen den Zeichen sobald die Geschwindigkeit unter den Wert von FARNSWORTH SPEED (Default ist 25 WPM). Dieser Parameter kann dynamisch waehrend der Aussendung veraendert werden.

[FARNSWORTH SPEED]
DEFAULT=25
DESCRIPTION=Values: Integer (WPM). Bestimmt die CW Geschwindigkeit bei der der Farnworth Effekt einsetzt. Verringert sich die Geschwindigkeit unter diesen Wert, wird die Pause zwischen den Zeichen exponentiell groesser. Um den Farnworth Effekt bei sehr niedriger Geschwindigkeit zu vergroessern, erhoeht man den Wert von FARNSWORTH SPEED. Dieser Parameter kann dynamisch waehrend der Aussendung veraendert werden.

[FLOPPY FILE SAVE FREQUENCY]
DEFAULT=0
DESCRIPTION=Values: Integer (Anzahl der Kontakte). Mit diesem Kommando wird festgelegt, wie oft TR4W das aktuelle Log in eine neue Datei schreibt. Der Wert 0, ist der Standard, deaktiviert dieses Feature.

[FLOPPY FILE SAVE NAME]
DEFAULT=C:\LOGBACK.TRW
DESCRIPTION=Dieses Kommado ermoeglicht die Sicherung des *.TRW Files periodisch waehrend des ganzen Contests auf ein anderes Laufwerk. Zur Aktivierung ist  FLOPPY FILE SAVE FREQUENCY auf die Anzahl von QSO zwischen den Backups zu setzen. Der Name der Sicherungsdatei wird festgelegt durch das FLOPPY FILE SAVE NAME Kommando. Der Name dieser Kommandos ist irrefuehrend. Man kann Backups auf jedes Laufwerk machen, auch in das Contestdirectry, wenn der Name nicht auf *.TRW  endet.

[FOOT SWITCH MODE]
DEFAULT=DISABLED
DESCRIPTION=Das Kommando FOOT SWITCH PORT legt fest, was ausgefuehrt wird, wenn der Fussschalter, angeschlossen an PIN 15 des Ports, betaetigt wird.

[FOOT SWITCH PORT]
DEFAULT=NONE
DESCRIPTION=

[FREQUENCY ADDER RADIO ONE]
DEFAULT=0
DESCRIPTION=

[FREQUENCY ADDER RADIO TWO]
DEFAULT=0
DESCRIPTION=

[FREQUENCY MEMORY ENABLE]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE, wird der Frequenzspeicher aktiviert. Das heisst, ma keht auf die etzte Arbeitsfrequenz zurueck, wenn man auf das Band zurueckkhert selbst mit dr anderen Station).

[FREQUENCY MEMORY]
DEFAULT=NONE
DESCRIPTION=Wert: Frequenz (kHz). Wechselt TR4W erstmals ein Band /Mode, schaltet es auf eine festgelegte Frequenz. Mit diesem Programm kann diese Standardfrequenz geaendert werden. Wird eineFequenz im CW Bereich festgelegt, es soll aber in SSB gearbeitet werden einfach SSB vor die Frequenz setzen (z.B. FREQUENCY MEMORY = SSB 7050). Ist FREQUENCY MEMORY ENABLE auf TRUE gesetzt, wir bei einem Bandwechsel/Mode die hier eingestellte Frequenz gewaehlt.   

[FREQUENCY POLL RATE]
DEFAULT=10
DESCRIPTION=Wert: Integer 10 bis 1000 (msec). Diese Kommando sagt TR4W wie haeufig abgefragt wird, ob die Station auf einer neuen Frequenz arbeitet. Der Wert (zwischen 10 und 1000) wird in Millisekunden angegeben.

[GRID MAP CENTER]
DEFAULT=NONE
DESCRIPTION=Wert: Vier- oder sechsstelliger Grid Locator. Dieser Parameter setzt dem Mittelpunkt eine Gridmap und zeigt die Locator der gearbeiteten Stationen an. Die Gridmap wird im VGA Mode angezeigt, falls verfuegbar. Mit CTRL-links und CTRL-rechts kann die Map verschoben werden. (Eine vertikale Verschiebung ist nicht moeglich). 

[HAND LOG MODE]
DEFAULT=FALSE
DESCRIPTION=

[HF BAND ENABLE]
DEFAULT=TRUE
DESCRIPTION=Dieser Parameter aktiviert die Baender unterhalb 30 MHz. Bei einem VHF Contest wird er automatisch auf FALSE gesetzt.

[HOUR DISPLAY]
DEFAULT=THIS HOUR
DESCRIPTION=Values:THIS HOUR, LAST SIXTY MINUTES oder BAND CHANGES. Dieser Parameter bestimmt die Anzeige QSO-Rate der letzten Stunde. Im THIS HOUR Mode wird die Anzahl der QSOs innerhalb der letzten Stunde angezeigt (z.B. Start um 15:00).  Im LAST SIXTY MINUTES Mode werden die QSOs innerhalb der letzten sechzig Minuten gezeigt. Im The BAND CHANGES Mode wird Anzahl der Bandwechsel seit Beginn der aktuellen Stunde gezaehlt.

[IN BAND LOCKOUT]
DEFAULT=TRUE
DESCRIPTION=Wert:True/False. Der Standard ist TRUE. Damit wird verhindert, dass bei Stationen auf dem selben Band arbeiten. 

[INCLUDE F-KEY NUMBER]
DEFAULT=FALSE
DESCRIPTION=

[INCREMENT TIME ENABLE]
DEFAULT=FALSE
DESCRIPTION=Bestimmt die "Hochzaehlung der Uhrzeit" wenn Alt-1 bis Alt-0 aktiviert ist. Ist dieses Flag auf TRUE gesetzt, kann mi Alt-1 bis Alt-0 die Uhrzeit zwischen 1 und 10 Minuten erhoeht werden. Diese Funktion kann hilfreich sein, wenn nach Ende eines Contests das Log per Hand eingegeben wird.

[INITIAL EXCHANGE CURSOR POS]
DEFAULT=AT END
DESCRIPTION=Wert: AT START oder AT END. Dieses Kommando legt fest, ob nach der Eingabe ins Rapportfenster der Cursor hinter oder vor dem Rapport steht.

[INITIAL EXCHANGE FILENAME]
DEFAULT=INITIAL.EX
DESCRIPTION=Dieser Parameter erlaubt die Festlegung des initialen Rapport Files. Diese Datei wird von TR4W zur Speicherung der Rapporte der einzelnen Rufzeichen. Das Call wird auch fuer die Liste der "partial calls" verwendet. Das Format ist: callsign, Leerstelle und dann die initiale Rapport Information, die im Rapportfenster erscheinen soll. 

[INITIAL EXCHANGE OVERWRITE]
DEFAULT=FALSE
DESCRIPTION= Steht dieser Parameter auf TRUE und es wird eine beliebige Taste nach der initalen Eingabe des Rapports gedrueckt, loescht TR4W die Eingabe und man kann den Rapport per Hand eingeben. 

[INITIAL EXCHANGE]
DEFAULT=NONE
DESCRIPTION=Dieser Parameter bestimmt die Erstellung eines initialen Rapports bezogen auf ein Rufzeichen.  Alle Informationen ausser der Zone muessen aus der TRANSMASTER.DTA kommen. Die Zone kann aus dieser Datei kommen, ist sie dort nicht enthalten, wird sie auf der Basis des Rufzeichens und den Informationen in der CTY.DAT ermittelt. Steht der Parameter auf CUSTOM, wird der Rapport durch den Parameter CUSTOM INITIAL EXCHANGE STRING gebildet. Dies gestattet die Auswahl aus unterschiedlichen  Datenfeldern und in beliebiger Reihenfolge. Mit dem Parameter INITIAL EXCHANGE FILENAME koennen initiale Rapporte bestimmt werden. Initiale Rapporte koennen auch aus dem Rapportspeicher kommen, wenn die Station im Contest schon einmal gearbeitet wurde. 

[INSERT MODE]
DEFAULT=TRUE
DESCRIPTION= Dieses Kommando legt fest, ob der Einfuegemodus beim Start aktiv ist oder nicht. Damit wird festgelegt, ob Zeichen ueberschrieben oder eingefuegt werden. Die Umschaltung erfolgt mit Ctrl-V oder druecken der EINFueGEN Taste.

[INTERCOM FILE ENABLE]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, werden alle Messages zwischen den Computern waehrend des Contest in die Datei INTERCOM.TXT geschrieben.

[KEYER RADIO ONE OUTPUT PORT]
DEFAULT=NONE
DESCRIPTION=Dieses Kommando legt den Port fuer CW- und PTT-Ausgaben fest. Man kann serielle Ports zwischen 1 und 4 und parallele Ports zwischen 1 und 3 bestimmen. Wird ein seriellen Port fuer CPU Tastung bestimmt, kann das Wort INVERT inde Portnamen aufgenommen werden (z.B. SERIAL 1 INVERT). Dadurch werden die CW und PTT Signale invertiert. Das vereinfacht die Verbindung zu einer Station mit invertierter Signalgebung.. Der NPN Transistor aus ASnhang B muss durch einen PNP Transistor.  When specifying a serial port for CPU keying, you can add the word INVERT to the port name (e.g., SERIAL 1 INVERT). This will invert the CW and PTT signals. This simplifies the interface to a radio which uses inverted signalling. Replace the NPN transistors shown in Appendix B with PNP transistors. Use clamp diodes to prevent the base from going positive.

[KEYER RADIO TWO OUTPUT PORT]
DEFAULT=NONE
DESCRIPTION=These commands select which computer port is used for the CW and PTT outputs. You may specify serial ports in the range 1 to 4, and parallel ports in the range 1 to 3. When specifying a serial port for CPU keying, you can add the word INVERT to the port name (e.g., SERIAL 1 INVERT). This will invert the CW and PTT signals. This simplifies the interface to a radio which uses inverted signalling. Replace the NPN transistors shown in Appendix B with PNP transistors. 

[KEYPAD CW MEMORIES]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, werden mit den Tasten 0 bis 9 beziehungsweise CTRL-1 bis CTRL-10 auf der Tastatur gespeicherte CQ Memories gesendet.

[LATEST CONFIG FILE]
DEFAULT=NONE
DESCRIPTION=

[LEADING ZERO CHARACTER]
DEFAULT=T
DESCRIPTION=Dieser Parameter gestattet die individuelle Festlegung fuer das Zeichen als fuehrende Null bei der Generierung von Serienummern und LEADING ZEROS mit einem Wert groesser Null. Normaler ist T. dieses Zeichen. Eventuell wird ja die Zahl 0 oder der Buchstabe O bevorzugt. Mit CTRL-J kann dieser Parameter geaendert werden,

[LEADING ZEROS]
DEFAULT=3
DESCRIPTION= Soll die Seriennummer eine bestimmte Laenge haben mittels fuehrender Nullen, kann mit diesem Kommando die Laenge bestimmt werden. Ein Wert von Null deaktiviert das Hinzufuegen fuehrender Nullen. Das Zeichen fuer die fuehrenden Nullen kann mit dem Kommando LEADING ZERO CHARACTER festgelegt werden.

[LEAVE CURSOR IN CALL WINDOW]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, bleibt der Cursor im Rufzeichenfenster stehen, anstatt atomatisch in das Rapportfenster zu springen. Einige bevorzugen dieses Verfahren in einem Contest, wo eine Zone als initialer Rapport angezeigt wird und man ihn kaum aendern muss.

[LITERAL DOMESTIC QTH]
DEFAULT=FALSE
DESCRIPTION=Normalerweise ueberprueft TR4W das eingegebene inlaendische QTH und loggt das QTH wie es im Domestic File steht. Soll es bei der haendischen Eingabe bleiben, setzt man diesen Parameter auf TRUE.

[LOG FREQUENCY ENABLE]
DEFAULT=FALSE
DESCRIPTION=Ist dieser Parameter aktiv, wird die Seriennummer durch die QSO Frequenz ersetzt (ohne Megahertz Teil ). Band und Mode werden dennoch an den Beginn des Logeintrags geschrieben. Dieses Feature ist nur mit einer ueber ein Interface verbundenen Staiton sinnvoll. 

[LOG RS SENT]
DEFAULT=59
DESCRIPTION=Der ins Log eingetragene gesendete Signalrapport von 59 oder 599 kann geaendert werden. Das Zeichen [ im CW Rapport erlaubt die Eingabe der gesendeten Signalstaerke. Dieser Wert wird dann anstatt des Standards ins Log eingetragen.

[LOG RST SENT]
DEFAULT=599
DESCRIPTION=Der ins Log eingetragene gesendete Signalrapport von 59 oder 599 kann geaendert werden. Das Zeichen [ im CW Rapport erlaubt die Eingabe der gesendeten Signalstaerke. Dieser Wert wird dann anstatt des Standards ins Log eingetragen. 

[LOG SUB TITLE]
DEFAULT=NONE
DESCRIPTION=Mit diesem Kommando kann, falls gewuenscht, ein Untertitel zu Beginn jeder gedruckten Logseite definiert werden.

[LOG WITH SINGLE ENTER]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, wird das QSO schon nach dem ersten Druecken von <Enter> geloggt (Rapport gesendet). Anders ausgedrueckt, TR4W verhaelt sich, als wenn <Enter> gefolgt von CTRL-Enter gedrueckt wuerde.

[LOOK FOR RST SENT]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, kann ein zu sendendes RST mit einem vorangestellten S eingegeben werden. Z.B. wird ein S57 als ?57? als Rapport fuer dieses QSO eingetragen. 

[LPT1 BASE ADDRESS]
DEFAULT=888
DESCRIPTION=Die Basisadresse fuer den Parallel Port LPT1 (Parallel 1).

[LPT2 BASE ADDRESS]
DEFAULT=632
DESCRIPTION=Die Basisadresse fuer den Parallel Port LPT1 (Parallel 2).

[LPT3 BASE ADDRESS]
DEFAULT=956
DESCRIPTION=Die Basisadresse fuer den Parallel Port LPT1 (Parallel 3).

[MAIN CALLSIGN]
DEFAULT=NONE
DESCRIPTION=

[MAIN FONT]
DEFAULT=Arial
DESCRIPTION=Dieses Kommando bestimmt den Font im Hauptfenster des Programms zur Informationsanzeige.

[MESSAGE ENABLE]
DEFAULT=TRUE
DESCRIPTION=Dieses Kommando legt fest, ob die im Alt-P Menue gespeicherten Messages gesendet werden. Wird dieser Parameter auf FALSE gesetzt, werden Messages wie CQ EXCHANGE und QSL MESSAGE nicht gesendet. Dieses Kommando wuerde verwendet, wenn die Messages per Hand gesendet werden sollten.

[MINITOUR DURATION]
DEFAULT=0
DESCRIPTION=Wert: Integer von 5 bis 60. Legt die Dauer der Tour in Multi-Tour Contesten in Minuten fest, 

[MISSINGCALLSIGNS FILE ENABLE]
DEFAULT=FALSE
DESCRIPTION=

[MMTTY ENGINE]
DEFAULT=NONE
DESCRIPTION=

[MODE]
DEFAULT=CW 
DESCRIPTION=Hiermit wird der Mode beim Start von TR4W bestimmt, wenn noch kein QSO gefahren wurde. Normalerweise wird mit Alt-M der gewuenschte Mode gewaehlt.

[MP3 PATH]
DEFAULT=MP3
DESCRIPTION=Der Ordner in dem die MP3-Dateien gespeichert werden. Standardmaessig ist das [tr4w_directory][contest_directory][mp3].
[MP3 PLAYER]
DEFAULT=NONE
DESCRIPTION=Player, der fuer die Wiedergabe der MP3-Dateien benutzt wird. 

[MP3 RECORDER BITRATE]
DEFAULT=16
DESCRIPTION=Bitrate des MP3 Recorders. 

[MP3 RECORDER DURATION]
DEFAULT=EACH QSO
DESCRIPTION=

[MP3 RECORDER ENABLE]
DEFAULT=FALSE
DESCRIPTION=Steht der Parameter auf TRUE, startet die MP3-Aufnahme sofort nach dem Oeffnen des "MP3 Recorder" Windows.

[MULT BY BAND]
DEFAULT=FALSE
DESCRIPTION=Mit diesem Kommando wird festgelegt, wie Multiplier erneut bei Band- oder Modeaenderungen gewertet werden. Diese Parameter werden schon bei der Ausfuehrung des CONTEST Statements ausgefuehrt und brauchen im Normalfall nicht geaendert werden. 

[MULT BY MODE]
DEFAULT=FALSE
DESCRIPTION= Mit diesem Kommando wird festgelegt, wie Multiplier erneut bei Band- oder Modeaenderungen gewertet werden. Diese Parameter werden schon bei der Ausfuehrung des CONTEST Statements ausgefuehrt und brauchen im Normalfall nicht geaendert werden.

[MULT REPORT MINIMUM BANDS]
DEFAULT=4
DESCRIPTION=Wert: Integer von 2 bis 4. Diese Kommandos sind synomym. Wird das CTRL-O Kommando ausgefuehrt, werden die gearbeiteten Multiplier pro Band angezeigt. Dieser Parameter legt die minimale Anzahl fest, wie oft ein Land pro Band zu arbeiten ist um in diesem Report angezeigt zu werden.

[MULTI INFO MESSAGE]
DEFAULT=NONE
DESCRIPTION=Wird in einem Netzwerk gearbeitet um Multiplikatoren zu arbeietn, bestimmt dieses Kommando, ob alle QSO im Netzwerk angezeigt werden oder nur dann, wenn es ein neuer Multiplier ist.

[MULTI MULTS ONLY]
DEFAULT=FALSE
DESCRIPTION=Wird in einem Netzwerk gearbeitet um Multiplikatoren zu arbeietn, bestimmt dieses Kommando, ob alle QSO im Netzwerk angezeigt werden oder nur dann, wenn es ein neuer Multiplier ist.

[MULTIPLE BANDS]
DEFAULT=TRUE
DESCRIPTION=These commands control the ability to change bands or modes while working the contest. If you are working a single mode or single band contest, it is recommended that the corresponding flag be set to FALSE. This will prevent you from changing band or mode accidentally during the contest. Before you make your first QSO, you will be able to set the band and mode regardless of the value of these parameters.

[MULTIPLE MODES]
DEFAULT=TRUE
DESCRIPTION=Dieses Kommando legt fest, ob in einem Contest Band- oder Modewechsel gestattet sind. These commands control the ability to change bands or modes while working the contest. Arbeitet man in einem Einband- oder "Einmode" Contest, ist es gut, wenn dieses Flag auf FALSE gesetzt wird. Dadurch wird verhindert, dass versehentlich Band oder Mode gewechselt werden. Vor dem ersten QSO besteht die Moeglichkeit, unabhaengig von diesem Parameter, das entsprechende Flag zu setzen. 

[MY CALL]
DEFAULT=NONE
DESCRIPTION=Wert: Ihr Callsign. Das muss der erste Eintrag im *.CFG File sein. Auch Angaben ueber Portabelaktivitaeten sollten angegeben werden. Im Ctrl-J Menue sind die Angaben zu sehen, aber nicht zu aendern.  

[MY CHECK]
DEFAULT=NONE
DESCRIPTION=Wert: Jeder String. Dieses Kommando ist in Sweepstake Contesten verpflichtend. Ist der CONTEST auf SWEEPSTAKES gesetzt und dieser Wert ist nicht bgesetzt, fragt Tr4W danach.

[MY CONTINENT]
DEFAULT=NONE
DESCRIPTION=Wert: AF, AS, EU, NA, OC oder SA. Im Normalfall wird der Kontinent durch das Call ermittelt. Um das im Bedarfsfall zu aendern, wird dieses Kommando benutzt. Am besten ist es dieses Kommando vor das CONTEST Statement im *.CFG zu setzen, damit TR4W den Contest korrekt konfigurieren kann. Im Ctrl-J Menue ist der Wert von MY CONTINENT zu sehen, aber nicht zu aendern.

[MY COUNTRY]
DEFAULT=NONE
DESCRIPTION=Wert: Jede gueltige Country ID. Im Normalfall wird das Land durch das Call ermittelt. Um das im Bedarfsfall zu aendern, wird dieses Kommando benutzt. Am besten ist es dieses Kommando vor das CONTEST Statement im *.CFG zu setzen, damit TR4W den Contest korrekt konfigurieren kann. Im Ctrl-J Menue ist der Wert von MY COUNTRY zu sehen, aber nicht zu aendern.

[MY FD CLASS]
DEFAULT=NONE
DESCRIPTION=Wert: Jede gueltige ARRL Fieldday Klasse. Diese wird benoetigt, um der Station die richtige ARRL Fieldday Klasse (z.B. 1A) zuzuweisen. Wird am Fieldday teilgenommen, fragt TR4W nach dieser Einstellung, falls sie noch nicht gesetzt wurde.

[MY GRID]
DEFAULT=NONE
DESCRIPTION=Wert:  vier- oder sechsstelliger Grid Locator. Dieser Parameter identifiziert den Kenner aus dem gearbeitet wird. Geneutzt wird dieser Wert zur Ermittlung der Beamrichtung. Ebenfalls wird er genutzt zur Entfernungsberechnung in Contesten wo die Distanz zur Ermittlung von QSO-Punkten benutzt wird. Mit GRID MAP CENTER kann der Wert direkt gesetzt werden.

[MY IOTA]
DEFAULT=NONE
DESCRIPTION=Wert: IOTA Referenz. Damit wird die IOTA-Referenz der Insel festgelegt von der man arbeitet (z.B. EU-006). 

[MY NAME]
DEFAULT=NONE
DESCRIPTION=Wert: Belieber String. Dieser Wert wird vor dem CONTEST statement eingesetzt, wenn man in einem Contest arbeitet, der den Namen als Teil des Rapports benoetigt.In Contesten, in denen ein Name schon in einem vorherigen QSO empfangen wurde, (unter Verwendung des speziellen CW Zeichens (), nimmt TR4W diesen Wert, der im ersten QSO gsendet wurde.

[MY POSTAL CODE]
DEFAULT=NONE
DESCRIPTION=Wert: Beliebiger String. Wird im RSGB ROPOCO (Rotating Post Code) benutzt, wo der Postcode im ersten QSO gesendet wird.

[MY PREC]
DEFAULT=NONE
DESCRIPTION=Wert: A, B, M, Q, S oder U. Dieses Kommando ist im Sweepstakes Contest verpflichtend. TR4W fragt nach diesem Kommando, wenn es nicht schon gesetzt wurde.

[MY QTH]
DEFAULT=NONE
DESCRIPTION=Wert: Beliebiger String. Ist ein Synonym fuer MY STATE.

[MY SECTION]
DEFAULT=NONE
DESCRIPTION=Wert: Beliebiger String. Dieses Kommando ist im Sweepstakes Contest oder ARRL Fieldday verpflichtend.  TR4W fragt nach diesem Kommando, wenn es nicht schon gesetzt wurde.

[MY STATE]
DEFAULT=NONE
DESCRIPTION=WERT: Beliebiger String. In einigen Contesten, wo Staaten oder Provinzen Teil des Rapports sind, legt TR4W automatisch die CW-Message einschliesslich des Standortes fest. Dieses Kommando teilt dem Programm automatisch mit, welcher Staat (oder Provinz)Teil des Rapports ist. Dieses Kommando wird auch von diversen Staaten in QSO-Parties benutzt. Fuer den eigenen Staat sollten die zwei Buchstaben des United States Postal Service verwendet werden. Am besten sollte dieses Kommando vor dem CONTEST Statement im *.CFG File eingefuegt werdwen.

[MY ZONE]
DEFAULT=NONE
DESCRIPTION=Wert: Integer. Normalerweise wird die Zone anhand des Calls bestimmt. Falls TR4W dich in eine andere Zone setzen soll, dann verwende dieses Kommando. Am besten wird dieses Kommando vor das CONTEST Statement im *.CFG File gesetzt, damit TR4W diese Einstellung im Contest nutzt. Wie auch immer ist das Verhalten des Programms bei Nutzung des Kommandos MY Zone und der Ausfuehrung von CONTEST sehr komplex und unter bestimmten Umstaenden (z. B. in IARU Contest), sollte das MY ZONE Kommando hinter dem CONTEST Kommando stehen. Steht das Kommando in der falschen Reihenfolge, berechnet TR4W die Punkte fuer eine Zone in der man sich aktuell nicht befindet. Tritt das auf, dann sollte man die Reihenfolge des Kommandos umkehren.

[NAME FLAG ENABLE]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE, erscheint im Log ein Sternchen, wenn man QSO mit einer Station faehrt wo der Name schon bekannt ist.

[NET STATUS UPDATE INTERVAL]
DEFAULT=5000
DESCRIPTION=

[NO BORDER]
DEFAULT=FALSE
DESCRIPTION=

[NO CAPTION]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Wert auf TRUE, wird beim Programmstart kein Titel ueber dem Hauptfenster angezeigt.

[NO COLUMN HEADER]
DEFAULT=FALSE
DESCRIPTION=

[NO LOG]
DEFAULT=FALSE
DESCRIPTION=Soll von einem Computer im Newtzwerk nicht mehr geloggt werden duerfen, setzt man diesen Parameter auf TRUE.
[NO POLL DURING PTT]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, wird waehrend PTT aktiv ist, keine Frequenzinformation mehr abgefragt. 

[ORION PORT]
DEFAULT=NONE
DESCRIPTION=Dieses Kommando wird zur Steuerung eines Orion Rotors ueber einen seriellen Port benutzt. Mit Ctrl-P kann der Rotor in die Richtung des Landes mit dem gerade ein QSO gefuehrt wird gedreht werden. 

[PADDLE MONITOR TONE]
DEFAULT=700
DESCRIPTION=Der PC Lautsprecher wird normalerweise fuer die Ausgabe des CW Mitghoertons genutzt, wenn das Signal von einem Paddle an einem Parallelport kommt. Mit dem Wert 0 wird der Ton deaktiviert.

[PADDLE PORT]
DEFAULT=NONE
DESCRIPTION=

[PADDLE PTT HOLD COUNT]
DEFAULT=13
DESCRIPTION=Dieses Kommando bestimmt die Verzoegerung vom Beenden der CW Aussendung bis zur PTT-Freigabe. Die Verzoegerung wird in dits gemessen.

[PADDLE SPEED]
DEFAULT=0
DESCRIPTION=Dieses Kommando bestimmt die Gebegeschwindigkeit mit dem Paddle. Steht der Wert auf 0, wird die in TR4W eingestellte Geschwindigkeit benutzt.

[PARTIAL CALL ENABLE]
DEFAULT=TRUE
DESCRIPTION=Mit diesem Kommando kann man die "partielle Call Funktion" bestimmen. Dies ist ein spezielles Feature der "super check patrial" (benutzt wird die TRMASTER.DTA). Die Rufzecihen die hierfuer verwendet werden kommen aus der Dupesheet und der Rappert Datei.Ist diese Funktion aktiv, werden partielle Calls nach der Eingabe von zwei Zeichen unten im Eingabefenster angezeigt.  Ein ?partial call?  ist jedes Call, das mit den identischen zwei ersten Zeichen wie das Call im Eingabefenster beginnt. Der WILDCARD PARTIALS Parameter bestimmt, ob das ?partial call? schon beim Eingabebeginn angezeigt wird.

[POLL RADIO ONE]
DEFAULT=TRUE
DESCRIPTION=

[POLL RADIO TWO]
DEFAULT=TRUE
DESCRIPTION=

[POSSIBLE CALL ACCEPT KEY]
DEFAULT=;
DESCRIPTION=Wert: Beliebiges Zeichen.

[POSSIBLE CALL LEFT KEY]
DEFAULT=,
DESCRIPTION=Wert: Beliebiges Zeichen.

[POSSIBLE CALL MODE]
DEFAULT=NAMES
DESCRIPTION=Wert: NAMES oder ALL. Moegliche Calls aus der TRMASTER.DTA koennen entweder alle genommen werden oder nur Calls denen auch der Name zugeordnet ist. Wird NAMES gesetzt, ist das Verfahren genau so wie in aelteren TR4W Versionen, wo die Namensdatei verwendet wurde. 

[POSSIBLE CALL RIGHT KEY]
DEFAULT=.
DESCRIPTION=Wert: Beliebiges Zeichen. Verwendet man PARTIAL CALL ENABLE oder POSSIBLE CALLS,  sieht man am unteren Rand des Bildschirms eine Liste mit Rufzeichen. Das erste Rufzeichen ist eingefasst von einem Cursor (Beispiel: <G4AMJ>). Mit dem POSSIBLE CALL ACCEPT KEY kann man dieses Rufzeichen in das Rufzeichenfeld uebernehmen. man kann den Cursor nach links oder rechts bewegen mit dem POSSIBLE CALL LEFT KEY und dem POSSIBLE CALL RIGHT KEY.

[POSSIBLE CALLS]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE, ist das Feature "moegliche Rufzeichen" aktiv. Dadurch zeigt TR4W moegliche Rufzeichen anhand der TRMASTER.DTA und aus der Dupesheet Liste an, wenn eine neue Station gearbeitet wird.

[PREFIX MULTIPLIER]
DEFAULT=NONE
DESCRIPTION=Wert: NONE oder PREFIX. Dieses Kommando bestimmt wie TR4W mit Prefix Multipliern verfaehrt. Normalerweise ist das im *.CFG File des CONTEST Statement gesetzt. 

[PTT ENABLE]
DEFAULT=TRUE
DESCRIPTION=Dieses Kommando kontrolliert, ob das PTT Signal aktiv ist. Das PTT Signal schaltet die Station auf Sendeung kurz bevor die CW Aussendung beginnt und schaltet zurueck auf Empfang sobald die Aussendung beendet ist. Verwendet man Break-In (QSK), dann sollte man dieses Kommando deaktivieren.

[PTT LOCKOUT]
DEFAULT=FALSE
DESCRIPTION=Dieses Kommando bestimmt, ob oder ob nicht die PTT im Netzwerkmodus abgeschaltet wird. 

[PTT TURN ON DELAY]
DEFAULT=15
DESCRIPTION=Dieser Parameter bestimmt die Zeit zwischen der Aktivierung des PTT Signals und dem Aussenden des ersten CW Zeichens. Dieser Wert wird mit 1,7 Millisekunden multipliziert. Der Wert null deaktiviert dieses Feature.

[PTT VIA COMMANDS]
DEFAULT=FALSE
DESCRIPTION=Sendet das PTT Kommando an eine Station ueber das Cat Interface.

[QSL MODE]
DEFAULT=STANDARD
DESCRIPTION=Wert: STANDARD, QSL AND LOG oder QSL BUT NO LOG. Dieses Kommando kann genutzt werden um die Kriterien fuer einen Rapport im CQ Mode zu aendern. Normalerweise erwartet TR4W die komplette Eingabe des Rapports vor der Bestaetigung und dem Loggen. Wird QSL BUT NO LOG ausgewaehlt, wird der Rapport gesendet selbst wenn der Rapport noch nicht komplett ist, aber bevor die Verbindung geloggt wird muss erneut <Enter> gedrueckt werden. Bei QSL AND LOG  erfolgt kein Check des eingegebenen Rapport, was eingegeben wurde wird geloggt. Dieser Parameter wird nicht empfohlen.

[QSO BY BAND]
DEFAULT=FALSE
DESCRIPTION=Dieser Parameter legt fest, ob weitere QSO auf anderen Baendern oder in anderen Modes. Dieser Parameter wird automatisch aktiviert, wenn das CONTEST Statement im *.CFG File ausgefuehrt wird und braucht normalerweise nicht geaendert werden.

[QSO BY MODE]
DEFAULT=FALSE
DESCRIPTION=Dieser Parameter legt fest, ob weitere QSO auf anderen Baendern oder in anderen Modes. Dieser Parameter wird automatisch aktiviert, wenn das CONTEST Statement im *.CFG File ausgefuehrt wird und braucht normalerweise nicht geaendert werden.

[QSO NUMBER BY BAND]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, werden die QSO Nummern, die auf dem Bildschirm angezeigt werden und die,die in einem CW Rapport mit dem # Zeichen versehen sind und die, die im Log angezeigt werden, werden aus der Gesamtzahl der QSO auf dem aktuellen Band berechnet. Das ist sinnvoll in einer Multi-Transmitter Umgebung (z.B. CQ WPX Contest).

[QSO POINT METHOD]
DEFAULT=NONE
DESCRIPTION=

[QSO POINTS DOMESTIC CW]
DEFAULT=-1
DESCRIPTION=Dieser Parameter erlaubt die Kontrolle der angezeigten QSO Punkte. Dies ueberschreibt die normale Berechnung der QSO Punkte in der angezeigten Kategorie. 

[QSO POINTS DOMESTIC PHONE]
DEFAULT=-1
DESCRIPTION=Dieser Parameter erlaubt die Kontrolle der angezeigten QSO Punkte. Dies ueberschreibt die normale Berechnung der QSO Punkte in der angezeigten Kategorie. 

[QSO POINTS DX CW]
DEFAULT=-1
DESCRIPTION=These parameters allow you to control the QSO point values for the class of QSOs indicated. These will over-ride any existing QSO point method for the contacts in the category indicated.

[QSO POINTS DX PHONE]
DEFAULT=-1
DESCRIPTION= Dieser Parameter erlaubt die Kontrolle der angezeigten QSO Punkte. Dies ueberschreibt die normale Berechnung der QSO Punkte in der angezeigten Kategorie. 

[QSX ENABLE]
DEFAULT=TRUE
DESCRIPTION=Dieser Parameter legt fest wie QSX-Informationen aus Packet Spots uebernommen werden. DX Stationen werden dies in der Regel deaktivieren, da sie kaum an Split Spots interessiert sind.

[QTC ENABLE]
DEFAULT=FALSE
DESCRIPTION=Dieser Parameter ist normalerweise automatisch aktiv, wenn ein WAE Contest konfiguriert ist. Sind QTC's aktiviert, dann werden sie mit Ctrl-Q gesendet (wenn man ausserhalb Europas ist) oder empfangen (wenn man in Europa ist). TR4W stellt automatisch sicher, dass kein QTC an die Station gesendet wird, wenn sie im QTC steht. In CW funktionieren Ctrl-Enter sowie Alt-K nach Sendung eines QTC wie gewohnt. 

[QTC EXTRA SPACE]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE, werden zusaetzliche Leerstellen zwischen den einzelnen Elemente des QTC eingefuegt.

[QTC MINUTES]
DEFAULT=FALSE
DESCRIPTION=Steht dieser Parameter auf TRUE, wird die QTC-Funktion nur die Minuten der QTC-Zeit senden, die in derselben Stunde liegen wie die vorher gesendete Zeit.

[QTC QRS]
DEFAULT=TRUE
DESCRIPTION=Steht dieser Parameter auf TRUE, sendet TR4W die QTCs cirka 6% langsamer als die Normalgeschwindigkeit.

[QUESTION MARK CHAR]
DEFAULT=?
DESCRIPTION=Wert: beliebige Taste. Bei einigen Tastaturen muss die Shift-Taste gedrueckt werden um das Fragezeichen auszugeben. Mit diesem Kommando kann man das ? auf eine andere Taste legen. Der Autor fand es sinnvoll die Taste = damit zu belegen. Dies ist besser, da durch das Druecken der Shift-Taste moeglicherweise die Frequenz geaendert wird, wenn mit einem Computerinterface gearbeitet wird.

[QUICK QSL KEY 1]
DEFAULT=
DESCRIPTION=Wert: beliebige Taste. Wird ein CW-Kontakt abgeschlossen, wird normalerweise <Enter> gedrueckt, das QSO geloggt und die QSL MESSAGE gesendet. Will man stattdessen die QUICK QSL MESSAGE 1 senden, drueckt man QUICK QSL KEY1 anstatt <Enter>.

[QUICK QSL KEY 2]
DEFAULT==
DESCRIPTION=Wert: beliebige Taste. Wird ein CW-Kontakt abgeschlossen, wird normalerweise <Enter> gedrueckt, das QSO geloggt und die QSL MESSAGE gesendet. Will man stattdessen die QUICK QSL MESSAGE 1 senden, drueckt man QUICK QSL KEY1 anstatt <Enter>.

