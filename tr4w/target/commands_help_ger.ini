DEFAULT=0
DESCRIPTION=Wert:Beliebiger Integer-Wert (base 10). Mit diesen zwei Kommandos kann die Empfaeneradresse fuer die Verbindung zu Icom oder Ten-Tec Geraeten festgelegt werden. Jedes Geraet hat eine eigene Empfaengeradresse, die TR4w benoetigt um mit dem Geraet kommunizieren zu koennen. Die Nummer in der base 10 Syntax eingegeben werden.

