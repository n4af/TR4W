; EN: If you have programmed CW messages that include names from the TRMASTER database, SAY HI ENABLE will determine whether the names are actually used. This allows you to program the messages with the names included, but to disable them all without having to edit each message.
DESCRIPTION=Si ha programado mensajes CW que incluyen nombres de la base de datos TRMASTER, SAY HI ENABLE determinarį si los nombres se utilizan realmente. Esto le permite programar los mensajes con los nombres incluidos pero desactivarlos todos sin tener que editar cada mensaje.

[SAY HI RATE CUTOFF]
DEFAULT=200
; EN: If SAY HI ENABLE is TRUE, TR4W will cease to greet the other station when your rate exceeds the value of SAY HI RATE CUTOFF.
DESCRIPTION=Si SAY HI ENABLE es TRUE, TR4W dejarį de saludar a la otra estación cuando su ritmo supere el valor de SAY HI RATE CUTOFF.

[SCORE POSTING URL]
DEFAULT=http://post.contestonlinescore.com/
; EN: Post to Online Scoreboard
DESCRIPTION=Publicar en el Online Scoreboard.

[SCORE READING URL]
DEFAULT=https://contestonlinescore.com/scoreboard/
; EN: Read Online Scoreboard
DESCRIPTION=Leer el Online Scoreboard.


[SCP COUNTRY STRING]
DEFAULT=NONE
; EN: Values: Comma-separated list of country prefixes. This command allows you to limit the stations that are displayed by the Super Check Partial function. Entering a comma-separated list of country prefixes (e.g., K, VE, KL7, KH6, KP2, KP4) causes only stations from those countries to be displayed when performing the Super Check Partial function. The default is to list stations from all countries. If you place a ! or - in front of the list of countries, then only stations in countries not in the list will be displayed by Super Check Partial.
DESCRIPTION=Valores: lista de prefijos de paķs separados por comas. Este comando le permite limitar las estaciones mostradas por la función Super Check Partial. Introducir una lista de prefijos de paķs separados por comas (p. ej., K, VE, KL7, KH6, KP2, KP4) hace que solo se muestren estaciones de esos paķses al ejecutar la función Super Check Partial. Por defecto se listan estaciones de todos los paķses. Si coloca un ! o un - delante de la lista de paķses, entonces solo se mostrarįn las estaciones de paķses que NO estén en la lista.

[SCP MINIMUM LETTERS]
DEFAULT=0
; EN: Values: 0, 3, 4, or 5. When this parameter is non-zero, it enables the automatic Super Check Partial function. When you enter the number of characters specified, partial calls will be automatically displayed. You must have a TRMASTER.DTA file available for the program for this feature to work.
DESCRIPTION=Valores: 0, 3, 4 o 5. Cuando este parįmetro no es cero, habilita la función automįtica de Super Check Partial. Cuando introduzca el nśmero de caracteres especificado, se mostrarįn automįticamente los indicativos parciales. Debe tener disponible un fichero TRMASTER.DTA para que el programa pueda usar esta función.

[SEND COMPLETE FOUR LETTER CALL]
DEFAULT=FALSE
; EN: The } character in a CW message will send the prefix or suffix of a corrected callsign. If you set this parameter to TRUE, it will send the complete callsign if it is only four characters in length.
DESCRIPTION=El carįcter } en un mensaje CW enviarį el prefijo o sufijo de un indicativo corregido. Si establece este parįmetro a TRUE, enviarį el indicativo completo si tiene solo cuatro caracteres de longitud.

