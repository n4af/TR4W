DEFAULT=FALSE
; EN: When this parameter is TRUE, TR4W will not switch rigs when you use the alt-R command.
DESCRIPTION=Cuando este parįmetro es TRUE, TR4W no cambiarį de radio cuando utilice el comando alt-R.

[SKIP ACTIVE BAND]
