[ADD DOMESTIC COUNTRY]
DEFAULT=NONE
; EN: Values: Valid country ID. When TR4W is treating some countries as domestic multipliers and the rest of the countries differently, you can add countries to the list of those that are being processed as domestic multipliers. Normally this list is set up by the CONTEST statement, but you can use this command multiple times to add as many countries to the domestic list as you want. You can clear out the default list by using the command ADD DOMESTIC COUNTRY = CLEAR first, and then adding the ones you want. Make sure the country IDs you add match the ones in your CTY.DAT file.
DESCRIPTION=Valores: identificador de paķs vįlido. Cuando TR4W estį tratando algunos paķses como multiplicadores nacionales y al resto de paķses de forma distinta, puede ańadir paķses a la lista de los que se procesan como multiplicadores nacionales. Normalmente esta lista se configura mediante la sentencia CONTEST, pero puede utilizar este comando varias veces para ańadir tantos paķses a la lista nacional como desee. Puede vaciar la lista por defecto utilizando primero el comando ADD DOMESTIC COUNTRY = CLEAR y, a continuación, ańadiendo los que desee. Asegśrese de que los identificadores de paķs que ańada coincidan con los de su fichero CTY.DAT.

[ALL CW MESSAGES CHAINABLE]
DEFAULT=FALSE
; EN: Normally, when you press a function key memory when a CW message is already playing, the previous message will be aborted and the new message started. However, if you set this flag to TRUE, the new message will not start until the old one is complete. You can also do this for selected CW messages by placing a ctrl-D at the start of the message.
DESCRIPTION=Normalmente, cuando pulsa una memoria de tecla de función mientras se estį reproduciendo un mensaje CW, el mensaje anterior se aborta y se inicia el nuevo. Sin embargo, si establece este indicador a TRUE, el nuevo mensaje no comenzarį hasta que el anterior haya finalizado. También puede hacer esto para mensajes CW concretos colocando un ctrl-D al inicio del mensaje.

[ALLOW AUTO UPDATE]
DEFAULT=TRUE
; EN: Allow auto rescore of the log in networked mode after QSO edit.
DESCRIPTION=Permite el recįlculo automįtico de la puntuación del log en modo red tras editar un QSO.

[ALT-D BUFFER ENABLE]
DEFAULT=FALSE
; EN: This command controls whether the alt-D buffer is enabled. When this flag is enabled, TR4W obtains calls and frequencies from the bandmap when performing a dupecheck on the second radio.
DESCRIPTION=Este comando controla si el bśfer alt-D estį habilitado. Cuando este indicador estį activo, TR4W obtiene indicativos y frecuencias del bandmap al realizar una comprobación de duplicados en la segunda radio.

[ALT-D CQ ENABLE]
DEFAULT = FALSE
; EN: (SO2R) Setting this to true will enable a CQ to be automatically sent on the run rig upon completion of exchange on S&P rig.
DESCRIPTION=(SO2R) Si se establece a true, se enviarį automįticamente un CQ en la radio de run al completar el intercambio en la radio de S&P.

[ALWAYS CALL BLIND CQ]
DEFAULT=FALSE
; EN: This function is principally designed to be useful in contests like the Sprint when you are using TR4W with two rigs. In such a situation, you often want to send a CQ on the other rig while you are receiving the exchange from the station to whom you are about to cede the frequency. Normally you do this by pressing F7 or F8, which by default sends CQ on the inactive rig. Setting the ALWAYS CALL BLIND CQ function to TRUE causes that CQ to occur automatically as soon as the CQ EXCHANGE has been sent. (It sends whatever message is stored in Exchange memory F7.). Note that this does force you to be ready for that CQ by finding a clear frequency in time for it to be sent.
DESCRIPTION=Esta función estį pensada principalmente para concursos como el Sprint cuando se utiliza TR4W con dos radios. En tal situación, a menudo desea enviar un CQ en la otra radio mientras estį recibiendo el intercambio de la estación a la que estį a punto de ceder la frecuencia. Normalmente esto se hace pulsando F7 o F8, que por defecto envķa CQ en la radio inactiva. Establecer la función ALWAYS CALL BLIND CQ a TRUE hace que ese CQ se produzca automįticamente en cuanto se haya enviado el CQ EXCHANGE. (Envķa el mensaje almacenado en la memoria de intercambio F7.) Tenga en cuenta que esto le obliga a estar preparado para ese CQ encontrando una frecuencia libre a tiempo para que se envķe.

[ASK FOR FREQUENCIES]
DEFAULT=FALSE
; EN: When using the bandmap or submitting packet spots in an environment in which you do not have a radio that communicates with TR4W, the program will normally ask you for the frequency of stations as you perform dupe checks. Setting this parameter to FALSE will stop TR4W from asking you for these frequencies.
DESCRIPTION=Cuando utiliza el bandmap o envķa spots de packet en un entorno en el que no tiene una radio que se comunique con TR4W, el programa normalmente le pedirį la frecuencia de las estaciones al realizar comprobaciones de duplicados. Establecer este parįmetro a FALSE harį que TR4W deje de pedirle estas frecuencias.

[AUTO CALL TERMINATE]
DEFAULT=FALSE
; EN: When you are on CW and this parameter is TRUE, TR4W can automatically terminate callsigns that you enter in response to a CQ. When coupled with the START SENDING NOW KEY or the AUTO SEND CHARACTER COUNT commands, TR-LOG will assume that a call is complete when all the characters entered in the Call Window have been transmitted. For example, assume that 4U1ITU has answered your CQ. If you press the key identified by the START SENDING NOW KEY command after entering 4U1I, the program will start to send 4U1I. If you enter one or more additional characters before it completes sending, TR-LOG will send those characters as well. If there are no new characters to send, it will automatically send the CQ EXCHANGE. TR4W works the same way if the AUTO SEND CHARACTER COUNT function causes the program to start sending the callsign. In this case, it is possible to respond to a station by using the same number of keystrokes that are in its callsign.
DESCRIPTION=Cuando estį en CW y este parįmetro es TRUE, TR4W puede terminar automįticamente los indicativos que introduzca en respuesta a un CQ. Combinado con los comandos START SENDING NOW KEY o AUTO SEND CHARACTER COUNT, TR-LOG asumirį que un indicativo estį completo cuando se hayan transmitido todos los caracteres introducidos en la ventana de llamada. Por ejemplo, suponga que 4U1ITU ha respondido a su CQ. Si pulsa la tecla identificada por el comando START SENDING NOW KEY tras introducir 4U1I, el programa comenzarį a enviar 4U1I. Si introduce uno o mįs caracteres adicionales antes de que termine de enviar, TR-LOG enviarį también esos caracteres. Si no hay nuevos caracteres que enviar, enviarį automįticamente el CQ EXCHANGE. TR4W funciona del mismo modo si la función AUTO SEND CHARACTER COUNT hace que el programa empiece a enviar el indicativo. En este caso, es posible responder a una estación utilizando el mismo nśmero de pulsaciones que hay en su indicativo.

[AUTO DISPLAY DUPE QSO]
DEFAULT=FALSE
; EN: When you are working a duplicate QSO in CQ Mode and this parameter is TRUE, TR4W will automatically show you the log entries for the previous QSO(s) with that station. This command is nonfunctional if you set AUTO DUPE ENABLE CQ to FALSE.
DESCRIPTION=Cuando estį trabajando un QSO duplicado en modo CQ y este parįmetro es TRUE, TR4W le mostrarį automįticamente las entradas del log de los QSO anteriores con esa estación. Este comando no es funcional si establece AUTO DUPE ENABLE CQ a FALSE.

[AUTO DUPE ENABLE CQ]
DEFAULT=TRUE
; EN: This parameter is now ignored. It did produce a 'QSO B4' message. Reference GitHub issue 556 for more information. 'QSO B4' message may be added to any F key if desired.
DESCRIPTION=Este parįmetro ahora se ignora. Anteriormente generaba un mensaje 'QSO B4'. Consulte la incidencia 556 de GitHub para mįs información. El mensaje 'QSO B4' puede ańadirse a cualquier tecla F si se desea.

[AUTO DUPE ENABLE S AND P]
DEFAULT=TRUE
; EN: If this parameter is TRUE, when you try to call a dupe with the <Enter> key in S&P Mode, TR4W will refuse to call the station. You might want to set this parameter to FALSE in contests like the Internet Sprint, in which you often call the same station on the same band and mode several times during the contest.
DESCRIPTION=Si este parįmetro es TRUE, cuando intente llamar a un duplicado con la tecla <Enter> en modo S&P, TR4W se negarį a llamar a la estación. Puede que desee establecer este parįmetro a FALSE en concursos como el Internet Sprint, en los que a menudo se llama a la misma estación en la misma banda y modo varias veces durante el concurso.

[AUTO QSL INTERVAL]
DEFAULT=0
; EN: Normally when you press <Enter> to log a QSO, the QSL MESSAGE is transmitted. The AUTO QSL INTERVAL command can be used to send the QUICK QSL MESSAGE instead, except that once every AUTO QSL INTERVAL QSOs, the QSL MESSAGE is transmitted instead. This is typically used when dealing with a large pileup. If you set AUTO QSL INTERVAL to 3, then the QUICK QSL MESSAGE would be sent, except for every third QSO. A value of zero disables this feature, in which case the QSL MESSAGE is sent at the end of every QSO.
DESCRIPTION=Normalmente, cuando pulsa <Enter> para registrar un QSO, se transmite el QSL MESSAGE. El comando AUTO QSL INTERVAL puede utilizarse para enviar en su lugar el QUICK QSL MESSAGE, excepto que cada AUTO QSL INTERVAL QSOs se transmite el QSL MESSAGE. Esto se usa normalmente al tratar con un pile-up grande. Si establece AUTO QSL INTERVAL a 3, se enviarķa el QUICK QSL MESSAGE excepto cada tercer QSO. Un valor de cero desactiva esta función, en cuyo caso el QSL MESSAGE se envķa al final de cada QSO.

[AUTO QSO NUMBER DECREMENT]
DEFAULT=TRUE
; EN: If you have programmed an S&P exchange that includes a QSO number, you might find yourself in the situation in which you have just logged a station who is now asking for a repeat of the exchange you sent him. If you press F2, you will send the next QSO number, which will be one more than the one you sent the first time. To fix this problem, you can set AUTO QSO NUMBER DECREMENT to TRUE; this causes TR4W to decrement the QSO number when you press F2 when both the Call Window and the Exchange Window are empty.
DESCRIPTION=Si ha programado un intercambio de S&P que incluya un nśmero de QSO, puede encontrarse en la situación de haber registrado una estación que ahora le pide una repetición del intercambio que le envió. Si pulsa F2, enviarį el siguiente nśmero de QSO, que serį uno mįs que el enviado la primera vez. Para solucionarlo, puede establecer AUTO QSO NUMBER DECREMENT a TRUE; esto hace que TR4W decremente el nśmero de QSO al pulsar F2 cuando tanto la ventana de llamada como la ventana de intercambio estįn vacķas.

[AUTO RETURN TO CQ MODE]
DEFAULT=TRUE
; EN: If this parameter is TRUE, then pressing <Enter> in S&P Mode when there is no information in either the Call Window or the Exchange Window will cause TR4W to return to CQ Mode.
DESCRIPTION=Si este parįmetro es TRUE, pulsar <Enter> en modo S&P cuando no hay información ni en la ventana de llamada ni en la ventana de intercambio harį que TR4W vuelva al modo CQ.

[AUTO S&P ENABLE SENSITIVITY]
DEFAULT=500
; EN: Controls how quickly you must move the VFO (in Hz/sec) in order for the program to jump automatically into S&P Mode if AUTO S&P ENABLE is TRUE.
DESCRIPTION=Controla con qué rapidez debe mover el VFO (en Hz/s) para que el programa pase automįticamente al modo S&P si AUTO S&P ENABLE es TRUE.

[AUTO S&P ENABLE]
DEFAULT=FALSE
; EN: When this parameter is TRUE, TR4W will automatically jump into S&P Mode if it detects you have moved the VFO quickly. See also AUTO S&P See also AUTO S&P ENABLE SENSITIVITY.
DESCRIPTION=Cuando este parįmetro es TRUE, TR4W pasarį automįticamente al modo S&P si detecta que ha movido el VFO rįpidamente. Véase también AUTO S&P ENABLE SENSITIVITY.

[AUTO SEND CHARACTER COUNT]
DEFAULT=0
; EN: TR4W can start to send the callsign of a station responding to your CQ after you have typed a certain number of characters in the callsign of the calling station. This number of characters is controlled with the AUTO SEND CHARACTER COUNT command. For example, if you set AUTO SEND CHARACTER COUNT to 3 and 4U1ITU calls you, the program will start sending the call after you have typed 4U1. If you enable the AUTO CALL TERMINATE feature, the program will transmit the CQ EXCHANGE message when it has sent all the characters you have typed. When the AUTO SEND CHARACTER COUNT is non-zero, an arrow will appear above the Call Window to indicate the point at which TR4W will begin to transmit the callsign. You can disable this function with the Alt-- command. The arrow will then disappear. To re-enable it, press Alt-- again and the arrow will reappear. You can delete any unsent characters with the backspace key.
DESCRIPTION=TR4W puede empezar a enviar el indicativo de una estación que responde a su CQ después de que haya tecleado un cierto nśmero de caracteres del indicativo de la estación llamante. Este nśmero de caracteres se controla con el comando AUTO SEND CHARACTER COUNT. Por ejemplo, si establece AUTO SEND CHARACTER COUNT a 3 y le llama 4U1ITU, el programa empezarį a enviar el indicativo cuando haya tecleado 4U1. Si activa la función AUTO CALL TERMINATE, el programa transmitirį el mensaje CQ EXCHANGE cuando haya enviado todos los caracteres tecleados. Cuando AUTO SEND CHARACTER COUNT no es cero, aparecerį una flecha sobre la ventana de llamada para indicar el punto en el que TR4W comenzarį a transmitir el indicativo. Puede desactivar esta función con el comando Alt--. La flecha desaparecerį. Para reactivarla, pulse Alt-- de nuevo y la flecha reaparecerį. Puede borrar los caracteres no enviados con la tecla de retroceso.

[AUTO TIME INCREMENT]
DEFAULT=0
; EN: If you are entering a log by hand, the AUTO TIME INCREMENT feature can be very useful. Setting the value to a non-zero value n will cause the clock to increment by one after every n QSOs. A value of zero disables the feature.
DESCRIPTION=Si estį introduciendo un log manualmente, la función AUTO TIME INCREMENT puede ser muy śtil. Establecer el valor a un nśmero n distinto de cero harį que el reloj se incremente en uno después de cada n QSOs. Un valor de cero desactiva la función.

[AUTO-CQ DELAY TIME]
DEFAULT=3000
; EN:
DESCRIPTION=

[BAND MAP ALL BANDS]
DEFAULT=FALSE
; EN: If TRUE, the bandmap displays entries from all bands. If FALSE, the bandmap displays entries on the current band only. When the cursor is in the bandmap, the value of this flag may be toggled with the B key.
DESCRIPTION=Si es TRUE, el bandmap muestra entradas de todas las bandas. Si es FALSE, el bandmap muestra solo entradas de la banda actual. Cuando el cursor estį en el bandmap, el valor de este indicador puede conmutarse con la tecla B.

[BAND MAP ALL MODES]
DEFAULT=FALSE
; EN: If TRUE, the bandmap displays entries from all modes. If FALSE, the bandmap displays those entries associated with the current mode only. When the cursor is in the bandmap, the value of this flag may be toggled with the M key.
DESCRIPTION=Si es TRUE, el bandmap muestra entradas de todos los modos. Si es FALSE, el bandmap muestra solo las entradas asociadas al modo actual. Cuando el cursor estį en el bandmap, el valor de este indicador puede conmutarse con la tecla M.

[BAND MAP CALL WINDOW ENABLE]
DEFAULT=TRUE
; EN: When this is TRUE, and you tune to a frequency that has a station in the bandmap, the callsign and exchange information of the station will be displayed in the Call Window. This allows you to renew the entry by simply pressing the space bar1. The exchange information is shown to help you to identify the station quickly. If you start entering a new callsign, the entry in the Call Window will first be erased.
DESCRIPTION=Cuando es TRUE y sintoniza una frecuencia que tiene una estación en el bandmap, el indicativo y la información de intercambio de la estación se mostrarįn en la ventana de llamada. Esto le permite renovar la entrada simplemente pulsando la barra espaciadora. La información de intercambio se muestra para ayudarle a identificar la estación rįpidamente. Si comienza a introducir un nuevo indicativo, la entrada de la ventana de llamada se borrarį primero.

[BAND MAP CUTOFF FREQUENCY]
DEFAULT=0
; EN: Allows you to change, on a band-by-band basis, the frequency below which the mode is assumed to be CW and above which it is assumed to be SSB. When you enter a frequency (in Hz), TR4W will automatically deduce the band for which you are defining a new cutoff frequency. To define new cutoff frequencies for multiple bands, simply include the command as many times as necessary in your *.CFG file, once per cutoff frequency.
DESCRIPTION=Permite cambiar, banda por banda, la frecuencia por debajo de la cual se asume que el modo es CW y por encima de la cual se asume que es SSB. Cuando introduce una frecuencia (en Hz), TR4W deducirį automįticamente la banda para la que estį definiendo una nueva frecuencia de corte. Para definir nuevas frecuencias de corte para varias bandas, simplemente incluya el comando tantas veces como sea necesario en su fichero *.CFG, una vez por frecuencia de corte.

[BAND MAP DECAY TIME]
DEFAULT=60
; EN: This controls the number of minutes for which a new entry will remain visible on the bandmap. The value can be any positive integer less than 32,768. 1Renewing a station with QSX information in this manner will remove the QSX information.
DESCRIPTION=Controla el nśmero de minutos durante los que una nueva entrada permanecerį visible en el bandmap. El valor puede ser cualquier entero positivo menor que 32.768. Renovar una estación con información de QSX de esta manera eliminarį la información de QSX.

[BAND MAP DISPLAY CQ]
DEFAULT=TRUE
; EN: When FALSE, CQ entries will not appear in the band map.
DESCRIPTION=Cuando es FALSE, las entradas de CQ no aparecerįn en el bandmap.

[BAND MAP DISPLAY LIMIT]
DEFAULT=164
; EN: This parameter allows you to limit the number of spots the bandmap will display. Above the limit the displayed spots will be centred on the operating frequency. The value must be an even number between 30 and 1000.
DESCRIPTION=Este parįmetro le permite limitar el nśmero de spots que mostrarį el bandmap. Por encima del lķmite, los spots mostrados se centrarįn en la frecuencia de operación. El valor debe ser un nśmero par entre 30 y 1000.

[BAND MAP DUPE DISPLAY]
DEFAULT=TRUE
; EN: Controls whether the bandmap will dispay [D]upes.
DESCRIPTION=Controla si el bandmap mostrarį los duplicados.

[BAND MAP ENABLE]
DEFAULT=FALSE
; EN: Determines whether the bandmap is displayed. See section 6.13 for more information. If you start TR4W with the bandmap disabled, you will have to restart the program for it to be in the correct video mode to display the bandmap.
DESCRIPTION=Determina si se muestra el bandmap. Véase la sección 6.13 para mįs información. Si inicia TR4W con el bandmap desactivado, tendrį que reiniciar el programa para que esté en el modo de vķdeo correcto para mostrar el bandmap.

[BAND MAP GUARD BAND]
DEFAULT=200
; EN: Values: Integer (Hz). The bandmap will indicate if a displayed entry is near the frequency of your interfaced radio by causing the appropriate entry to highlight.
DESCRIPTION=Valores: entero (Hz). El bandmap indicarį si una entrada mostrada estį cerca de la frecuencia de su radio conectada resaltando la entrada correspondiente.

[BAND MAP ITEM HEIGHT]
DEFAULT=14
; EN: Height of band map items. Range of 100-200.
DESCRIPTION=Altura de los elementos del bandmap. Rango de 100 a 200.

[BAND MAP ITEM WIDTH]
DEFAULT=135
; EN: Band Map item width. Change this in accordance with BAND MAP SIZE. Range = 100-200.
DESCRIPTION=Anchura de los elementos del bandmap. Cįmbielo de acuerdo con BAND MAP SIZE. Rango = 100-200.

[BAND MAP MULTS ONLY]
DEFAULT=FALSE
; EN: Only display multipliers.
DESCRIPTION=Mostrar solo los multiplicadores.

[BAND MAP SIZE]
DEFAULT=2
; EN: Values range between smallest (0) and largest (8). You need to adjust BAND MAP ITEM HEIGHT accordingly.
DESCRIPTION=Los valores van entre el menor (0) y el mayor (8). Debe ajustar BAND MAP ITEM HEIGHT en consecuencia.

[BAND MAP SPLIT MODE]
DEFAULT=BY CUTOFF FREQ
; EN: This parameter allows you to handle properly the mode of stations that are on the bandmap and are operating split. The default value allows you to tailor the CW and PHONE ranges with the BAND MAP CUTOFF FREQUENCY command.
DESCRIPTION=Este parįmetro le permite gestionar correctamente el modo de las estaciones que estįn en el bandmap operando en split. El valor por defecto le permite ajustar los rangos de CW y PHONE con el comando BAND MAP CUTOFF FREQUENCY.

[BAND]
DEFAULT=160
; EN: You can select the band on which TR4W will start if no contacts have yet been made. After the program is running, use alt-B or alt-V to change band. Some contests are single-band contests and may not let you change bands after a QSO has been made.
DESCRIPTION=Puede seleccionar la banda en la que TR4W se iniciarį si aśn no se ha hecho ningśn contacto. Cuando el programa esté en ejecución, use alt-B o alt-V para cambiar de banda. Algunos concursos son monobanda y pueden no permitirle cambiar de banda después de haber realizado un QSO.

[BANDMAP ITEM HEIGHT]
DEFAULT=17
; EN: Height of item in band map window.
DESCRIPTION=Altura del elemento en la ventana del bandmap.

[BANDMAP ITEM WIDTH]
DEFAULT=139
; EN: Width of item in band map window. You can go from zero to five.
DESCRIPTION=Anchura del elemento en la ventana del bandmap. Puede ir de cero a cinco.

[BEEP ENABLE]
DEFAULT=TRUE
; EN: When set to FALSE, all beeps generated on the PC speaker by TR4W are disabled.
DESCRIPTION=Cuando se establece a FALSE, se desactivan todos los pitidos generados por TR4W en el altavoz del PC.

[BEEP EVERY 10 QSOS]
DEFAULT=FALSE
; EN: When set to TRUE, a short beep will be generated every tenth QSO. This is useful when entering a log by hand after the contest to make sure that you havent skipped any contacts.
DESCRIPTION=Cuando se establece a TRUE, se generarį un pitido corto cada diez QSOs. Esto resulta śtil al introducir un log a mano tras el concurso para asegurarse de no haber omitido ningśn contacto.

[BOLD FONT]
DEFAULT=TRUE
; EN: Set bold font in program windows.
DESCRIPTION=Activa la fuente en negrita en las ventanas del programa.

[BROADCAST ALL PACKET DATA]
DEFAULT=TRUE
; EN: When this parameter is set to TRUE and you are using a multi network, all data coming from the TNC are sent to all the computers in the network, where the packet information is viewable with the ctrl-B command. Commands may also be sent from any computer on the network to the TNC. Beware that data are not sent to the TNC until <Enter> is pressed.
DESCRIPTION=Cuando este parįmetro se establece a TRUE y estį utilizando una red multi, todos los datos procedentes del TNC se envķan a todos los ordenadores de la red, donde la información de packet puede verse con el comando ctrl-B. También pueden enviarse comandos desde cualquier ordenador de la red al TNC. Tenga en cuenta que los datos no se envķan al TNC hasta que se pulsa <Enter>.

[CALL WINDOW SHOW ALL SPOTS]
DEFAULT=FALSE
; EN: When TRUE, as you tune in S&P Mode, all calls that TR4W knows about will appear in the Call Window even if they do not appear in the bandmap. For example, if you have BAND MAP DUPE DISPLAY set to FALSE, dupes will not appear in the bandmap, but they still appear in the Call Window if CALL WINDOW SHOW ALL SPOTS is TRUE.
DESCRIPTION=Cuando es TRUE, al sintonizar en modo S&P, todos los indicativos que TR4W conozca aparecerįn en la ventana de llamada aunque no aparezcan en el bandmap. Por ejemplo, si tiene BAND MAP DUPE DISPLAY establecido a FALSE, los duplicados no aparecerįn en el bandmap, pero seguirįn apareciendo en la ventana de llamada si CALL WINDOW SHOW ALL SPOTS es TRUE.

[CALLSIGN UPDATE ENABLE]
DEFAULT=FALSE
; EN: When this parameter is set to TRUE, TR4W will parse the Exchange Window looking for callsigns; if it finds one, the program will act exactly as if the call had been changed in the Call Window. You must type in the complete call, and spaces must both precede and follow it. If this parameter is TRUE, ctrl-U will send the call in the Exchange Window (otherwise it sends the call in the Call Window).
DESCRIPTION=Cuando este parįmetro se establece a TRUE, TR4W analizarį la ventana de intercambio buscando indicativos; si encuentra uno, el programa actuarį exactamente como si el indicativo se hubiera cambiado en la ventana de llamada. Debe teclear el indicativo completo, y deben precederlo y seguirlo espacios. Si este parįmetro es TRUE, ctrl-U enviarį el indicativo de la ventana de intercambio (en caso contrario envķa el de la ventana de llamada).

[CATEGORY-ASSISTED]
DEFAULT=NON-ASSISTED
; EN: Used to generate Cabrillo file and for posting score to on-line score systems.
DESCRIPTION=Se utiliza para generar el fichero CABRILLO y para publicar la puntuación en sistemas de puntuación en lķnea.

[CATEGORY-BAND]
DEFAULT=ALL
; EN: Used to generate Cabrillo file and for posting score to on-line score systems.
DESCRIPTION=Se utiliza para generar el fichero CABRILLO y para publicar la puntuación en sistemas de puntuación en lķnea.

[CATEGORY-MODE]
DEFAULT=CW
; EN: Used to generate Cabrillo file and for posting score to on-line score systems.
DESCRIPTION=Se utiliza para generar el fichero CABRILLO y para publicar la puntuación en sistemas de puntuación en lķnea.

[CATEGORY-OPERATOR]
DEFAULT=SINGLE-OP
; EN: Used to generate Cabrillo file and for posting score to on-line score systems.
DESCRIPTION=Se utiliza para generar el fichero CABRILLO y para publicar la puntuación en sistemas de puntuación en lķnea.

[CATEGORY-POWER]
DEFAULT=HIGH
; EN: Used to generate Cabrillo file and for posting score to on-line score systems.
DESCRIPTION=Se utiliza para generar el fichero CABRILLO y para publicar la puntuación en sistemas de puntuación en lķnea.

[CATEGORY-TRANSMITTER]
DEFAULT=ONE
; EN: Used to generate Cabrillo file and for posting score to on-line score systems.
DESCRIPTION=Se utiliza para generar el fichero CABRILLO y para publicar la puntuación en sistemas de puntuación en lķnea.

[CHECK LOG FILE SIZE]
DEFAULT=FALSE
; EN: When TRUE, TR4W will check the size of the log *.trw file to ensure it is the proper size for the number of contacts. This feature can alert you to a disk failure and prevent you from losing too much data. If this error occurs, you should stop the program, back up the files you have to a floppy, run a disk utility to see if you can recover any lost data, and then reboot your computer.
DESCRIPTION=Cuando es TRUE, TR4W comprobarį el tamańo del fichero de log *.trw para asegurarse de que tiene el tamańo correcto para el nśmero de contactos. Esta función puede alertarle de un fallo de disco y evitar que pierda demasiados datos. Si se produce este error, deberķa detener el programa, hacer copia de seguridad de los ficheros, ejecutar una utilidad de disco para ver si puede recuperar datos perdidos, y reiniciar el ordenador.

[CLEAR DUPE SHEET]
DEFAULT=FALSE
; EN: Program will clear the dupesheet when this parameter is set to TRUE in a *.CFG file that is executed with the ctrl-V command. TR4W does nothing if the command is found in the *.CFG file during the start-up process.
DESCRIPTION=El programa borrarį la hoja de duplicados cuando este parįmetro se establezca a TRUE en un fichero *.CFG que se ejecute con el comando ctrl-V. TR4W no hace nada si el comando se encuentra en el fichero *.CFG durante el proceso de arranque.

[CODE SPEED]
DEFAULT=35
; EN: Use this command to set the CW speed at which TR4W will start. While the program is running, you can use the alt-S command to set a new speed or use the Page-Up/Page-Down keys to change the code speed in increments of CW SPEED INCREMENT, which is 3 WPM by default. The changes instantly affect any CW being sent.
DESCRIPTION=Utilice este comando para establecer la velocidad de CW con la que se iniciarį TR4W. Mientras el programa esté en ejecución, puede usar el comando alt-S para establecer una nueva velocidad o usar las teclas Page-Up/Page-Down para cambiar la velocidad en incrementos de CW SPEED INCREMENT, que es 3 WPM por defecto. Los cambios afectan instantįneamente al CW que se esté enviando.

[COLUMN DUPESHEET ENABLE]
DEFAULT=FALSE
; EN: This parameter controls the format of the visible dupesheet when it is displayed in VGA mode below the normal operating screen. When TRUE, TR4W will place each of the ten numerical call districts in its own column. This makes it easier to find a specific call quickly. If two columns each contain more than 25 calls, the display of the dupesheet reverts to its normal mode.
DESCRIPTION=Este parįmetro controla el formato de la hoja de duplicados visible cuando se muestra en modo VGA debajo de la pantalla normal de operación. Cuando es TRUE, TR4W colocarį cada uno de los diez distritos numéricos en su propia columna. Esto hace mįs fįcil encontrar rįpidamente un indicativo concreto. Si dos columnas contienen cada una mįs de 25 indicativos, la visualización de la hoja de duplicados vuelve al modo normal.

[COMPLETE CALLSIGN MASK]
DEFAULT=NONE
; EN: A string defines a mask call, which will be inserted into the input box when you hit function key programmed with the command <03>COMPLETECALL<04>.
DESCRIPTION=Una cadena define un indicativo de mįscara, que se insertarį en el cuadro de entrada cuando pulse la tecla de función programada con el comando <03>COMPLETECALL<04>.

[COMPUTER ID]
DEFAULT=
; EN: Values: A to Z, or none. When the COMPUTER ID is set to a letter, that letter will be printed just after the QSO number in the log sheet. There is a command in POST that can be used to separate the logs by COMPUTER ID, which can be useful in multi-multi environments.
DESCRIPTION=Valores: de A a Z, o ninguno. Cuando COMPUTER ID se establece a una letra, esa letra se imprimirį justo después del nśmero de QSO en la hoja del log. Hay un comando en POST que puede usarse para separar los logs por COMPUTER ID, lo cual puede ser śtil en entornos multi-multi.

[COMPUTER NAME]
DEFAULT=New
; EN: The name of the computer in the TR4W network. The name will be displayed in the window "Network".
DESCRIPTION=El nombre del ordenador en la red TR4W. El nombre se mostrarį en la ventana "Network".

[CONFIRM EDIT CHANGES]
DEFAULT=TRUE
; EN: This parameter determines whether you are asked if you want to save the changes made after editing one of your five most recent QSOs (i.e., the QSOs in the editable log) using the alt-E command. Normally, TR4W will ask you whether you want to save changes before updating the LOG.TMP file. To stop TR4W from asking this question, set this parameter to FALSE.
DESCRIPTION=Este parįmetro determina si se le pregunta si desea guardar los cambios realizados tras editar uno de sus cinco QSOs mįs recientes (es decir, los QSOs del log editable) usando el comando alt-E. Normalmente, TR4W le preguntarį si desea guardar los cambios antes de actualizar el fichero LOG.TMP. Para que TR4W deje de hacer esta pregunta, establezca este parįmetro a FALSE.

[CONNECTION AT STARTUP]
DEFAULT=FALSE
; EN: If the value is TRUE and if "DX-Cluster" window is opened the program will try to connect to telnet cluster at startup.
DESCRIPTION=Si el valor es TRUE y la ventana "DX-Cluster" estį abierta, el programa intentarį conectarse al cluster telnet en el arranque.

[CONNECTION COMMAND]
DEFAULT=NONE
; EN: Command determines the string that will be sent to telnet DX-cluster at connection.
DESCRIPTION=El comando determina la cadena que se enviarį al DX-cluster telnet al conectar.

[CONTACTS PER PAGE]
DEFAULT=50
; EN: This controls the number of contacts printed on each page of the log.
DESCRIPTION=Controla el nśmero de contactos impresos en cada pįgina del log.

[CONTEST NAME]
DEFAULT=NONE
; EN: This parameter specifies the name of the contest. TR4W adds your call and the year to generate the CONTEST TITLE.
DESCRIPTION=Este parįmetro especifica el nombre del concurso. TR4W ańade su indicativo y el ańo para generar el CONTEST TITLE.

[CONTEST TITLE]
DEFAULT=NONE
; EN: The CONTEST TITLE is displayed at the top of the screen and in the header of the log pages.
DESCRIPTION=El CONTEST TITLE se muestra en la parte superior de la pantalla y en la cabecera de las pįginas del log.

[CONTEST]
DEFAULT=DUMMY CONTEST
; EN: The CONTEST statement tells TR4W which contest you are going to operate.
DESCRIPTION=La sentencia CONTEST le indica a TR4W qué concurso va a operar.

[COUNT DOMESTIC COUNTRIES]
DEFAULT=FALSE
; EN: Setting this parameter to TRUE causes TR4W to include domestic QSOs in the count of DX countries. (This is in addition to any domestic multiplier that the QSO might accrue.)
DESCRIPTION=Establecer este parįmetro a TRUE hace que TR4W incluya los QSOs nacionales en el recuento de paķses DX. (Esto es adicional a cualquier multiplicador nacional que pueda aportar el QSO.)

[COUNTRY INFORMATION FILE]
DEFAULT=NONE
; EN: This command allows you to specify a file that has up to five lines of text associated with a country (countries are defined by the CTY.DAT file). The text will be displayed in the editable log window when you work the station. The file format consists of the country ID character (as used in the CTY.DAT file) on the first line, followed by up to five lines of text. A blank line indicates the end of the data and can be followed by the next country ID. There is no limit to the file size or to the number of countries.
DESCRIPTION=Este comando le permite especificar un fichero que tenga hasta cinco lķneas de texto asociadas a un paķs (los paķses se definen en el fichero CTY.DAT). El texto se mostrarį en la ventana del log editable cuando trabaje la estación. El formato del fichero consiste en el carįcter identificador del paķs (como se usa en el fichero CTY.DAT) en la primera lķnea, seguido de hasta cinco lķneas de texto. Una lķnea en blanco indica el final de los datos y puede ir seguida del siguiente identificador de paķs. No hay lķmite en el tamańo del fichero ni en el nśmero de paķses.

[CUSTOM CARET]
DEFAULT=TRUE
; EN: If the value is TRUE in the callsign and exchange windows of the main window will be created rectangular carriage.
DESCRIPTION=Si el valor es TRUE, en las ventanas de indicativo e intercambio de la ventana principal se crearį un cursor rectangular.

[CUSTOM INITIAL EXCHANGE STRING]
DEFAULT=NONE
; EN: This string defines how your initial exchange will be constructed if you set INITIAL EXCHANGE to the value CUSTOM. You may select any number of the following fields, and put them in any order: CHECK, CQZONE, FOC, GRID, ITUZONE, NAME, OLDCALL, QTH, SECTION, TENTEN, USER1, USER2, USER3, USER4 and USER5.
DESCRIPTION=Esta cadena define cómo se construirį su intercambio inicial si establece INITIAL EXCHANGE al valor CUSTOM. Puede seleccionar cualquier nśmero de los siguientes campos y colocarlos en cualquier orden: CHECK, CQZONE, FOC, GRID, ITUZONE, NAME, OLDCALL, QTH, SECTION, TENTEN, USER1, USER2, USER3, USER4 y USER5.

[CUSTOM USER STRING]
DEFAULT=NONE
; EN: This string defines how your user info will be shown if you set USER INFO SHOWN to the value CUSTOM. You may select any number of the following fields, and put them in any order: CHECK, CQZONE, FOC, GRID, ITUZONE, NAME, OLDCALL, QTH, SECTION, TENTEN, USER1, USER2, USER3, USER4 and USER5.
DESCRIPTION=Esta cadena define cómo se mostrarį su información de usuario si establece USER INFO SHOWN al valor CUSTOM. Puede seleccionar cualquier nśmero de los siguientes campos y colocarlos en cualquier orden: CHECK, CQZONE, FOC, GRID, ITUZONE, NAME, OLDCALL, QTH, SECTION, TENTEN, USER1, USER2, USER3, USER4 y USER5.

[CW ENABLE]
DEFAULT=TRUE
; EN: When this parameter is FALSE, the computer is prevented from sending any CW, except CW sent from the paddle.
DESCRIPTION=Cuando este parįmetro es FALSE, se impide que el ordenador envķe CW, excepto el CW enviado desde el manipulador.

[CW SPEED FROM DATABASE]
DEFAULT=FALSE
; EN: When this parameter is true, TR4W will look in the TRMASTER database for a CW Speed entry for the callsign you are working. If it finds one, it will send the CQ EXCHANGE at that speed. The CW speed will return to the previous value when sending the QSL MESSAGE or a new CQ (if the QSO is aborted).
DESCRIPTION=Cuando este parįmetro es true, TR4W buscarį en la base de datos TRMASTER una entrada de velocidad de CW para el indicativo que estį trabajando. Si encuentra una, enviarį el CQ EXCHANGE a esa velocidad. La velocidad de CW volverį al valor anterior al enviar el QSL MESSAGE o un nuevo CQ (si el QSO se aborta).

[CW SPEED INCREMENT]
DEFAULT=3
; EN:
DESCRIPTION=

[CW TONE]
DEFAULT=700
; EN: The computer can send the CW over its speaker for the purpose of monitoring the transmission. This command allows you to select the pitch of that CW. Setting the value to zero disables sending the CW to the speaker (but the rig will still be keyed). The PADDLE MONITOR TONE command separately controls the tone frequency of CW sent with the paddle.
DESCRIPTION=El ordenador puede enviar el CW por su altavoz para monitorizar la transmisión. Este comando le permite seleccionar el tono de ese CW. Establecer el valor a cero desactiva el envķo de CW al altavoz (pero la radio seguirį siendo manipulada). El comando PADDLE MONITOR TONE controla por separado la frecuencia del tono del CW enviado con el manipulador.

[DE ENABLE]
DEFAULT=TRUE
; EN: This determines whether DE is sent before your callsign when using the F1 key in S&P Mode. If you dont want the program to put DE in front of your call (which is the case for most operators), set this flag to FALSE.
DESCRIPTION=Determina si se envķa DE delante de su indicativo cuando se utiliza la tecla F1 en modo S&P. Si no desea que el programa anteponga DE a su indicativo (que es el caso de la mayorķa de operadores), establezca este indicador a FALSE.

[DEBUG LOG LEVEL]
DEFAULT=NONE
; EN: Normally set to NONE. Support may request the following options: NONE, FATAL, ERROR, WARN, INFO, DEBUG, and TRACE. Check TR4W directory for file named tr4w.log
DESCRIPTION=Normalmente se establece a NONE. El soporte técnico puede solicitar las siguientes opciones: NONE, FATAL, ERROR, WARN, INFO, DEBUG y TRACE. Consulte el directorio de TR4W para encontrar el fichero llamado tr4w.log.


[DIGITAL MODE ENABLE]
DEFAULT=FALSE
; EN: When this parameter is TRUE, you can select DIG as a mode when using the alt-M command. DIG is treated as a distinct mode, separate from CW and SSB. This feature is intended to allow you to log digital QSOs made during the ARRL Field Day.
DESCRIPTION=Cuando este parįmetro es TRUE, puede seleccionar DIG como modo al utilizar el comando alt-M. DIG se trata como un modo distinto, separado de CW y SSB. Esta función estį pensada para permitirle registrar QSOs digitales realizados durante el ARRL Field Day.

[DISPLAY REFRESH]
DEFAULT=1
; EN: Number of spots buffered in range of (1-10) before a screen refresh occurs. This reduces screen blinking but also reduces accuracy of spots as the spots buffer and screen display can get out of sync. When buffering spots, it is important to select spots as close to time of screen refresh as possible.
DESCRIPTION=Nśmero de spots almacenados en bśfer en el rango (1-10) antes de que se produzca un refresco de pantalla. Esto reduce el parpadeo de la pantalla pero también reduce la precisión de los spots ya que el bśfer y la pantalla pueden desincronizarse. Al almacenar spots en bśfer es importante seleccionar spots lo mįs próximos posible al momento del refresco.

[DISTANCE MODE]
DEFAULT=KM
; EN: This parameter controls the display of the distance to the station you are working. The distance is shown along with the beam headings. The value of the distance depends on the value of RADIUS OF EARTH.
DESCRIPTION=Este parįmetro controla la visualización de la distancia a la estación que estį trabajando. La distancia se muestra junto con los rumbos de la antena. El valor de la distancia depende del valor de RADIUS OF EARTH.

[DIT DAH RATIO]
DEFAULT=3
; EN: Ratio dit/dah in CW.
DESCRIPTION=Relación dit/dah en CW.

[DOMESTIC FILENAME]
DEFAULT=NONE
; EN: This command allows you to specify the name of the domestic multiplier file that will be used by the program. This is normally determined by TR4W automatically when you specify a certain contest with the CONTEST parameter. However, if you are creating your own domestic multiplier file and want the program to use yours instead, you can use this command. Make sure you also set the DOMESTIC MULTIPLIER parameter to the value DOMESTIC FILE, so that TR4W will know to look for a file.
DESCRIPTION=Este comando le permite especificar el nombre del fichero de multiplicadores nacionales que utilizarį el programa. Esto normalmente lo determina TR4W automįticamente cuando especifica un concurso concreto con el parįmetro CONTEST. Sin embargo, si estį creando su propio fichero de multiplicadores nacionales y desea que el programa utilice el suyo, puede usar este comando. Asegśrese también de establecer el parįmetro DOMESTIC MULTIPLIER al valor DOMESTIC FILE, para que TR4W sepa que debe buscar un fichero.

[DOMESTIC MULTIPLIER]
DEFAULT=NONE
; EN: This parameter defines which type of domestic multiplier the program will use.
DESCRIPTION=Este parįmetro define qué tipo de multiplicador nacional utilizarį el programa.

[DUPE CHECK SOUND]
DEFAULT=DUPE BEEP
; EN: When performing a dupe check with the space bar, TR4W will normally generate a beep if the station is a dupe. However, you can change the program to be silent, or to use the fanfare sound instead.
DESCRIPTION=Al realizar una comprobación de duplicados con la barra espaciadora, TR4W normalmente generarį un pitido si la estación es un duplicado. Sin embargo, puede cambiar el programa para que sea silencioso o para que use el sonido de fanfarria en su lugar.

[DUPE SHEET AUTO RESET]
DEFAULT=TRUE
; EN: When TRUE the program will automatically reset dupe sheet after each tour in multi-tours contests.
DESCRIPTION=Cuando es TRUE, el programa reiniciarį automįticamente la hoja de duplicados tras cada turno en concursos multi-turno.

[DVK ENABLE]
DEFAULT=FALSE
; EN: This command determines whether the DVK is enabled.
DESCRIPTION=Este comando determina si el DVK estį habilitado.

[DVK PATH]
DEFAULT=DVK
; EN:
DESCRIPTION=

[DVK RECORDER]
DEFAULT=NONE
; EN:
DESCRIPTION=

[DX MULTIPLIER]
DEFAULT=NONE
; EN: This command determines which type of DX multiplier the program will use.
DESCRIPTION=Este comando determina qué tipo de multiplicador DX utilizarį el programa.

[ESCAPE EXITS SEARCH AND POUNCE]
DEFAULT=TRUE
; EN: When this parameter is TRUE, pressing <Esc> when in S&P Mode causes TR4W to revert to CQ Mode. When the parameter is FALSE, the only way to revert to CQ Mode is to press shift-Tab. However, the FALSE setting is ignored if you have a call ready for a QSO on the other rig. This allows you to abort a second-radio QSO with <Esc> even if this parameter is FALSE.
DESCRIPTION=Cuando este parįmetro es TRUE, pulsar <Esc> en modo S&P hace que TR4W vuelva al modo CQ. Cuando el parįmetro es FALSE, la śnica forma de volver al modo CQ es pulsar shift-Tab. Sin embargo, el ajuste FALSE se ignora si tiene un indicativo listo para un QSO en la otra radio. Esto le permite abortar un QSO de la segunda radio con <Esc> aunque este parįmetro sea FALSE.

[EXCHANGE MEMORY ENABLE]
DEFAULT=TRUE
; EN: This parameter allows you to control whether the TR4W exchange memory is used. The exchange memory is useful when working the same station on different bands or modes, and when the exchange contains either a class (e.g., ARRL Field Day), power (ARRL DX), age (All Asian), name, ITU Society name (IARU), zone, or Domestic QTH. If you have worked the station before in the contest, the constant information will appear without you having to re-enter it. Please note that this information is lost if you stop TR4W and the *.RST file is deleted.
DESCRIPTION=Este parįmetro le permite controlar si se utiliza la memoria de intercambio de TR4W. La memoria de intercambio resulta śtil al trabajar la misma estación en diferentes bandas o modos, y cuando el intercambio contiene una clase (p. ej., ARRL Field Day), potencia (ARRL DX), edad (All Asian), nombre, nombre de sociedad ITU (IARU), zona o QTH nacional. Si ya ha trabajado la estación antes en el concurso, la información constante aparecerį sin que tenga que reintroducirla. Tenga en cuenta que esta información se pierde si detiene TR4W y se elimina el fichero *.RST.

[EXCHANGE RECEIVED]
DEFAULT=UNKNOWN
; EN: This parameter tells TR4W what kind of exchange data to expect. It is normally controlled by the CONTEST statement in the.*.CFG file.
DESCRIPTION=Este parįmetro le indica a TR4W qué tipo de datos de intercambio debe esperar. Normalmente se controla mediante la sentencia CONTEST en el fichero *.CFG.

[EXTERNAl LOGGER]
DEFAULT=None
; EN: The external logger type (currently DXKeeper, ACLog and HRD but ACLog andHRD are not yet implemented)
DESCRIPTION=El tipo de logger externo (actualmente DXKeeper, ACLog y HRD, pero ACLog y HRD todavķa no estįn implementados).

[EXTERNAl LOGGER ADDRESS]
DEFAULT=127.0.0.1
; EN: IP address of the external logger computer
DESCRIPTION=Dirección IP del ordenador del logger externo.

[EXTERNAl LOGGER ENABLED]
DEFAULT=FALSE
; EN: If TRUE, then contacts arer sent directly to the external logging program via a TCP/IP interface. Note loggers that use the N1MM UDP COntactInfo messages, can be used by just enabling UDP Broadcasts for the Contact (see below).
DESCRIPTION=Si es TRUE, los contactos se envķan directamente al programa de logging externo a través de una interfaz TCP/IP. Los loggers que usan los mensajes UDP ContactInfo de N1MM pueden utilizarse simplemente activando los UDP Broadcasts para el contacto (véase mįs abajo).

[EXTERNAl LOGGER PORT]
DEFAULT=0
; EN: TCP/IP port number used to connect to the external logger socket
DESCRIPTION=Nśmero de puerto TCP/IP utilizado para conectarse al socket del logger externo.

[FARNSWORTH ENABLE]
DEFAULT=FALSE
; EN: When slowing down the CW speed, it is often desirable to increase the space between letters. Turning on FARNSWORTH ENABLE will increase the spaces between letters exponentially as your speed decreases below the value of FARNSWORTH SPEED (default is 25 WPM). You can control this parameter dynamically while sending a CW message.
DESCRIPTION=Al reducir la velocidad de CW, a menudo es deseable aumentar el espacio entre letras. Activar FARNSWORTH ENABLE incrementarį los espacios entre letras exponencialmente a medida que la velocidad disminuya por debajo del valor de FARNSWORTH SPEED (25 WPM por defecto). Puede controlar este parįmetro dinįmicamente mientras envķa un mensaje CW.

[FARNSWORTH SPEED]
DEFAULT=25
; EN: Values: Integer (WPM). Controls the CW speed at which the Farnsworth effect starts. As you decrease the code speed below this value, there will be exponentially more space added between characters. For increased Farnsworth effect at very slow speeds, increase the value of FARNSWORTH SPEED. You can also control this parameter dynamically within CW messages.
DESCRIPTION=Valores: entero (WPM). Controla la velocidad de CW a la que comienza el efecto Farnsworth. A medida que disminuye la velocidad por debajo de este valor, se ańadirį exponencialmente mįs espacio entre caracteres. Para un mayor efecto Farnsworth a velocidades muy lentas, aumente el valor de FARNSWORTH SPEED. También puede controlar este parįmetro dinįmicamente dentro de los mensajes CW.

[FLOPPY FILE SAVE FREQUENCY]
DEFAULT=0
; EN: Values: Integer (# of contacts). This command allows you to control how frequently TR4W saves the current log to another file. A value of 0 (which is the default) disables this feature.
DESCRIPTION=Valores: entero (nŗ de contactos). Este comando le permite controlar la frecuencia con la que TR4W guarda el log actual en otro fichero. Un valor de 0 (el valor por defecto) desactiva esta función.

[FLOPPY FILE SAVE NAME]
DEFAULT=C:\LOGBACK.TRW
; EN: This command allows you to backup the *.TRW file periodically throughout the contest to another disk drive. To enable this fetaure, set the FLOPPY FILE SAVE FREQUENCY equal to the number of contacts you wish to make between backups. The name of the file to which the backup will be made is controlled by the FLOPPY FILE SAVE NAME command. The names of these commands are misleading: you can make backups to any drive; you can even make backups to the current working directory as long as the name of the backup file is something different from *.TRW.
DESCRIPTION=Este comando le permite hacer copias de seguridad del fichero *.TRW periódicamente durante el concurso a otra unidad de disco. Para habilitar esta función, establezca FLOPPY FILE SAVE FREQUENCY igual al nśmero de contactos que desea hacer entre copias. El nombre del fichero al que se harį la copia se controla con el comando FLOPPY FILE SAVE NAME. Los nombres de estos comandos pueden inducir a error: puede hacer copias a cualquier unidad; incluso puede hacer copias al directorio de trabajo actual siempre que el nombre del fichero de copia sea distinto de *.TRW.

[FONT SIZE]
DEFAULT=2
; EN: Adjust some font sizes down to '0' and upto '2'. This may affect other windows, like bandmap (See Band Map Size setting)
DESCRIPTION=Ajusta algunos tamańos de fuente entre '0' y '2'. Esto puede afectar a otras ventanas, como el bandmap (véase el ajuste Band Map Size).

[FOOT SWITCH MODE]
DEFAULT=DISABLED
; EN: This command determines what happens when you press a foot switch that is connected to pin 15 of the port specified by the FOOT SWITCH PORT command.
DESCRIPTION=Este comando determina qué ocurre cuando pulsa un pedal conectado al pin 15 del puerto especificado por el comando FOOT SWITCH PORT.

[FOOT SWITCH PORT]
DEFAULT=NONE
; EN:
DESCRIPTION=

[FREQUENCY ADDER RADIO ONE]
DEFAULT=0
; EN:
DESCRIPTION=

[FREQUENCY ADDER RADIO TWO]
DEFAULT=0
; EN:
DESCRIPTION=

[FREQUENCY MEMORY ENABLE]
DEFAULT=TRUE
; EN: When set to TRUE, this parameter will enable the frequency memory. This means that you will return to the frequency you were last using when returning to a band (even with the other radio).
DESCRIPTION=Cuando se establece a TRUE, este parįmetro activarį la memoria de frecuencia. Esto significa que volverį a la śltima frecuencia que estaba utilizando al volver a una banda (incluso con la otra radio).

[FREQUENCY MEMORY]
DEFAULT=NONE
; EN: Values: Frequency (kHz). When TR4W first switches to a band/mode, it has a frequency that it will go to as a default. Use this command if you would like to change the default value. Use this command once per band that you would like to change. If you are specifying a frequency that might be processed as a CW frequency but which you want to be used as an SSB frequency, put SSB in front of it (e.g.:FREQUENCY MEMORY = SSB 7050). Note that these defaults will be updated with actual frequencies used for later band/mode changes if you set FREQUENCY MEMORY ENABLE to TRUE.
DESCRIPTION=Valores: frecuencia (kHz). Cuando TR4W cambia por primera vez a una banda/modo, tiene una frecuencia a la que irį por defecto. Use este comando si desea cambiar el valor por defecto. Use este comando una vez por cada banda que desee cambiar. Si estį especificando una frecuencia que podrķa procesarse como frecuencia de CW pero que desea que se use como frecuencia de SSB, anteponga SSB (p. ej.: FREQUENCY MEMORY = SSB 7050). Tenga en cuenta que estos valores por defecto se actualizarįn con las frecuencias reales utilizadas en los cambios posteriores de banda/modo si establece FREQUENCY MEMORY ENABLE a TRUE.

[FREQUENCY POLL RATE]
DEFAULT=10
; EN: Values: Integer 10 to 1000 (msec). This command tells TR4W how frequently to poll the rig for a new frequency. The value is in milliseconds, and the allowed values are in the range 10 to 1000.
DESCRIPTION=Valores: entero de 10 a 1000 (ms). Este comando le indica a TR4W con qué frecuencia debe consultar a la radio una nueva frecuencia. El valor estį en milisegundos, y los valores permitidos estįn en el rango de 10 a 1000.

[GRID MAP CENTER]
DEFAULT=NONE
; EN: Values: Four- or six-character grid reference. This parameter will set the centre of a grid map that will show you at a glance the grids you have worked. The grid map will be displayed in VGA mode (if available). The ctrl-Left and ctrl-Right keys may be used to move the grid map sideways. (There is no way to move the grid map vertically.)
DESCRIPTION=Valores: referencia de grid de cuatro o seis caracteres. Este parįmetro establecerį el centro de un mapa de grids que le mostrarį de un vistazo los grids que ha trabajado. El mapa se mostrarį en modo VGA (si estį disponible). Las teclas ctrl-Left y ctrl-Right pueden utilizarse para desplazar el mapa lateralmente. (No hay forma de desplazarlo verticalmente.)

[HAMLIB PATH]
DEFAULT=NONE
; EN: This is the location of the HamLib rigctld executable and its associated DLL (libhamlib-4.dll)
DESCRIPTION=Esta es la ubicación del ejecutable rigctld de HamLib y su DLL asociada (libhamlib-4.dll).

[HAMLIB RIGCTLD PORT]
DEFAULT=4532
; EN: TR4W connects to rigctld via a TCP/IP socket. This is the socket that rigctld where listens for connections. The default in rigctld is 4532.
DESCRIPTION=TR4W se conecta a rigctld a través de un socket TCP/IP. Este es el socket en el que rigctld escucha conexiones. El valor por defecto en rigctld es 4532.

[HAMLIB RIGCTLD IP ADDRESS]
DEFAULT=127.0.0.1
; EN: TR4W connects to rigctld via a TCP/IP socket. This is the IP address of the computer where rigctld is running. This will normally always be 127.0.0.1 but the option is here for special cases where the hamlib is running on a different computer.
DESCRIPTION=TR4W se conecta a rigctld a través de un socket TCP/IP. Esta es la dirección IP del ordenador donde se ejecuta rigctld. Normalmente serį siempre 127.0.0.1 pero la opción estį disponible para casos especiales en los que hamlib se ejecuta en otro ordenador.

[HAMLIB RIGCTLD RUN AT STARTUP]
DEFAULT=TRUE
; EN: This tells TR4W to launch the rigctld process when TR4W starts up and to shut it down when TR4W closes. In some case, one may want to use rigctld that was started previously. This should always be TRUE unless you have a very specific case and are well aware of what you are doing.This tells TR4W to launch the rigctld process when TR4W starts up and to shut it down when TR4W closes. In some case, one may want to use rigctld that was started previously. This should always be TRUE unless you have a very specific case and are well aware of what you are doing.
DESCRIPTION=Indica a TR4W que lance el proceso rigctld cuando TR4W se inicia y que lo cierre cuando TR4W se cierra. En algunos casos, puede que se desee utilizar un rigctld iniciado previamente. Esto deberķa ser siempre TRUE salvo que tenga un caso muy especķfico y sepa bien lo que estį haciendo.

[HAND LOG MODE]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[HF BAND ENABLE]
DEFAULT=TRUE
; EN: This parameter enables the HF bands below 30 MHz. It is automatically set to FALSE when you select a VHF contest.
DESCRIPTION=Este parįmetro activa las bandas de HF por debajo de 30 MHz. Se establece automįticamente a FALSE cuando se selecciona un concurso de VHF.

[HOUR DISPLAY]
DEFAULT=THIS HOUR
; EN: Values: THIS HOUR, LAST SIXTY MINUTES or BAND CHANGES. This parameter determines how the hour rate display works. In the THIS HOUR mode, it shows the number of QSOs made during the current hour (starting at 15:00, for example). In the LAST SIXTY MINUTES, it shows the number of contacts made during the last 60 minutes. The BAND CHANGES mode will count how many band changes have been made since the current hour began.
DESCRIPTION=Valores: THIS HOUR, LAST SIXTY MINUTES o BAND CHANGES. Este parįmetro determina cómo funciona la visualización de ritmo horario. En el modo THIS HOUR, muestra el nśmero de QSOs realizados durante la hora actual (a partir de las 15:00, por ejemplo). En el modo LAST SIXTY MINUTES, muestra el nśmero de contactos realizados durante los śltimos 60 minutos. El modo BAND CHANGES contarį cuįntos cambios de banda se han hecho desde que comenzó la hora actual.

[IE SWITCH]
DEFAULT=FALSE
; EN: If TRUE, only spots matched to active InitialExhange and TRMaster File will display to BandMap.
DESCRIPTION=Si es TRUE, solo se mostrarįn en el BandMap los spots que coincidan con el InitialExchange activo y con el fichero TRMaster.

[IN BAND LOCKOUT]
DEFAULT=TRUE
; EN: values:True/False. Default of TRUE prevents Band Map selection that would place both radios on a single band.
DESCRIPTION=Valores: True/False. El valor por defecto TRUE impide selecciones en el Band Map que colocarķan ambas radios en una misma banda.


[INCLUDE F-KEY NUMBER]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[INCREMENT TIME ENABLE]
DEFAULT=FALSE
; EN: Determines whether the "increment time function" using Alt-1 to Alt-0 is enabled. If this flag is set to TRUE, the alt-1 to alt-0 keys will increment the time by 1 to 10 minutes respectively. This function can be useful when entering a log by hand after the contest.
DESCRIPTION=Determina si estį habilitada la "función de incremento de tiempo" usando Alt-1 a Alt-0. Si este indicador se establece a TRUE, las teclas alt-1 a alt-0 incrementarįn el tiempo de 1 a 10 minutos respectivamente. Esta función puede resultar śtil al introducir un log manualmente tras el concurso.

[INITIAL EXCHANGE CURSOR POS]
DEFAULT=AT END
; EN: Values: AT START or AT END. When an initial exchange is inserted into the Exchange Window, this command controls whether the cursor is placed at the start or at the end of the exchange.
DESCRIPTION=Valores: AT START o AT END. Cuando se inserta un intercambio inicial en la ventana de intercambio, este comando controla si el cursor se coloca al inicio o al final del intercambio.

[INITIAL EXCHANGE FILENAME]
DEFAULT=INITIAL.EX
; EN: This parameter allows you to specify the name of the initial exchange file. This file is used by TR4W to determine initial exchanges for the callsigns included in the file. The calls will also be used in the partial call list. The format for the file is: callsign, followed by a space, and then the initial exchange information as you want it to appear in the Exchange Window.
DESCRIPTION=Este parįmetro le permite especificar el nombre del fichero de intercambio inicial. TR4W utiliza este fichero para determinar los intercambios iniciales de los indicativos incluidos en él. Los indicativos también se utilizarįn en la lista de indicativos parciales. El formato del fichero es: indicativo, seguido de un espacio y, a continuación, la información de intercambio inicial tal como desea que aparezca en la ventana de intercambio.

[INITIAL EXCHANGE OVERWRITE]
DEFAULT=FALSE
; EN: If this parameter is TRUE, then pressing any key after an initial exchange has been entered into the Exchange Window by TR4W will cause the exchange to be erased, allowing you to insert a complete exchange manually.
DESCRIPTION=Si este parįmetro es TRUE, pulsar cualquier tecla después de que TR4W haya introducido un intercambio inicial en la ventana de intercambio harį que el intercambio se borre, permitiéndole introducir manualmente un intercambio completo.

[INITIAL EXCHANGE]
DEFAULT=NONE
; EN: This parameter controls the generation of an initial exchange based upon the callsign. All information except the zone must come from the TRMASTER.DTA database. The zone may come from the database, or if not found there, will be calculated based upon the callsign and the information found in the CTY.DAT country file. If this parameter is set to CUSTOM, your initial exchange will be built using the CUSTOM INITIAL EXCHANGE STRING parameter. This allows you to choose multiple data fields and place them in any order. You can program initial exchanges using the file specified by the INITIAL EXCHANGE FILENAME parameter. Initial exchanges can also come from the initial exchange memory if you have already worked the station once in the contest.
DESCRIPTION=Este parįmetro controla la generación de un intercambio inicial basado en el indicativo. Toda la información excepto la zona debe proceder de la base de datos TRMASTER.DTA. La zona puede proceder de la base de datos o, si no se encuentra allķ, se calcularį a partir del indicativo y de la información del fichero de paķses CTY.DAT. Si este parįmetro se establece a CUSTOM, su intercambio inicial se construirį utilizando el parįmetro CUSTOM INITIAL EXCHANGE STRING. Esto le permite elegir varios campos de datos y colocarlos en cualquier orden. Puede programar intercambios iniciales usando el fichero especificado por el parįmetro INITIAL EXCHANGE FILENAME. Los intercambios iniciales también pueden proceder de la memoria de intercambio inicial si ya ha trabajado la estación una vez en el concurso.

[INSERT MODE]
DEFAULT=TRUE
; EN: This command allows you to define the initial state of the insert mode, which controls whether characters are overwritten or inserted when editing a callsign or exchange. You can toggle the insert mode while TR4W is running with ctrl-V or the INSERT key.
DESCRIPTION=Este comando le permite definir el estado inicial del modo de inserción, que controla si los caracteres se sobrescriben o se insertan al editar un indicativo o intercambio. Puede conmutar el modo de inserción mientras TR4W esté en ejecución con ctrl-V o con la tecla INSERT.

[INTERCOM FILE ENABLE]
DEFAULT=FALSE
; EN: When this parameter is TRUE, all messages sent between computers during the contest will be logged to the file INTERCOM.TXT.
DESCRIPTION=Cuando este parįmetro es TRUE, todos los mensajes enviados entre ordenadores durante el concurso se registrarįn en el fichero INTERCOM.TXT.

[KEYER RADIO ONE OUTPUT PORT]
DEFAULT=NONE
; EN: These commands select which computer port is used for the CW and PTT outputs. You may specify serial ports in the range 1 to 4, and parallel ports in the range 1 to 3. When specifying a serial port for CPU keying, you can add the word INVERT to the port name (e.g., SERIAL 1 INVERT). This will invert the CW and PTT signals. This simplifies the interface to a radio which uses inverted signalling. Replace the NPN transistors shown in Appendix B with PNP transistors. Use clamp diodes to prevent the base from going positive.
DESCRIPTION=Estos comandos seleccionan qué puerto del ordenador se utiliza para las salidas de CW y PTT. Puede especificar puertos serie en el rango de 1 a 4 y puertos paralelo en el rango de 1 a 3. Al especificar un puerto serie para manipulación por CPU, puede ańadir la palabra INVERT al nombre del puerto (p. ej., SERIAL 1 INVERT). Esto invertirį las seńales de CW y PTT. Esto simplifica la interfaz con una radio que utiliza seńalización invertida. Sustituya los transistores NPN mostrados en el Apéndice B por transistores PNP. Use diodos de fijación para evitar que la base se vuelva positiva.

[KEYER RADIO TWO OUTPUT PORT]
DEFAULT=NONE
; EN: These commands select which computer port is used for the CW and PTT outputs. You may specify serial ports in the range 1 to 4, and parallel ports in the range 1 to 3. When specifying a serial port for CPU keying, you can add the word INVERT to the port name (e.g., SERIAL 1 INVERT). This will invert the CW and PTT signals. This simplifies the interface to a radio which uses inverted signalling. Replace the NPN transistors shown in Appendix B with PNP transistors. Use clamp diodes to prevent the base from going positive.
DESCRIPTION=Estos comandos seleccionan qué puerto del ordenador se utiliza para las salidas de CW y PTT. Puede especificar puertos serie en el rango de 1 a 4 y puertos paralelo en el rango de 1 a 3. Al especificar un puerto serie para manipulación por CPU, puede ańadir la palabra INVERT al nombre del puerto (p. ej., SERIAL 1 INVERT). Esto invertirį las seńales de CW y PTT. Esto simplifica la interfaz con una radio que utiliza seńalización invertida. Sustituya los transistores NPN mostrados en el Apéndice B por transistores PNP. Use diodos de fijación para evitar que la base se vuelva positiva.

[KEYPAD CW MEMORIES]
DEFAULT=FALSE
; EN: When this parameter is TRUE, the keys 0 to 9 on the keypad will send CQ MEMORIES ctrl-F1 to ctrl-F10 respectively.
DESCRIPTION=Cuando este parįmetro es TRUE, las teclas 0 a 9 del teclado numérico enviarįn las CQ MEMORIES ctrl-F1 a ctrl-F10 respectivamente.

[LATEST CONFIG FILE]
DEFAULT=NONE
; EN:
DESCRIPTION=

[LEADING ZERO CHARACTER]
DEFAULT=T
; EN: This parameter allows you to customize the character used as a leading zero when generating serial numbers and LEADING ZEROS has a value greater than zero. Normally, the character is T. However, you might prefer the number 0 or the letter O. If you use the ctrl-J menu to access this parameter, it will let you cycle among those three characters.
DESCRIPTION=Este parįmetro le permite personalizar el carįcter utilizado como cero a la izquierda al generar nśmeros de serie cuando LEADING ZEROS tiene un valor mayor que cero. Normalmente, el carįcter es T. Sin embargo, puede preferir el nśmero 0 o la letra O. Si utiliza el menś ctrl-J para acceder a este parįmetro, le permitirį alternar entre esos tres caracteres.

[LEADING ZEROS]
DEFAULT=3
; EN: If you want your serial number to be a certain length by adding leading zeros, you can specify the length with this command. A value of zero disables the addition of any leading zeros. You can set the character used for leading zeros with the LEADING ZERO CHARACTER command.
DESCRIPTION=Si desea que su nśmero de serie tenga una longitud determinada ańadiendo ceros a la izquierda, puede especificar la longitud con este comando. Un valor de cero desactiva la adición de ceros a la izquierda. Puede establecer el carįcter utilizado para los ceros a la izquierda con el comando LEADING ZERO CHARACTER.

[LEAVE CURSOR IN CALL WINDOW]
DEFAULT=FALSE
; EN: When this parameter is TRUE, the cursor will remain in the Call Window instead of moving automatically to the Exchange Window during the QSO process. Some people prefer this mode in contests where a zone is displayed as the initial exchange and you rarely need to change it.
DESCRIPTION=Cuando este parįmetro es TRUE, el cursor permanecerį en la ventana de llamada en lugar de moverse automįticamente a la ventana de intercambio durante el proceso del QSO. Algunas personas prefieren este modo en concursos en los que se muestra una zona como intercambio inicial y rara vez es necesario cambiarla.

[LITERAL DOMESTIC QTH]
DEFAULT=FALSE
; EN: Normally, TR4W will filter the domestic QTH that you type, and log the QTH as shown in the domestic file. If you would rather log exactly what you type, set this parameter to TRUE.
DESCRIPTION=Normalmente, TR4W filtrarį el QTH nacional que teclee y registrarį el QTH tal como aparece en el fichero nacional. Si prefiere registrar exactamente lo que teclea, establezca este parįmetro a TRUE.

[LOG FREQUENCY ENABLE]
DEFAULT=FALSE
; EN: When this parameter is TRUE, the serial number will be replaced with the frequency of the QSO (without the leading Megahertz part of the value). The band and mode will still be written at the start of the log entry. This feature is only useful if you have an interfaced radio.
DESCRIPTION=Cuando este parįmetro es TRUE, el nśmero de serie se sustituirį por la frecuencia del QSO (sin la parte inicial en Megahercios del valor). La banda y el modo seguirįn escribiéndose al inicio de la entrada del log. Esta función solo es śtil si dispone de una radio conectada.

[LOG RS SENT]
DEFAULT=59
; EN: The outbound signal report that appears in your log can be changed from the default of 59 or 599. Note that the [ character in your CW exchange allows you to enter the strength of the RST transmitted, and this value will be placed in your log instead of the default.
DESCRIPTION=El informe de seńal saliente que aparece en su log puede cambiarse respecto al valor por defecto de 59 o 599. Tenga en cuenta que el carįcter [ en su intercambio de CW le permite introducir la intensidad del RST transmitido, y este valor se colocarį en su log en lugar del valor por defecto.

[LOG RST SENT]
DEFAULT=599
; EN: The outbound signal report that appears in your log can be changed from the default of 59 or 599. Note that the [ character in your CW exchange allows you to enter the strength of the RST transmitted, and this value will be placed in your log instead of the default.
DESCRIPTION=El informe de seńal saliente que aparece en su log puede cambiarse respecto al valor por defecto de 59 o 599. Tenga en cuenta que el carįcter [ en su intercambio de CW le permite introducir la intensidad del RST transmitido, y este valor se colocarį en su log en lugar del valor por defecto.

[LOG SUB TITLE]
DEFAULT=NONE
; EN: Use this command if you want a subtitle to appear at the top of each printed log page.
DESCRIPTION=Use este comando si desea que aparezca un subtķtulo en la parte superior de cada pįgina del log impreso.

[LOG WITH SINGLE ENTER]
DEFAULT=FALSE
; EN: If this parameter is TRUE, the QSO will be logged as soon as you press the initial <Enter> (to send the exchange). In other words, it behaves as if you have pressed <Enter> followed by ctrl-Enter.
DESCRIPTION=Si este parįmetro es TRUE, el QSO se registrarį en cuanto pulse el <Enter> inicial (para enviar el intercambio). En otras palabras, se comporta como si hubiera pulsado <Enter> seguido de ctrl-Enter.

[LOOK FOR RST SENT]
DEFAULT=FALSE
; EN: When this parameter is TRUE, a transmitted RST may be entered into the Exchange Window by preceding it with S. For example, typing S57 would place 57 into the log as the transmitted exchange for this QSO.
DESCRIPTION=Cuando este parįmetro es TRUE, puede introducirse un RST transmitido en la ventana de intercambio precediéndolo de S. Por ejemplo, teclear S57 colocarķa 57 en el log como intercambio transmitido para este QSO.

[LPT1 BASE ADDRESS]
DEFAULT=888
; EN: The base address of parallel port LPT1 (PARALLEL 1).
DESCRIPTION=La dirección base del puerto paralelo LPT1 (PARALLEL 1).

[LPT2 BASE ADDRESS]
DEFAULT=632
; EN: The base address of parallel port LPT2 (PARALLEL 2).
DESCRIPTION=La dirección base del puerto paralelo LPT2 (PARALLEL 2).

[LPT3 BASE ADDRESS]
DEFAULT=956
; EN: The base address of parallel port LPT3 (PARALLEL 3).
DESCRIPTION=La dirección base del puerto paralelo LPT3 (PARALLEL 3).

[MAIN CALLSIGN]
DEFAULT=NONE
; EN:
DESCRIPTION=

[MAIN FONT]
DEFAULT=Arial
; EN: The command specifies the name of the font to be used when displaying the information in the main program window.
DESCRIPTION=El comando especifica el nombre de la fuente que se utilizarį al mostrar la información en la ventana principal del programa.

[MESSAGE ENABLE]
DEFAULT=TRUE
; EN: This command determines whether the various messages located in the alt-P menu are sent. If you disable them by setting this parameter to FALSE, messages such as the CQ EXCHANGE and QSL MESSAGE will not be sent. This command would be used if you want to send these messages manually.
DESCRIPTION=Este comando determina si se envķan los diversos mensajes ubicados en el menś alt-P. Si los desactiva estableciendo este parįmetro a FALSE, no se enviarįn mensajes como el CQ EXCHANGE y el QSL MESSAGE. Este comando se usarķa si desea enviar estos mensajes manualmente.

[MINITOUR DURATION]
DEFAULT=0
; EN: Value: integer from 5 to 60. Specifies in minutes tour duration in multi-tours contests.
DESCRIPTION=Valor: entero de 5 a 60. Especifica en minutos la duración del turno en concursos multi-turno.

[MISSINGCALLSIGNS FILE ENABLE]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[MMTTY ENGINE]
DEFAULT=NONE
; EN:
DESCRIPTION=

[MODE]
DEFAULT=CW
; EN: You can use this command to select the mode in which TR4W will start when no QSOs have been made. Normally, you would just use alt-M to select the desired mode.
DESCRIPTION=Puede usar este comando para seleccionar el modo con el que TR4W se iniciarį cuando no se hayan hecho QSOs. Normalmente, basta con usar alt-M para seleccionar el modo deseado.

[MP3 PATH]
DEFAULT=MP3
; EN: The directory where the MP3 files will be saved. By default this is [tr4w_directory][contest_directory][mp3] folder.
DESCRIPTION=El directorio donde se guardarįn los ficheros MP3. Por defecto es la carpeta [tr4w_directory][contest_directory][mp3].

[MP3 PLAYER]
DEFAULT=NONE
; EN: Player to be used for MP3 files playback.
DESCRIPTION=Reproductor que se utilizarį para la reproducción de ficheros MP3.

[MP3 RECORDER BITRATE]
DEFAULT=16
; EN: MP3 recorder bitrate.
DESCRIPTION=Bitrate del grabador MP3.

[MP3 RECORDER DURATION]
DEFAULT=EACH QSO
; EN:
DESCRIPTION=

[MP3 RECORDER ENABLE]
DEFAULT=FALSE
; EN: If the value is TRUE MP3 recording starts immediately after opening the "MP3 Recorder" window.
DESCRIPTION=Si el valor es TRUE, la grabación MP3 se inicia inmediatamente después de abrir la ventana "MP3 Recorder".

[MULT BY BAND]
DEFAULT=FALSE
; EN: These commands determine whether multipliers can be counted again on different bands or modes. These parameters are configured when the CONTEST statement is executed and normally do not require any changes.
DESCRIPTION=Estos comandos determinan si los multiplicadores pueden contarse de nuevo en diferentes bandas o modos. Estos parįmetros se configuran cuando se ejecuta la sentencia CONTEST y normalmente no requieren cambios.

[MULT BY MODE]
DEFAULT=FALSE
; EN: These commands determine whether multipliers can be counted again on different bands or modes. These parameters are configured when the CONTEST statement is executed and normally do not require any changes.
DESCRIPTION=Estos comandos determinan si los multiplicadores pueden contarse de nuevo en diferentes bandas o modos. Estos parįmetros se configuran cuando se ejecuta la sentencia CONTEST y normalmente no requieren cambios.

[MULT REPORT MINIMUM BANDS]
DEFAULT=4
; EN: Values: Integer in range 2 to 4. These commands are synonymous. When executing the ctrl-O command, you will be shown DX multipliers that you have worked on a certain number, but not all, bands. This parameter sets the minimum number of bands on which the country must have been worked in order to appear on this report.
DESCRIPTION=Valores: entero en el rango de 2 a 4. Estos comandos son sinónimos. Al ejecutar el comando ctrl-O, se le mostrarįn los multiplicadores DX que ha trabajado en un cierto nśmero, pero no en todas, las bandas. Este parįmetro establece el nśmero mķnimo de bandas en las que el paķs debe haber sido trabajado para aparecer en este informe.

[MULTI INFO MESSAGE]
DEFAULT=NONE
; EN: If you are using a computer network for a multi operation, this command will determine whether all QSOs are passed around the network, or only those that are new multipliers.
DESCRIPTION=Si estį utilizando una red de ordenadores para una operación multi, este comando determinarį si todos los QSOs se distribuyen por la red, o solo aquellos que son nuevos multiplicadores.

[MULTI MULTS ONLY]
DEFAULT=FALSE
; EN: If you are using a computer network for a multi operation, this command will determine whether all QSOs are passed around the network, or only those that are new multipliers.
DESCRIPTION=Si estį utilizando una red de ordenadores para una operación multi, este comando determinarį si todos los QSOs se distribuyen por la red, o solo aquellos que son nuevos multiplicadores.

[MULTIPLE BANDS]
DEFAULT=TRUE
; EN: These commands control the ability to change bands or modes while working the contest. If you are working a single mode or single band contest, it is recommended that the corresponding flag be set to FALSE. This will prevent you from changing band or mode accidentally during the contest. Before you make your first QSO, you will be able to set the band and mode regardless of the value of these parameters.
DESCRIPTION=Estos comandos controlan la capacidad de cambiar de banda o modo mientras se trabaja en el concurso. Si estį trabajando un concurso de un solo modo o una sola banda, se recomienda que el indicador correspondiente se establezca a FALSE. Esto evitarį que cambie de banda o modo accidentalmente durante el concurso. Antes de hacer su primer QSO, podrį ajustar la banda y el modo independientemente del valor de estos parįmetros.

[MULTIPLE MODES]
DEFAULT=TRUE
; EN: These commands control the ability to change bands or modes while working the contest. If you are working a single mode or single band contest, it is recommended that the corresponding flag be set to FALSE. This will prevent you from changing band or mode accidentally during the contest. Before you make your first QSO, you will be able to set the band and mode regardless of the value of these parameters.
DESCRIPTION=Estos comandos controlan la capacidad de cambiar de banda o modo mientras se trabaja en el concurso. Si estį trabajando un concurso de un solo modo o una sola banda, se recomienda que el indicador correspondiente se establezca a FALSE. Esto evitarį que cambie de banda o modo accidentalmente durante el concurso. Antes de hacer su primer QSO, podrį ajustar la banda y el modo independientemente del valor de estos parįmetros.

[MY CALL]
DEFAULT=NONE
; EN: Values: Your callsign. This must be the first statement of your *.CFG file. You should include any portable designation. The ctrl-J menu allows you to view the value of MY CALL, but not to edit it.
DESCRIPTION=Valores: su indicativo. Esta debe ser la primera sentencia de su fichero *.CFG. Debe incluir cualquier designación portable. El menś ctrl-J le permite ver el valor de MY CALL, pero no editarlo.

[MY CHECK]
DEFAULT=NONE
; EN: Values: Any string. This command is mandatory when operating the Sweepstakes contest. If CONTEST is set to SWEEPSTAKES, TR4W will prompt you for this value if it is not already set.
DESCRIPTION=Valores: cualquier cadena. Este comando es obligatorio al operar el concurso Sweepstakes. Si CONTEST se establece a SWEEPSTAKES, TR4W le pedirį este valor si aśn no estį definido.

[MY CONTINENT]
DEFAULT=NONE
; EN: Values: AF, AS, EU, NA, OC or SA. Normally, your continent is determined by your callsign. However, if you want the program to place you in a different continent, use this command. It is best to put this command before the CONTEST statement in your *.CFG file so that TR4W can configure the contest correctly. The ctrl-J menu allows you to view the value of MY CONTINENT, but not to dit it.
DESCRIPTION=Valores: AF, AS, EU, NA, OC o SA. Normalmente, su continente se determina por su indicativo. Sin embargo, si desea que el programa le ubique en un continente diferente, utilice este comando. Es preferible colocar este comando antes de la sentencia CONTEST en su fichero *.CFG para que TR4W pueda configurar el concurso correctamente. El menś ctrl-J le permite ver el valor de MY CONTINENT, pero no editarlo.

[MY COUNTRY]
DEFAULT=NONE
; EN: Values: Any valid country ID. Normally, your country is determined by your callsign. However, if you want the program to place you in a different country, use this command. It is best to put this command before the CONTEST statement in your *.CFG file so that TR4W can configure the contest correctly. The ctrl-J menu allows you to view the value of MY COUNTRY, but not to edit it.
DESCRIPTION=Valores: cualquier identificador de paķs vįlido. Normalmente, su paķs se determina por su indicativo. Sin embargo, si desea que el programa le ubique en un paķs diferente, utilice este comando. Es preferible colocar este comando antes de la sentencia CONTEST en su fichero *.CFG para que TR4W pueda configurar el concurso correctamente. El menś ctrl-J le permite ver el valor de MY COUNTRY, pero no editarlo.

[MY FD CLASS]
DEFAULT=NONE
; EN: Values: Any valid ARRL Field Day class. This is used to set your station class for ARRL Field Day (e.g., 1A). If you are operating the Field Day, TR4W will prompt you for this value if it is not already set
DESCRIPTION=Valores: cualquier clase vįlida del ARRL Field Day. Se utiliza para establecer la clase de su estación para el ARRL Field Day (p. ej., 1A). Si estį operando el Field Day, TR4W le pedirį este valor si aśn no estį definido.

[MY GRID]
DEFAULT=NONE
; EN: Values: Four- or six-character grid identifier. This parameter identifies the grid from which you are operating. This is used to generate beam heading from your location. It is also used to determine QSO points when using a QSO point method that computes points based upon distance. Use GRID MAP CENTER to set separately the center of the grid map.
DESCRIPTION=Valores: identificador de grid de cuatro o seis caracteres. Este parįmetro identifica el grid desde el que estį operando. Se utiliza para calcular los rumbos de antena desde su ubicación. También se utiliza para determinar los puntos por QSO cuando se emplea un método de puntuación que calcula los puntos en función de la distancia. Use GRID MAP CENTER para establecer por separado el centro del mapa de grids.

[MY IOTA]
DEFAULT=NONE
; EN: Values: IOTA designator. This is used to set the IOTA identifier of the island from which you are operating (e.g., EU-006).
DESCRIPTION=Valores: designador IOTA. Se utiliza para establecer el identificador IOTA de la isla desde la que estį operando (p. ej., EU-006).

[MY NAME]
DEFAULT=NONE
; EN: Values: Any string. Use this command before the CONTEST statement if you are operating a contest that uses your name as part of the exchange. In contests where the exchange includes the name received in the prior QSO (using the special CW character (), TR4W will use this value as the name that is sent in the first QSO.
DESCRIPTION=Valores: cualquier cadena. Use este comando antes de la sentencia CONTEST si estį operando un concurso que utiliza su nombre como parte del intercambio. En concursos en los que el intercambio incluye el nombre recibido en el QSO anterior (usando el carįcter especial de CW (), TR4W utilizarį este valor como el nombre que se envķa en el primer QSO.

[MY POSTAL CODE]
DEFAULT=NONE
; EN: Values: Any string. Used in the RSGB ROPOCO (Rotating Post Code) contest as the postcode sent in the first QSO.
DESCRIPTION=Valores: cualquier cadena. Se utiliza en el concurso RSGB ROPOCO (Rotating Post Code) como el código postal enviado en el primer QSO.

[MY PREC]
DEFAULT=NONE
; EN: Values: A, B, M, Q, S or U. This command is mandatory when operating Sweepstakes. If you are operating Sweepstakes, TR4W will prompt you for this value if it is not already set.
DESCRIPTION=Valores: A, B, M, Q, S o U. Este comando es obligatorio al operar Sweepstakes. Si estį operando Sweepstakes, TR4W le pedirį este valor si aśn no estį definido.

[MY QTH]
DEFAULT=NONE
; EN: Values: Any string. This is a synonym for MY STATE.
DESCRIPTION=Valores: cualquier cadena. Es sinónimo de MY STATE.

[MY SECTION]
DEFAULT=NONE
; EN: Values: Any string. This is mandatory when operating Sweepstakes or ARRL Field Day. If your chosen contest requires this information, TR4W will prompt you for this value if it is not already set.
DESCRIPTION=Valores: cualquier cadena. Es obligatorio al operar Sweepstakes o ARRL Field Day. Si el concurso elegido requiere esta información, TR4W le pedirį este valor si aśn no estį definido.

[MY STATE]
DEFAULT=NONE
; EN: Values: Any string. In some of the contests where a state or province is part of the exchange, TR4W will automatically configure the CW messages to include your location. This command allows you to tell the program what state (or province) to use in these messages. This command is also used to determine your state for various state QSO parties. Use the ordinary United States Postal Service two-letter state abbreviation to set your state. It is best to put this command before the CONTEST statement in your *.CFG file so that the information is processed correctly.
DESCRIPTION=Valores: cualquier cadena. En algunos concursos en los que el estado o provincia forma parte del intercambio, TR4W configurarį automįticamente los mensajes CW para incluir su ubicación. Este comando le permite indicar al programa qué estado (o provincia) usar en estos mensajes. Este comando también se utiliza para determinar su estado en varias QSO parties estatales. Use la abreviatura de dos letras del United States Postal Service para establecer su estado. Es preferible colocar este comando antes de la sentencia CONTEST en su fichero *.CFG para que la información se procese correctamente.

[MY ZONE]
DEFAULT=NONE
; EN: Values: Integer Normally, your zone is determined by your callsign. However, if you want TR4W to place you in a different zone, use this command. It is best to put this command before the CONTEST statement in your *.CFG file, so that TR4W will configure the contest properly. However, the relationship between what happens when the contest executes the MY ZONE command and when it executes the CONTEST command is complex, and under some circumstances (for example, the IARU contest) the MY ZONE command should appear after the CONTEST command. The most common symptom of having these commands in the incorrect order is that TR4W will score the contest as if you were in a different zone from the one in which you are actually located. If you see that TR4W does not seem to be scoring the contest properly, you should try switching
DESCRIPTION=Valores: entero. Normalmente, su zona se determina por su indicativo. Sin embargo, si desea que TR4W le ubique en una zona diferente, utilice este comando. Es preferible colocar este comando antes de la sentencia CONTEST en su fichero *.CFG, de modo que TR4W configure el concurso correctamente. No obstante, la relación entre lo que ocurre cuando el concurso ejecuta el comando MY ZONE y cuando ejecuta el comando CONTEST es compleja, y en algunas circunstancias (por ejemplo, el concurso IARU) el comando MY ZONE debe aparecer después del comando CONTEST. El sķntoma mįs comśn de tener estos comandos en el orden incorrecto es que TR4W puntuarį el concurso como si estuviera en una zona distinta de la que realmente se encuentra. Si observa que TR4W no parece estar puntuando el concurso correctamente, deberķa probar a intercambiarlos.

[NAME FLAG ENABLE]
DEFAULT=TRUE
; EN: When this parameter is TRUE, an asterisk is shown in the log when you make a QSO with a station whose name is known.
DESCRIPTION=Cuando este parįmetro es TRUE, se muestra un asterisco en el log cuando hace un QSO con una estación cuyo nombre es conocido.

[NET STATUS UPDATE INTERVAL]
DEFAULT=5000
; EN:
DESCRIPTION=

[NO BORDER]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[NO CAPTION]
DEFAULT=FALSE
; EN: If the value is TRUE after startup all windows except the main will not have a title.
DESCRIPTION=Si el valor es TRUE, tras el arranque todas las ventanas excepto la principal no tendrįn tķtulo.

[NO COLUMN HEADER]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[NO LOG]
DEFAULT=FALSE
; EN: If you want to disable a computer on the network from logging any QSOs, set this parameter to TRUE.
DESCRIPTION=Si desea impedir que un ordenador de la red registre QSOs, establezca este parįmetro a TRUE.

[NO POLL DURING PTT]
DEFAULT=FALSE
; EN: When this parameter is TRUE, TR4W will not poll the radio for frequency information during the time the PTT signal is active.
DESCRIPTION=Cuando este parįmetro es TRUE, TR4W no consultarį a la radio la información de frecuencia durante el tiempo en que la seńal de PTT esté activa.

[ORION PORT]
DEFAULT=NONE
; EN: This command is used to select a serial port on which to communicate with an Orion rotator control. To send the rotator to the direction for the country of a callsign in the Call Window, use the ctrl-P command Rotator control.
DESCRIPTION=Este comando se utiliza para seleccionar un puerto serie con el que comunicarse con un control de rotor Orion. Para enviar el rotor a la dirección correspondiente al paķs de un indicativo en la ventana de llamada, use el comando ctrl-P de control del rotor.

[PADDLE MONITOR TONE]
DEFAULT=700
; EN: The computer speaker monitor is normally used when you send with a paddle connected to the parallel port. This command controls the frequency of the generated sidetone. A value of zero disables the tone.
DESCRIPTION=El monitor del altavoz del ordenador se utiliza normalmente cuando transmite con un manipulador conectado al puerto paralelo. Este comando controla la frecuencia del tono lateral generado. Un valor de cero desactiva el tono.

[PADDLE PORT]
DEFAULT=NONE
; EN:
DESCRIPTION=

[PADDLE PTT HOLD COUNT]
DEFAULT=13
; EN: This command controls the delay between when you stop sending CW with the paddle and when the PTT is released. The delay is measured in dit counts.
DESCRIPTION=Este comando controla el retardo entre el momento en que deja de enviar CW con el manipulador y el momento en que se libera el PTT. El retardo se mide en unidades de dit.

[PADDLE SPEED]
DEFAULT=0
; EN: This command Controls the speed of CW sent with the paddle. A value of zero causes the paddle to send at the same speed as TR4W.
DESCRIPTION=Este comando controla la velocidad del CW enviado con el manipulador. Un valor de cero hace que el manipulador envķe a la misma velocidad que TR4W.

[PARTIAL CALL ENABLE]
DEFAULT=TRUE
; EN: This command allows you to control the partial call function. This is a separate feature from the super check partial (which uses the TRMASTER.DTA database). The callsigns used by the partial call function come from the dupesheet and initial exchange file. When this function is enabled, partial calls will be shown on the bottom of the screen after the second character of a call has been typed into the Call Window. A partial call is defined to be any call that starts with the same letters as those in the Call Window. The WILDCARD PARTIALS parameter determines whether the partial call must appear at the start of
DESCRIPTION=Este comando le permite controlar la función de indicativos parciales. Es una función distinta del super check partial (SCP), que utiliza la base de datos TRMASTER.DTA. Los indicativos utilizados por la función de indicativos parciales provienen de la hoja de duplicados y del fichero de intercambio inicial. Cuando esta función estį habilitada, los indicativos parciales se mostrarįn en la parte inferior de la pantalla después de teclear el segundo carįcter de un indicativo en la ventana de llamada. Un indicativo parcial se define como cualquier indicativo que empiece con las mismas letras que las de la ventana de llamada. El parįmetro WILDCARD PARTIALS determina si el indicativo parcial debe aparecer al inicio del indicativo.

[POLL RADIO ONE]
DEFAULT=TRUE
; EN:
DESCRIPTION=

[POLL RADIO TWO]
DEFAULT=TRUE
; EN:
DESCRIPTION=

[POSSIBLE CALL ACCEPT KEY]
DEFAULT=;
; EN: Values: Any character.
DESCRIPTION=Valores: cualquier carįcter.

[POSSIBLE CALL LEFT KEY]
DEFAULT=,
; EN: Values: Any character.
DESCRIPTION=Valores: cualquier carįcter.

[POSSIBLE CALL MODE]
DEFAULT=NAMES
; EN: Values: NAMES or ALL. The possible calls that come from the TRMASTER.DTA file can either come from all of the calls or only those with names associated with them. When set to NAMES, the operation is identical to older versions of TR4W which used the name database for possible calls.
DESCRIPTION=Valores: NAMES o ALL. Los indicativos posibles que provienen del fichero TRMASTER.DTA pueden venir de todos los indicativos o solo de aquellos que tengan nombres asociados. Cuando se establece a NAMES, la operación es idéntica a versiones anteriores de TR4W que utilizaban la base de datos de nombres para los indicativos posibles.

[POSSIBLE CALL RIGHT KEY]
DEFAULT=.
; EN: Values: Any character. When you are using the PARTIAL CALL ENABLE or the POSSIBLE CALLS feature, you are shown a list of calls in the bottom of the operating screen. The first call shown will have a cursor around it (like this: <G4AMJ>). You can transfer the callsign with the cursor around it to the Call Window with the POSSIBLE CALL ACCEPT KEY. You can move the cursor to the left and the right with the POSSIBLE CALL LEFT KEY and the POSSIBLE CALL RIGHT KEY.
DESCRIPTION=Valores: cualquier carįcter. Cuando utiliza la función PARTIAL CALL ENABLE o POSSIBLE CALLS, se le muestra una lista de indicativos en la parte inferior de la pantalla de operación. El primer indicativo mostrado tendrį un cursor alrededor (asķ: <G4AMJ>). Puede transferir el indicativo rodeado por el cursor a la ventana de llamada con la POSSIBLE CALL ACCEPT KEY. Puede mover el cursor a la izquierda y a la derecha con la POSSIBLE CALL LEFT KEY y la POSSIBLE CALL RIGHT KEY.

[POSSIBLE CALLS]
DEFAULT=TRUE
; EN: When this parameter is TRUE, the possible call feature is enabled. This causes TR4W to display similar calls from the TRMASTER.DTA database and from your dupesheet when you are working a new station.
DESCRIPTION=Cuando este parįmetro es TRUE, la función de indicativos posibles estį habilitada. Esto hace que TR4W muestre indicativos similares de la base de datos TRMASTER.DTA y de su hoja de duplicados cuando esté trabajando una nueva estación.

[PREFIX MULTIPLIER]
DEFAULT=NONE
; EN: Values: NONE or PREFIX. This command instructs TR4W how to handle the prefix multiplier. It is normally set by the CONTEST statement in the file *.CFG.
DESCRIPTION=Valores: NONE o PREFIX. Este comando indica a TR4W cómo gestionar el multiplicador de prefijo. Normalmente se establece mediante la sentencia CONTEST en el fichero *.CFG.

[PTT ENABLE]
DEFAULT=TRUE
; EN: This command controls whether the PTT signal is active. The PTT signal is intended to be used to turn on your transmitter just before a CW message starts and to turn it off as soon as the message being sent has concluded. If you are using break-in (QSK), you should disable this signal.
DESCRIPTION=Este comando controla si la seńal de PTT estį activa. La seńal de PTT estį pensada para encender su transmisor justo antes de que empiece un mensaje CW y apagarlo en cuanto el mensaje enviado haya terminado. Si estį utilizando break-in (QSK), deberķa desactivar esta seńal.

[PTT LOCKOUT]
DEFAULT=FALSE
; EN: Ńommand determines whether or not to use the PTT lockout in networked mode.
DESCRIPTION=El comando determina si se utiliza o no el bloqueo de PTT en modo red.

[PTT TURN ON DELAY]
DEFAULT=15
; EN: This parameter controls the amount of time that elapses between the assertion of the PTT signal and the start of the first transmitted CW character. The value is multiplied by 1.7 milliseconds. A value of zero disables the feature.
DESCRIPTION=Este parįmetro controla el tiempo que transcurre entre la activación de la seńal de PTT y el inicio del primer carįcter CW transmitido. El valor se multiplica por 1,7 milisegundos. Un valor de cero desactiva la función.

[PTT VIA COMMANDS]
DEFAULT=FALSE
; EN: Send PTT command to rig via CAT interface.
DESCRIPTION=Envķa el comando PTT a la radio a través de la interfaz CAT.

[QSL MODE]
DEFAULT=STANDARD
; EN: Values: STANDARD, QSL AND LOG, or QSL BUT NO LOG. This command can be used to change the criteria used to QSL an exchange and to log it when you are in CQ Mode. Normally, TR4W requires the complete exchange to be entered before you can QSL and log the contact. However, if you select QSL BUT NO LOG, the QSL message will be sent even if the exchange information is not completed, but you need to finish entering the exchange and hit <Enter> again before it will be logged. QSL AND LOG will totally eliminate any syntax checking on the exchange and log whatever you have entered. This mode is NOT recommended in normal operations.
DESCRIPTION=Valores: STANDARD, QSL AND LOG o QSL BUT NO LOG. Este comando puede utilizarse para cambiar los criterios usados para confirmar un intercambio (QSL) y registrarlo cuando estį en modo CQ. Normalmente, TR4W requiere que se haya introducido el intercambio completo antes de poder hacer QSL y registrar el contacto. Sin embargo, si selecciona QSL BUT NO LOG, el mensaje QSL se enviarį aunque la información de intercambio no esté completa, pero deberį terminar de introducir el intercambio y pulsar <Enter> de nuevo antes de que se registre. QSL AND LOG eliminarį completamente cualquier comprobación de sintaxis del intercambio y registrarį lo que haya introducido. Este modo NO se recomienda en operación normal.

[QSO BY BAND]
DEFAULT=FALSE
; EN: These parameters determine whether QSOs can be counted again if they occur on different bands or modes. The parameters are set up automatically when the CONTEST statement in your *.CFG file is executed, and normally do not require any changes.
DESCRIPTION=Estos parįmetros determinan si los QSOs pueden contarse de nuevo si se realizan en bandas o modos diferentes. Los parįmetros se configuran automįticamente cuando se ejecuta la sentencia CONTEST en su fichero *.CFG, y normalmente no requieren cambios.

[QSO BY MODE]
DEFAULT=FALSE
; EN: These parameters determine whether QSOs can be counted again if they occur on different bands or modes. The parameters are set up automatically when the CONTEST statement in your *.CFG file is executed, and normally do not require any changes.
DESCRIPTION=Estos parįmetros determinan si los QSOs pueden contarse de nuevo si se realizan en bandas o modos diferentes. Los parįmetros se configuran automįticamente cuando se ejecuta la sentencia CONTEST en su fichero *.CFG, y normalmente no requieren cambios.

[QSO NUMBER BY BAND]
DEFAULT=FALSE
; EN: When set to TRUE, the QSO numbers that are displayed on the screen, those that are sent in a CW message with the # character, and those shown in the log will be calculated from the total number of contacts on the active band. This is useful in a multi-transmitter situation where QSO numbers are being sent (e.g., the CQ WPX contest).
DESCRIPTION=Cuando se establece a TRUE, los nśmeros de QSO mostrados en pantalla, los enviados en un mensaje CW con el carįcter # y los mostrados en el log se calcularįn a partir del nśmero total de contactos en la banda activa. Esto es śtil en situaciones multi-transmisor en las que se envķan nśmeros de QSO (p. ej., el concurso CQ WPX).

[QSO POINT METHOD]
DEFAULT=NONE
; EN:
DESCRIPTION=

[QSO POINTS DOMESTIC CW]
DEFAULT=-1
; EN: These parameters allow you to control the QSO point values for the class of QSOs indicated. These will over-ride any existing QSO point method for the contacts in the category indicated.
DESCRIPTION=Estos parįmetros le permiten controlar los valores de puntos por QSO para la clase de QSOs indicada. Estos prevalecen sobre cualquier método de puntuación por QSO existente para los contactos de la categorķa indicada.

[QSO POINTS DOMESTIC PHONE]
DEFAULT=-1
; EN: These parameters allow you to control the QSO point values for the class of QSOs indicated. These will over-ride any existing QSO point method for the contacts in the category indicated.
DESCRIPTION=Estos parįmetros le permiten controlar los valores de puntos por QSO para la clase de QSOs indicada. Estos prevalecen sobre cualquier método de puntuación por QSO existente para los contactos de la categorķa indicada.

[QSO POINTS DX CW]
DEFAULT=-1
; EN: These parameters allow you to control the QSO point values for the class of QSOs indicated. These will over-ride any existing QSO point method for the contacts in the category indicated.
DESCRIPTION=Estos parįmetros le permiten controlar los valores de puntos por QSO para la clase de QSOs indicada. Estos prevalecen sobre cualquier método de puntuación por QSO existente para los contactos de la categorķa indicada.

[QSO POINTS DX PHONE]
DEFAULT=-1
; EN: These parameters allow you to control the QSO point values for the class of QSOs indicated. These will over-ride any existing QSO point method for the contacts in the category indicated.
DESCRIPTION=Estos parįmetros le permiten controlar los valores de puntos por QSO para la clase de QSOs indicada. Estos prevalecen sobre cualquier método de puntuación por QSO existente para los contactos de la categorķa indicada.

[QSX ENABLE]
DEFAULT=TRUE
; EN: This parameter determines whether QSX information is decoded from packet spots. You might want to disable this feature if you are a DX station and are not interested in split spots.
DESCRIPTION=Este parįmetro determina si la información de QSX se decodifica de los spots de packet. Puede que desee desactivar esta función si es una estación DX y no estį interesado en spots con split.

[QTC ENABLE]
DEFAULT=FALSE
; EN: This is normally turned on automatically when a WAE is being configured. When you have enabled QTCs, you will need to remember that ctrl-Q is the magic key to send (if you are not in EU) or receive (if you are in EU) QTCs. TR4W will automatically ensure that you do not send a QTC containing the call of the station to whom you are sending the QTC. On CW, both the ctrl-Enter and alt-K keys work as usual even when QTCs are being sent.
DESCRIPTION=Normalmente se activa automįticamente cuando se configura un WAE. Cuando haya habilitado los QTCs, deberį recordar que ctrl-Q es la tecla mįgica para enviar (si no estį en EU) o recibir (si estį en EU) QTCs. TR4W se asegurarį automįticamente de que no envķe un QTC que contenga el indicativo de la estación a la que estį enviando el QTC. En CW, tanto las teclas ctrl-Enter como alt-K funcionan como de costumbre incluso cuando se estįn enviando QTCs.

[QTC EXTRA SPACE]
DEFAULT=TRUE
; EN: When this parameter is TRUE, extra spaces are inserted between the elements of a QTC.
DESCRIPTION=Cuando este parįmetro es TRUE, se insertan espacios adicionales entre los elementos de un QTC.

[QTC MINUTES]
DEFAULT=FALSE
; EN: When this parameter is TRUE, the QTC function will send only the minutes of QTC times that are in the same hour as the time previously sent.
DESCRIPTION=Cuando este parįmetro es TRUE, la función QTC enviarį śnicamente los minutos de las horas de QTC que estįn en la misma hora que la hora enviada previamente.

[QTC QRS]
DEFAULT=TRUE
; EN: When this parameter is TRUE, TR4W will send QTCs with the CW. speed approximately 6% slower than the normal sending speed.
DESCRIPTION=Cuando este parįmetro es TRUE, TR4W enviarį los QTCs con una velocidad de CW aproximadamente un 6 % mįs lenta que la velocidad normal de envķo.

[QUESTION MARK CHAR]
DEFAULT=?
; EN: Values: Any key. Some keyboards require the use of a shift key to type the question mark. This command can be used to assign the ? key to another key2. This allows 2The author finds it useful to assign the = character with this command. operation without pressing the shift key, which may be inconvenient, or may change the rig frequency if your rig is interfaced to the computer.
DESCRIPTION=Valores: cualquier tecla. Algunos teclados requieren el uso de la tecla shift para escribir el signo de interrogación. Este comando puede utilizarse para asignar la tecla ? a otra tecla. El autor considera śtil asignar el carįcter = con este comando. Esto permite operar sin pulsar la tecla shift, lo que puede resultar incómodo o puede cambiar la frecuencia de la radio si esta estį conectada al ordenador.

[QUICK QSL KEY 1]
DEFAULT=
; EN: Values: Any key. When you finish a contact while running on CW, normally you press <Enter> to log the contact and send the QSL MESSAGE. If you want to send the QUICK QSL MESSAGE 1 instead, you press the QUICK QSL KEY1 instead of <Enter>.
DESCRIPTION=Valores: cualquier tecla. Cuando termina un contacto mientras hace run en CW, normalmente pulsa <Enter> para registrar el contacto y enviar el QSL MESSAGE. Si en su lugar desea enviar el QUICK QSL MESSAGE 1, pulse la QUICK QSL KEY1 en lugar de <Enter>.

[QUICK QSL KEY 2]
DEFAULT==
; EN: Values: Any key. When you finish a contact while running on CW, normally you press <Enter> to log the contact and send the QSL MESSAGE. If you want to send the QUICK QSL MESSAGE 2 instead, you press the QUICK QSL KEY2 instead of <Enter>.
DESCRIPTION=Valores: cualquier tecla. Cuando termina un contacto mientras hace run en CW, normalmente pulsa <Enter> para registrar el contacto y enviar el QSL MESSAGE. Si en su lugar desea enviar el QUICK QSL MESSAGE 2, pulse la QUICK QSL KEY2 en lugar de <Enter>.

[QZB RANDOM OFFSET ENABLE]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[R150S MODE]
DEFAULT=FALSE
; EN: If TRUE calculation of contriyes-multipliers will be based on R-150-S list.
DESCRIPTION=Si es TRUE, el cįlculo de multiplicadores de paķses se basarį en la lista R-150-S.

[RADIO ONE BAND OUTPUT PORT]
DEFAULT=NONE
; EN:
DESCRIPTION=

[RADIO ONE BAUD RATE]
DEFAULT=0
; EN: This command controls the baud rate between the computer and the connected rigs.
DESCRIPTION=Este comando controla la velocidad en baudios entre el ordenador y las radios conectadas.

[RADIO ONE CAT DTR]
DEFAULT=OFF
; EN:
DESCRIPTION=

[RADIO ONE CAT RTS]
DEFAULT=OFF
; EN:
DESCRIPTION=

[RADIO ONE CONTROL PORT]
DEFAULT=NONE
; EN: Use these commands to specify the serial port to use for each connected rig.
DESCRIPTION=Utilice estos comandos para especificar el puerto serie a usar para cada radio conectada.

[RADIO ONE FREQUENCY ADDER]
DEFAULT=0
; EN:
DESCRIPTION=

[RADIO TCP SERVER PORT]
DEFAULT=52002
; EN: This is the port that TR4W listens for input to interact with the radio it is controlling. This implements the DXLab Commander protocol so OTHER programs may control the radio TR4W is using. Note this is NOT a connection to allow TR4W to control a radio via DXLab's Commander. This is an inbound connection mainly for WSJT-X to control TR4W's current radio.
DESCRIPTION=Este es el puerto en el que TR4W escucha entradas para interactuar con la radio que estį controlando. Implementa el protocolo DXLab Commander de modo que OTROS programas pueden controlar la radio que TR4W estį utilizando. Tenga en cuenta que esto NO es una conexión para permitir que TR4W controle una radio mediante DXLab Commander. Es una conexión entrante pensada principalmente para que WSJT-X controle la radio actual de TR4W.

[RADIO ONE CW BY CAT]
DEFAULT=FALSE
; EN: If supported by the radio, this uses the CAT commands to send CW instead of RTS or a WinKeyer. Radios known to support this are the Elecraft K3/KX3, and Icom 9100, 7700, 7800, 7850, and 7851. You can check your radio manual under the CI-V commands for command 17. If present, the radio supports this feature. Please note that Yaesu does NOT support this feature in its command set.
DESCRIPTION=Si lo admite la radio, utiliza los comandos CAT para enviar CW en lugar de RTS o un WinKeyer. Las radios que se sabe que admiten esto son la Elecraft K3/KX3 y las Icom 9100, 7700, 7800, 7850 y 7851. Puede consultar el manual de su radio en los comandos CI-V para el comando 17. Si estį presente, la radio admite esta función. Tenga en cuenta que Yaesu NO admite esta función en su juego de comandos.

[RADIO ONE CW SPEED SYNC]
DEFAULT=FALSE
; EN: When the CW speed is adjusted in the program, this sends a CAT command to the attached radio to change the speed of the internal keyer. As this goes with the CW BY CAT command, this is only implemented for Elecraft and Icom radios.
DESCRIPTION=Cuando se ajusta la velocidad de CW en el programa, esto envķa un comando CAT a la radio conectada para cambiar la velocidad del manipulador interno. Como va asociado al comando CW BY CAT, solo estį implementado para radios Elecraft e Icom.

[RADIO ONE FT1000MP CW REVERSE]
DEFAULT=FALSE
; EN: If you have connected a Yaesu FT100, FT817, FT847, FT857, FT897, FT920 or FT1000MP to the computer, this parameter determines whether the rig uses normal or reverse mode for CW. FALSE=CW, TRUE = CW(R).
DESCRIPTION=Si ha conectado una Yaesu FT100, FT817, FT847, FT857, FT897, FT920 o FT1000MP al ordenador, este parįmetro determina si la radio utiliza el modo normal o inverso para CW. FALSE=CW, TRUE=CW(R).

[RADIO ONE HAMLIB ID]
DEFAULT=NONE
; EN: Each different radio that HamLib controls has a unique ID. In the case where HamLib has added a new radio before TR4W has added it to the radio drop-down, this allows (using the tr4w.ini file) to set the radio ID for HamLib. Just select HamLib-Any in the radio drop-down, check the box for HamLib control and set the HAMLIB ID to the HamLib ID (obtained by entering rigctld -i) and you can talk to that radio type.
DESCRIPTION=Cada radio diferente que HamLib controla tiene un ID śnico. En el caso de que HamLib haya ańadido una nueva radio antes de que TR4W la haya ańadido al desplegable de radios, esto permite (usando el fichero tr4w.ini) establecer el ID de radio para HamLib. Simplemente seleccione HamLib-Any en el desplegable de radios, marque la casilla de control HamLib y establezca el HAMLIB ID al ID de HamLib (obtenido introduciendo rigctld -i) y podrį comunicarse con ese tipo de radio.

[RADIO ONE ICOM FILTER BYTE]
