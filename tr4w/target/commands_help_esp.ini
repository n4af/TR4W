; EN: When using RADIO ONE with Serial CW (real RS232 or USB), this controls the number of stop bits used when initializing the port. This should not be necessary to set unless you have an issue. If so, try setting it to 2.
DESCRIPTION=Cuando se utiliza RADIO ONE con Serial CW (RS232 real o USB), esto controla el nśmero de bits de stop empleados al inicializar el puerto. No deberķa ser necesario establecerlo a menos que tenga algśn problema. En tal caso, pruebe a establecerlo a 2.

