DESCRIPTION=Los recordatorios son mensajes programados para mostrarse en momentos determinados o cuando ocurren ciertos eventos.

[REVERSE INITIAL EX]
DEFAULT=FALSE
; EN: Turning REVERSE INITIAL EX on to TRUE will reverse the search order so that TRMASTER is searched before Initial.Ex
DESCRIPTION=Activar REVERSE INITIAL EX a TRUE invertirį el orden de bśsqueda de forma que se busque en TRMASTER antes que en Initial.Ex.

[ROTATOR PORT]
DEFAULT=NONE
; EN: Values: SERIAL 1 to SERIAL 6. This command is used to choose a serial port over which commands will be sent to the rotator control (which may be set with the ROTATOR TYPE command). To send the rotator to the direction for the country of a callsign in the Call Window, use the ctrl-P command.
DESCRIPTION=Valores: SERIAL 1 a SERIAL 6. Este comando se utiliza para elegir un puerto serie por el que se enviarįn comandos al control de rotor (que puede establecerse con el comando ROTATOR TYPE). Para enviar el rotor a la dirección correspondiente al paķs de un indicativo en la ventana de llamada, use el comando ctrl-P.

[ROTATOR TYPE]
