DESCRIPTION=Valores: cualquier carįcter. Define el carįcter que se enviarį en lugar de un 1 en un nśmero de QSO si SHORT INTEGERS es TRUE.

[SHORT 2]
DEFAULT=2
; EN: Values: Any character. Defines the character to be sent instead of a 2 in a QSO number if SHORT INTEGERS is TRUE.
DESCRIPTION=Valores: cualquier carįcter. Define el carįcter que se enviarį en lugar de un 2 en un nśmero de QSO si SHORT INTEGERS es TRUE.

[SHORT 9]
DEFAULT=N
; EN: Values: Any character. Defines the character to be sent instead of a 9 in a QSO number if SHORT INTEGERS is TRUE.
DESCRIPTION=Valores: cualquier carįcter. Define el carįcter que se enviarį en lugar de un 9 en un nśmero de QSO si SHORT INTEGERS es TRUE.

[SHORT INTEGERS]
DEFAULT=FALSE
; EN: When this parameter is TRUE, TR4W will allow short abbreviations for some integers when they are sent as part of a QSO number. The actual abbreviations that are used can be programmed using the Alt-P command or the SHORT 0, SHORT 1, SHORT 2, and SHORT 9 commands.
DESCRIPTION=Cuando este parįmetro es TRUE, TR4W permitirį abreviaturas cortas para algunos enteros cuando se envķan como parte de un nśmero de QSO. Las abreviaturas concretas utilizadas pueden programarse con el comando Alt-P o con los comandos SHORT 0, SHORT 1, SHORT 2 y SHORT 9.

