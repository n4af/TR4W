DESCRIPTION=Tras conectar la radio, este comando se envķa para inicializar la radio con los ajustes que el operador desee. Puede usarse para configurar el IF Shift, velocidad de CW por defecto u otros comandos. Por el momento, esto solo funciona con radios Kenwood, Elecraft y Yaesu. Ejemplo: para CENTRAR el IF Shift introduzca 'IS 9999;' (sin las comillas).

