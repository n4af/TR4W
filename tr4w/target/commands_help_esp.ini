; EN: If you are using two rigs and SKIP ACTIVE BAND is TRUE, TR4W will skip over the band to which the other rig is tuned when switching bands using the alt-B or alt-V commands.
DESCRIPTION=Si estį utilizando dos radios y SKIP ACTIVE BAND es TRUE, TR4W omitirį la banda en la que estį sintonizada la otra radio al cambiar de banda usando los comandos alt-B o alt-V.

[SLASH MARK CHAR]
DEFAULT=/
; EN: Values: Any character. If you wish to use a different keyboard character to make the / mark, use this command to specify it. This is handy for some European keyboards.
DESCRIPTION=Valores: cualquier carįcter. Si desea utilizar un carįcter de teclado diferente para introducir la marca /, use este comando para especificarlo. Esto resulta śtil en algunos teclados europeos.

[SPACE BAR DUPE CHECK ENABLE]
DEFAULT=TRUE
; EN: Normally when you press <Space> when a callsign is present in the Call Window, TR4W will perform a dupe check on the displayed callsign. If you press <Space> without a callsign in the window, you will be put into S&P Mode and your callsign will be sent. If you set SPACE BAR DUPE CHECK ENABLE to FALSE, you will always go into S&P Mode and send your call, even if a call is present in the Call Window.
DESCRIPTION=Normalmente, cuando pulsa <Espacio> con un indicativo presente en la ventana de llamada, TR4W realizarį una comprobación de duplicados sobre el indicativo mostrado. Si pulsa <Espacio> sin un indicativo en la ventana, pasarį a modo S&P y se enviarį su indicativo. Si establece SPACE BAR DUPE CHECK ENABLE a FALSE, siempre pasarį a modo S&P y se enviarį su indicativo, aunque haya un indicativo presente en la ventana de llamada.

[SPRINT QSY RULE]
DEFAULT=FALSE
; EN: If this parameter is TRUE, TR4W will automatically enter CQ Mode after completing a QSO in S&P Mode. This parameter is automatically set to TRUE when the Sprint contest is selected. See subsection 6.18.1 for more information on operating the Sprint. You should not set this variable to TRUE unless you are operating the Sprint. For similar (but not quite identical) behaviour in other contests, see the AUTO S&P ENABLE command.
DESCRIPTION=Si este parįmetro es TRUE, TR4W entrarį automįticamente en modo CQ tras completar un QSO en modo S&P. Este parįmetro se establece automįticamente a TRUE cuando se selecciona el concurso Sprint. Véase la subsección 6.18.1 para mįs información sobre la operación del Sprint. No debe establecer esta variable a TRUE salvo que esté operando el Sprint. Para un comportamiento similar (pero no exactamente idéntico) en otros concursos, véase el comando AUTO S&P ENABLE.

[START SENDING NOW KEY]
DEFAULT=«'» (the open-single-quote key, not the apostrophe)
; EN: Values: Any key. If you are running stations on CW and a station that has answered you has already finished sending his call, but you have not yet finished typing his call, you can press the START SENDING NOW KEY. This will send the characters you have already typed, and also the ones that you type after hitting the key, until you press <Enter>. After pressing <Enter>, the normal exchange will be sent. You may set the START SENDING NOW KEY to the <Space> key with the command: START SENDING NOW KEY = SPACE If the cursor is in the Call Window, then the space bar only causes sending to begin if there is at least one character in the window.
DESCRIPTION=Valores: cualquier tecla. Si estį haciendo run en CW y una estación que le ha respondido ya ha terminado de enviar su indicativo, pero usted aśn no ha terminado de teclearlo, puede pulsar la START SENDING NOW KEY. Esto enviarį los caracteres que ya haya tecleado y también los que teclee después de pulsar la tecla, hasta que pulse <Enter>. Tras pulsar <Enter>, se enviarį el intercambio normal. Puede establecer la START SENDING NOW KEY a la tecla <Espacio> con el comando: START SENDING NOW KEY = SPACE. Si el cursor estį en la ventana de llamada, la barra espaciadora solo harį que comience el envķo si hay al menos un carįcter en la ventana.

[STATIONS CALLSIGNS MASK]
DEFAULT=NONE
; EN:
DESCRIPTION=

[STEREO CONTROL PIN]
DEFAULT=9
; EN: Values: 5 or 9. This command sets the number of the pin to be used for controlling stereo on the STEREO CONTROL PORT. If you use pin 5, then you cannot use the same port for controlling a DVK; if you use pin 9 then you cannot use the same port for band output.
DESCRIPTION=Valores: 5 o 9. Este comando establece el nśmero del pin que se utilizarį para controlar el estéreo en el STEREO CONTROL PORT. Si utiliza el pin 5, no podrį usar el mismo puerto para controlar un DVK; si utiliza el pin 9, no podrį usar el mismo puerto para la salida de banda.

[STEREO CONTROL PORT]
DEFAULT=NONE
; EN:
DESCRIPTION=

[STEREO PIN HIGH]
DEFAULT=FALSE
; EN: This command sets the state of the STEREO CONTROL PIN on the STEREO CONTROL PORT. The value may be toggled with the function key command TOGGLESTEREOPIN.
DESCRIPTION=Este comando establece el estado del STEREO CONTROL PIN en el STEREO CONTROL PORT. El valor puede conmutarse con el comando de tecla de función TOGGLESTEREOPIN.

[SWAP PACKET SPOT RADIOS]
DEFAULT=FALSE
; EN: When this parameter is TRUE, TR4W reverses which rig receives a packet spot when ctrl-U and the left/right cursor keys are used. This is useful if your station is configured such that your rig number 2 is physically on the left.
DESCRIPTION=Cuando este parįmetro es TRUE, TR4W invierte cuįl de las radios recibe un spot de packet cuando se usan ctrl-U y las teclas de cursor izquierda/derecha. Esto resulta śtil si su estación estį configurada de modo que su radio nśmero 2 estį fķsicamente a la izquierda.

[SWAP PADDLES]
DEFAULT=FALSE
; EN: This parameter swaps the dit and dah inputs on the paddle port. This is handy if your paddle is wired backwards.
DESCRIPTION=Este parįmetro intercambia las entradas de dit y dah en el puerto del manipulador. Esto resulta śtil si su manipulador estį cableado al revés.

[SWAP RADIO RELAY SENSE]
DEFAULT=FALSE
; EN: When this parameter is TRUE, TR4W reverses the polarity of the relay for controlling the radio.
DESCRIPTION=Cuando este parįmetro es TRUE, TR4W invierte la polaridad del relé para el control de la radio.

[TAIL END KEY]
DEFAULT=]
; EN: Values: Any key. The TAIL END KEY allows you to respond to tail enders when finishing a CQ mode QSO.
DESCRIPTION=Valores: cualquier tecla. La TAIL END KEY le permite responder a los tail-enders al finalizar un QSO en modo CQ.

[TELNET SERVER]
DEFAULT=sk3w.se:8000
; EN: Address of default telnet cluster.
DESCRIPTION=Dirección del cluster telnet por defecto.

[TEN MINUTE RULE]
DEFAULT=NONE
; EN: Values: NONE or TIME OF FIRST QSO. This parameter selects the mode for the ten minute rule. The TIME OF FIRST QSO mode will cause the elapsed time since your first QSO on the active band to be displayed.
DESCRIPTION=Valores: NONE o TIME OF FIRST QSO. Este parįmetro selecciona el modo para la regla de los diez minutos. El modo TIME OF FIRST QSO harį que se muestre el tiempo transcurrido desde su primer QSO en la banda activa.

[TUNE ALT-D ENABLE]
DEFAULT=FALSE
; EN: If this parameter is TRUE, then the following behaviour occurs: if you are in CQ Mode on the active radio, then as you tune the inactive radio, calls from the bandmap (if not dupes) are automatically entered so that they can be worked with the alt-D command. This saves you from having to enter the calls manually.
DESCRIPTION=Si este parįmetro es TRUE, se produce el siguiente comportamiento: si estį en modo CQ en la radio activa, a medida que sintoniza la radio inactiva, los indicativos del bandmap (si no son duplicados) se introducen automįticamente para que puedan trabajarse con el comando alt-D. Esto le evita tener que introducir los indicativos manualmente.

[TUNE WITH DITS]
DEFAULT=FALSE
; EN: If this parameter is TRUE, TR4W sends a string of dits at 75 WPM when ctrl-Left-Shift is pressed
DESCRIPTION=Si este parįmetro es TRUE, TR4W envķa una cadena de dits a 75 WPM al pulsar ctrl-Left-Shift.

[TWO RADIO MODE]
DEFAULT=FALSE
; EN: Values: TRUE or FALSE. When this parameter is TRUE, TR4W is in two radio mode.
DESCRIPTION=Valores: TRUE o FALSE. Cuando este parįmetro es TRUE, TR4W estį en modo de dos radios.

[UDP BROADCAST APP INFO]
DEFAULT=FALSE
; EN: If true, TR4W sends an XML broadcast with the application information to any programs listening. Note this is compatible with the N1MM format UDP broadcast so programs such as qsorder, ClubPi and N1MM to DXKeeper Gateway can use this function.
DESCRIPTION=Si es true, TR4W envķa un broadcast XML con la información de la aplicación a cualquier programa que esté escuchando. Esto es compatible con el broadcast UDP en formato N1MM, de modo que programas como qsorder, ClubPi y N1MM to DXKeeper Gateway pueden usar esta función.

[UDP BROADCAST CONTACT INFO]
DEFAULT=FALSE
; EN: If true, TR4W sends an XML broadcast of relevent contacting information to any programs listening. Note this is compatible with the N1MM format UDP broadcast so programs such as qsorder, ClubPi and N1MM to DXKeeper Gateway can use this function.
DESCRIPTION=Si es true, TR4W envķa un broadcast XML con la información relevante del contacto a cualquier programa que esté escuchando. Esto es compatible con el broadcast UDP en formato N1MM, de modo que programas como qsorder, ClubPi y N1MM to DXKeeper Gateway pueden usar esta función.

[UDP BROADCAST RADIO INFO]
DEFAULT=FALSE
; EN: If true, TR4W sends an XML broadcast whenever the radio changes frequency. This is compatible with the N1MM broadcast so programs such as 2Tone as well as hardware that listens for this data (such as Palstar's HF-Auto) will function.
DESCRIPTION=Si es true, TR4W envķa un broadcast XML siempre que la radio cambia de frecuencia. Esto es compatible con el broadcast de N1MM, de modo que programas como 2Tone, asķ como hardware que escucha estos datos (como el HF-Auto de Palstar), funcionarįn.

[UDP BROADCAST ROTOR]
DEFAULT=FALSE
; EN: If true, TR4W sends an XML broadcast of a request to turn a rotor controlled by an external rotor control program such as N1MM Rotator Control or PstRotator. Note this is broadcast on the Rotor Port (default=12040)
DESCRIPTION=Si es true, TR4W envķa un broadcast XML con una petición para girar un rotor controlado por un programa de control de rotor externo como N1MM Rotator Control o PstRotator. Este broadcast se realiza en el Rotor Port (por defecto=12040).

[UDP BROADCAST SCORE]
DEFAULT=FALSE
; EN: If true, TR4W sends an XML broadcast of the score to the network as defined by the UDP BROADCAST PORT SCORE. This is most often used for the WRTC score computer. Note this is broadcast on the Rotor Port (default=12060)
DESCRIPTION=Si es true, TR4W envķa un broadcast XML con la puntuación a la red segśn se define en UDP BROADCAST PORT SCORE. Esto se utiliza mįs frecuentemente para el ordenador de puntuación de WRTC. Este broadcast se realiza en el Rotor Port (por defecto=12060).

[UDP BROADCAST LOOKUP INFO]
DEFAULT=FALSE
; EN: If true, TR4W sends an XML broadcast of relevent contacting information to any programs listening. This is sent BEFORE th econtact is logged. Specifically it is sent if a call is typed in the call window and the spacebar is pressed.
DESCRIPTION=Si es true, TR4W envķa un broadcast XML con información relevante del contacto a cualquier programa que esté escuchando. Esto se envķa ANTES de que se registre el contacto. Concretamente, se envķa si se teclea un indicativo en la ventana de llamada y se pulsa la barra espaciadora.


[UDP BROADCAST PORT]
DEFAULT=12060
; EN: *** DEPRECATED *** The UDP broadcast port to which all data is sent (except the rotor information). Do not use this one any more. Use the individual ports below.
DESCRIPTION=*** OBSOLETO *** El puerto de broadcast UDP al que se envķan todos los datos (excepto la información del rotor). No utilice este. Use los puertos individuales que se indican a continuación.

[UDP BROADCAST PORT APP INFO]
DEFAULT=12060
; EN: The UDP broadcast port to which the APPINFO packet is sent.
DESCRIPTION=El puerto de broadcast UDP al que se envķa el paquete APPINFO.

[UDP BROADCAST PORT CONTACT]
DEFAULT=12060
; EN: The UDP broadcast port to which all CONTACT data is sent.
DESCRIPTION=El puerto de broadcast UDP al que se envķan todos los datos de CONTACT.

[UDP BROADCAST PORT RADIO]
DEFAULT=12060
; EN: The UDP broadcast port to which all RADIO data is sent.
DESCRIPTION=El puerto de broadcast UDP al que se envķan todos los datos de RADIO.

[UDP BROADCAST PORT SCORE]
DEFAULT=12060
; EN: The UDP broadcast port to which all SCORE data is sent.
DESCRIPTION=El puerto de broadcast UDP al que se envķan todos los datos de SCORE.

[UDP BROADCAST ROTOR PORT]
DEFAULT=12040
; EN: The UDP broadcast port to which rotor control messages are sent.
DESCRIPTION=El puerto de broadcast UDP al que se envķan los mensajes de control de rotor.

[UDP BROADCAST PORT LOOKUP]
DEFAULT=12060
; EN: The UDP broadcast port to which the LOOKUP INFO packet is sent.
DESCRIPTION=El puerto de broadcast UDP al que se envķa el paquete LOOKUP INFO.

[UDP BROADCAST ADDRESS]
DEFAULT=127.0.0.1
; EN: The IPv4 address to which UDP messages are sent. Note that using 127.0.0.1 sends the message to the local computer. If a device is listening on a different system, then the IP address with 255 in the last octet should be used. For example, if the log computer has IP address 192.168.1.10, then 192.168.1.255 would broadcast to any listening devices on the entire subnet.
DESCRIPTION=La dirección IPv4 a la que se envķan los mensajes UDP. Tenga en cuenta que usar 127.0.0.1 envķa el mensaje al ordenador local. Si un dispositivo estį escuchando en un sistema diferente, debe utilizarse la dirección IP con 255 en el śltimo octeto. Por ejemplo, si el ordenador del log tiene la dirección IP 192.168.1.10, entonces 192.168.1.255 harķa broadcast a cualquier dispositivo que esté escuchando en toda la subred.

[UDP BROADCAST ALL QSOS]
DEFAULT=FALSE
; EN: If true, contacts received from the network are also broadcast via UDP. This allows a single computer to feed all QSOs to the network. Please note that if this option is TRUE, then the other computers on the network should not also have this option OR UDP BROADCAST CONTACT INFO set lest a broadcast storm is created.
DESCRIPTION=Si es true, los contactos recibidos desde la red también se difunden vķa UDP. Esto permite que un śnico ordenador alimente todos los QSOs a la red. Tenga en cuenta que si esta opción es TRUE, entonces los demįs ordenadores de la red no deberķan tener esta opción NI UDP BROADCAST CONTACT INFO activadas, para no provocar una tormenta de broadcast.

[UNKNOWN COUNTRY FILE ENABLE]
DEFAULT=FALSE
; EN: This parameter controls the generation of the unknown country file. This file will list all the QSOs with callsigns for which TR4W cannot determine the country. This is a good way to find calls that might be new multipliers for you. By default, the file is named UNKNOWN.CTY, but you can change the name of the file with the UNKNOWN COUNTRY FILE NAME command. You can also find unknown countries after the contest using the Multiplier Check procedure in POST.
DESCRIPTION=Este parįmetro controla la generación del fichero de paķses desconocidos. Este fichero listarį todos los QSOs con indicativos para los que TR4W no pueda determinar el paķs. Es una buena forma de encontrar indicativos que podrķan ser nuevos multiplicadores para usted. Por defecto, el fichero se llama UNKNOWN.CTY, pero puede cambiar el nombre del fichero con el comando UNKNOWN COUNTRY FILE NAME. También puede encontrar paķses desconocidos tras el concurso usando el procedimiento Multiplier Check en POST.

[UNKNOWN COUNTRY FILE NAME]
DEFAULT=UNKNOWN.CTY
; EN: Values: Any valid filename. TR4W will save log entries for QSOs with unknown countries to the named file if UNKNOWN COUNTRY FILE ENABLE is TRUE.
DESCRIPTION=Valores: cualquier nombre de fichero vįlido. TR4W guardarį las entradas del log de los QSOs con paķses desconocidos en el fichero indicado si UNKNOWN COUNTRY FILE ENABLE es TRUE.

[USE CONTROL PORT]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[USE RECORDED SIGNS]
DEFAULT=FALSE
; EN:
DESCRIPTION=

[USER INFO SHOWN]
DEFAULT=NONE
; EN: The values correspond to fields in the TRMASTER database. Any one of these can be viewed in a window just below the Call Window for the station you are working. If you choose CUSTOM, your initial exchange will be built using the CUSTOM USER STRING. This allows you to choose multiple data fields and display them in any order.
DESCRIPTION=Los valores corresponden a campos de la base de datos TRMASTER. Cualquiera de ellos puede verse en una ventana justo debajo de la ventana de llamada para la estación que estį trabajando. Si elige CUSTOM, su intercambio inicial se construirį utilizando el CUSTOM USER STRING. Esto le permite elegir varios campos de datos y mostrarlos en cualquier orden.

[VHF BAND ENABLE]
DEFAULT=FALSE
; EN: When set to TRUE, TR4W will allow the selection of the VHF and UHF bands using the alt-B and alt-V keys.
DESCRIPTION=Cuando se establece a TRUE, TR4W permitirį la selección de las bandas de VHF y UHF utilizando las teclas alt-B y alt-V.

[WAIT FOR STRENGTH]
DEFAULT=TRUE
; EN: When you use the [ character in a CW message, TR4W will allow you to enter the strength of an RST report by pressing a single numeric key. If WAIT FOR STRENGTH is TRUE, the program will wait for you to enter the strength before continuing the CW message. If WAIT FOR STRENGTH is FALSE and you havent pressed a key by the time the program is ready to send the strength, it will act as if you had pressed the 9 key and proceed with the message.
DESCRIPTION=Cuando utiliza el carįcter [ en un mensaje CW, TR4W le permitirį introducir la intensidad de un informe RST pulsando una sola tecla numérica. Si WAIT FOR STRENGTH es TRUE, el programa esperarį a que introduzca la intensidad antes de continuar con el mensaje CW. Si WAIT FOR STRENGTH es FALSE y no ha pulsado una tecla cuando el programa esté listo para enviar la intensidad, actuarį como si hubiera pulsado la tecla 9 y continuarį con el mensaje.

[WAKE UP TIME OUT]
DEFAULT=0
; EN: TR4W can keep track of how many minutes have passed since your last QSO. If this number reaches a programmable limit, an alarm will sound once a minute until you work somebody. This is useful for long contests where you operate until brain death and need 20 or 30 minutes to become functional again. Since this is a dangerous time to try to set an alarm, the program will automatically start counting the minutes. The wake up time out alarm is disabled if the alarm has been set.
DESCRIPTION=TR4W puede llevar la cuenta de cuįntos minutos han pasado desde su śltimo QSO. Si este nśmero alcanza un lķmite programable, sonarį una alarma una vez por minuto hasta que trabaje a alguien. Esto resulta śtil en concursos largos en los que se opera hasta el agotamiento mental y se necesitan 20 o 30 minutos para volver a ser funcional. Dado que ese es un momento delicado para intentar programar una alarma, el programa empezarį automįticamente a contar los minutos. La alarma de wake up time out se desactiva si la alarma ha sido programada.

[WARC BAND ENABLE]
DEFAULT=FALSE
; EN: This command allows you to operate on 30, 17 and 12 metres. The default is FALSE, unless you are in General QSO mode.
DESCRIPTION=Este comando le permite operar en 30, 17 y 12 metros. El valor por defecto es FALSE, salvo que esté en modo General QSO.

[WEIGHT]
DEFAULT=1.00
; EN: Values: 0.5 to 1.5. This command controls the weight of the CW generated by the computer. For example, a value of 1.05 will add 5 percent to the duration of each dot and dash.
DESCRIPTION=Valores: 0,5 a 1,5. Este comando controla el peso del CW generado por el ordenador. Por ejemplo, un valor de 1,05 ańadirį un 5 por ciento a la duración de cada punto y raya.

[WILDCARD PARTIALS]
DEFAULT=TRUE
; EN: This command controls the working of the partial call function. When this parameter is FALSE, only calls that start with the input call will be shown. When set to TRUE (the default), the input call can appear anywhere within the partial call. This allows you to perform a partial call check with the prefix or the suffix, instead of only with the prefix. If your partial call function is working too slowly, you might try setting this flag to FALSE. This flag only affects the partial call display from the dupesheet. The super check partial display always will use wildcard partials.
DESCRIPTION=Este comando controla el funcionamiento de la función de indicativos parciales. Cuando este parįmetro es FALSE, solo se mostrarįn los indicativos que empiecen con el indicativo introducido. Cuando se establece a TRUE (el valor por defecto), el indicativo introducido puede aparecer en cualquier parte dentro del indicativo parcial. Esto le permite realizar una comprobación de indicativos parciales con el prefijo o el sufijo, en lugar de solo con el prefijo. Si su función de indicativos parciales funciona demasiado lentamente, puede intentar establecer este indicador a FALSE. Este indicador solo afecta a la visualización de indicativos parciales procedentes de la hoja de duplicados. La visualización de Super Check Partial siempre utilizarį comodines.

[WK AUTOSPACE]
DEFAULT=FALSE
; EN: If you pause for more than one dit time between a dit or dah Winkeyer2 will interpret this as a letter-space and will not send the next dit or dah until full letter-space time has been met.
DESCRIPTION=Si hace una pausa de mįs de un tiempo de dit entre un dit o dah, Winkeyer2 lo interpretarį como un espacio entre letras y no enviarį el siguiente dit o dah hasta que haya transcurrido el tiempo completo de espaciado entre letras.

[WK CT SPACING]
DEFAULT=FALSE
; EN: Winkeyer2 supports contest spacing which reduces the wordspace time by one dit. Instead of 7 dits per wordspace, WK CT SPACING=TRUE selects six dits per wordspace.
DESCRIPTION=Winkeyer2 admite espaciado de concurso (contest spacing) que reduce el tiempo de espacio entre palabras en un dit. En lugar de 7 dits por espacio entre palabras, WK CT SPACING=TRUE selecciona seis dits por espacio entre palabras.

[WK DIT DAH RATIO]
DEFAULT=50
; EN: Modifies the ratio of dit time to dah time, the standard being 1:3 (dit:dah). The formula to determine dah/dit ratio is: DAH/DIT = 3*(nn/50). A value of 50 selects 1:3, a value of 33 would select 1:2, and a value of 66 would select 1:4.
DESCRIPTION=Modifica la relación entre el tiempo de dit y el tiempo de dah, siendo el estįndar 1:3 (dit:dah). La fórmula para determinar la relación dah/dit es: DAH/DIT = 3*(nn/50). Un valor de 50 selecciona 1:3, un valor de 33 seleccionarķa 1:2 y un valor de 66 seleccionarķa 1:4.

[WK ENABLE]
DEFAULT=FALSE
; EN: Use Winkeyer instead of internal program keyer.
DESCRIPTION=Utilizar Winkeyer en lugar del manipulador interno del programa.

[WK FIRST EXTENSION]
DEFAULT=0
; EN: Value: integer in the range of (0 to 250) * 1 mSecs. Winkeyer2 addresses a problem often encountered when keying older transceivers that have a slow breakin response. Due to a slow receive to transmit changeover time, the first dit or dah of a letter sequence can be chopped and reduced in length. Adding a fixed amount to the first element of a sequence can compensate for this.
DESCRIPTION=Valor: entero en el rango (0 a 250) * 1 ms. Winkeyer2 aborda un problema que aparece a menudo al manipular transceptores antiguos con respuesta de break-in lenta. Debido a un tiempo lento de conmutación de recepción a transmisión, el primer dit o dah de una secuencia de letras puede recortarse y reducirse en longitud. Ańadir una cantidad fija al primer elemento de una secuencia puede compensar esto.

[WK IGNORE SPEED POT]
DEFAULT=TRUE
; EN: If TRUE then TR4W will ignore change of Winkeyer speed spot position.
DESCRIPTION=Si es TRUE, TR4W ignorarį los cambios en la posición del potenciómetro de velocidad de Winkeyer.

[WK KEYER COMPENSATION]
DEFAULT=0
; EN: Value: integer in the range of (0 to 250) * 1 mSecs. Keying Compensation allows a fixed amount to be added to the length of all dits and dahs. QSK keying on modern transceivers can cause shortening of the dit and dah elements which is especially noticeable at high speeds. Winkeyer2 allows the length of the dit and dah elements to be increased uniformly to compensate for this. The adjustments are made in units of one-millisecond steps. The maximum adjustment is 250 mSecs. Key compensation is very similar to Weighting in that any adjustment added to the dits and dahs is subtracted from the spacing so the speed is not changed. The difference between weighting and compensation is that compensation is independent of speed, so if 10 msec of key compensation is selected 10 msec will be always be added regardless of speed.
DESCRIPTION=Valor: entero en el rango (0 a 250) * 1 ms. La compensación de manipulación permite ańadir una cantidad fija a la longitud de todos los dits y dahs. La manipulación QSK en transceptores modernos puede provocar un acortamiento de los elementos dit y dah, especialmente notable a altas velocidades. Winkeyer2 permite incrementar uniformemente la longitud de los elementos dit y dah para compensar esto. Los ajustes se realizan en pasos de un milisegundo. El ajuste mįximo es de 250 ms. La compensación de manipulación es muy similar al Weighting en que cualquier ajuste ańadido a los dits y dahs se resta del espaciado, de modo que la velocidad no cambia. La diferencia entre weighting y compensación es que la compensación es independiente de la velocidad, por lo que si se seleccionan 10 ms de compensación, siempre se ańadirįn 10 ms con independencia de la velocidad.

[WK KEYER MODE]
DEFAULT=IAMBIC B
; EN: In iambic mode Winkeyer2 makes both dits and dahs automatically based on which paddle you press. In bug mode Winkeyer2 makes the dits and you make the dahs. You also can use bug mode to operate in straight key mode or if you want to key through Winkeyer2 with a different keyer, simply set bug mode and use the dah input to key Winkeyer2. In either iambic mode, alternating dits and dahs are sent while both paddles are held closed. In mode B an extra alternate dit or dah is sent after both paddles are released. In Ultimatic mode when both paddles are pressed the keyer will send a continuous stream of whichever paddle was last pressed.
DESCRIPTION=En modo iįmbico, Winkeyer2 hace automįticamente tanto los dits como los dahs en función de qué pala pulse. En modo bug, Winkeyer2 hace los dits y usted hace los dahs. También puede usar el modo bug para operar en modo de manipulador vertical o, si desea manipular a través de Winkeyer2 con un manipulador diferente, simplemente seleccione el modo bug y utilice la entrada de dah para manipular Winkeyer2. En cualquiera de los modos iįmbicos, se envķan dits y dahs alternados mientras ambas palas se mantienen pulsadas. En el modo B se envķa un dit o dah alterno extra tras liberar ambas palas. En modo Ultimatic, cuando se pulsan ambas palas, el manipulador enviarį un flujo continuo del sķmbolo correspondiente a la śltima pala pulsada.

[WK LEADIN TIME]
DEFAULT=0
; EN: Value: integer in the range of (0 to 250) * 10 mSecs. Time delay between when PTT is asserted and when CW keying will start.
DESCRIPTION=Valor: entero en el rango (0 a 250) * 10 ms. Retardo entre el momento en que se activa el PTT y el momento en que comienza la manipulación CW.

[WK PADDLE ONLY SIDETONE]
DEFAULT=FALSE
; EN: In WK2 you can choose to only use sidetone for paddle entry and mute it for CW sourced from the host port.
DESCRIPTION=En WK2 puede elegir usar el tono lateral śnicamente para la entrada desde el manipulador y silenciarlo para el CW procedente del puerto del host.

[WK PADDLE SWAP]
DEFAULT=FALSE
; EN: Feature for right or left handed ops.
DESCRIPTION=Función para operadores diestros o zurdos.

[WK PADDLE SWITCHPOINT]
DEFAULT=50
; EN: Value: integer in the range of 10 - 90%. This controls when Winkeyer2 will start looking for a new paddle press after sensing the current one. If there is not enough delay the keyer will send unwanted dits or dahs, if there is too much delay it bogs you down because you can't get ahead of the keyer. The default value is one dit time (50) and is adjustable in percent of a dit time. The delay is calculated with this formula: DELAY_TIME = (SWITCHPOINT*DIT_TIME)/50 where SWITCHPOINT is a value between 10 and 90.
DESCRIPTION=Valor: entero en el rango 10-90 %. Controla cuįndo Winkeyer2 empezarį a buscar una nueva pulsación de pala tras detectar la actual. Si el retardo no es suficiente, el manipulador enviarį dits o dahs no deseados; si es excesivo le ralentizarį porque no podrį adelantarse al manipulador. El valor por defecto es un tiempo de dit (50) y es ajustable como porcentaje de un tiempo de dit. El retardo se calcula con esta fórmula: DELAY_TIME = (SWITCHPOINT*DIT_TIME)/50 donde SWITCHPOINT es un valor entre 10 y 90.

[WK PORT]
DEFAULT=NONE
; EN: Serial port to which Winkeyer is connected.
DESCRIPTION=Puerto serie al que estį conectado el Winkeyer.

[WK SIDETONE FREQUENCY]
DEFAULT=800
; EN: Define one of the WK2 sidetone frequency. These frequencies are slightly different than WK1.
DESCRIPTION=Define una de las frecuencias de tono lateral de WK2. Estas frecuencias son ligeramente distintas de las de WK1.

[WK SIDETONE ENABLE]
DEFAULT=TRUE
; EN: Specifies whether Winkeyer sidetone is enabled.
DESCRIPTION=Especifica si el tono lateral del Winkeyer estį habilitado.

[WK TAIL TIME]
DEFAULT=0
; EN: Value: integer in the range of (0 to 250) * 10 mSecs. Define how long the transmitter will stay in transmit after keying has stopped.
DESCRIPTION=Valor: entero en el rango (0 a 250) * 10 ms. Define cuįnto tiempo permanecerį el transmisor en transmisión tras detenerse la manipulación.

[WK WEIGHT]
DEFAULT=50
; EN: Value: integer in the range of 10 - 90%. This command allows a proportional amount to be either added or subtracted from the length of all dits and dahs sent. A value of 50 selects no weighting adjustment. Values less than 50 reduce weighting and values greater than 50 increase weighting. Note that weighting does not affect sending speed because any increase in keyed time is subtracted from spacing time. Reduction in weighting results in a thinner sounding keying while increased weighting results in a heavier sound. Since weighting tracks speed, a given weighting will sound the same at all speeds.
DESCRIPTION=Valor: entero en el rango 10-90 %. Este comando permite ańadir o restar una cantidad proporcional a la longitud de todos los dits y dahs enviados. Un valor de 50 selecciona ningśn ajuste de weighting. Valores menores que 50 reducen el weighting y valores mayores que 50 lo aumentan. Tenga en cuenta que el weighting no afecta a la velocidad de envķo porque cualquier aumento del tiempo manipulado se resta del tiempo de espaciado. Una reducción del weighting da como resultado una manipulación de sonido mįs fino, mientras que un aumento del weighting da un sonido mįs pesado. Como el weighting se ajusta con la velocidad, un weighting dado sonarį igual a todas las velocidades.

[WINDOW SIZE]
DEFAULT=5
; EN: The relative ratio of 1 to 15, which determines the size of the main program window.
DESCRIPTION=La proporción relativa de 1 a 15 que determina el tamańo de la ventana principal del programa.

[WSJT-X BROADCAST PORT]
DEFAULT=2237
; EN: When running with an integrated WSJT-X instance, this is the UDP port on which TR4W listens for broadcasts from WSJT-X. If you change this from the default, you have to ensure the corresponding entry is changed on the WSJT-X Settings...Reporting tab under UDP Server. This will also work to accept broadcasts for the JT-Alert Last QSO API (but not at the same time as WSJT-X to avoid duplicate log entries).
DESCRIPTION=Cuando se ejecuta con una instancia integrada de WSJT-X, este es el puerto UDP en el que TR4W escucha los broadcasts de WSJT-X. Si lo cambia respecto al valor por defecto, debe asegurarse de que la entrada correspondiente se cambia en WSJT-X Settings...Reporting, en UDP Server. También sirve para aceptar broadcasts de la JT-Alert Last QSO API (pero no al mismo tiempo que WSJT-X, para evitar entradas duplicadas en el log).

[WSJT-X ENABLED]
DEFAULT=TRUE
; EN: When true, TR4W will offer the UDP server on the WSJT-X Broadcast Port. This option allows one to set this to false so TR4W does not interfere with JT-Alert or other listeners on the broadcast port. It also saves TR4W from processing commands if there is no need for it to do so.
DESCRIPTION=Cuando es true, TR4W ofrecerį el servidor UDP en el WSJT-X Broadcast Port. Esta opción permite establecerla a false para que TR4W no interfiera con JT-Alert u otros oyentes en el puerto de broadcast. También evita que TR4W procese comandos cuando no es necesario.

[WSJT-X SEND HIGHLIGHTS]
DEFAULT=TRUE
; EN: When TRUE, as CQ messages are decoded in WSJT-X, the call is highlighted in the QSOB4 or MULT colors based on the callsign's status in the TR4W log. This can be set to FALSE if a user would prefer to use the native WSJT-X colors such as when using the GENERAL LOG.
DESCRIPTION=Cuando es TRUE, a medida que los mensajes CQ se decodifican en WSJT-X, el indicativo se resalta con los colores QSOB4 o MULT en función del estado del indicativo en el log de TR4W. Puede establecerse a FALSE si un usuario prefiere usar los colores nativos de WSJT-X, por ejemplo al utilizar el GENERAL LOG.

[ZONE MULTIPLIER]
DEFAULT=NONE
; EN: This parameter tells TR4W how to handle the zone multipliers. It is normally set up by the CONTEST statement in your *.CFG file.
DESCRIPTION=Este parįmetro le indica a TR4W cómo gestionar los multiplicadores de zona. Normalmente se configura mediante la sentencia CONTEST en su fichero *.CFG.

