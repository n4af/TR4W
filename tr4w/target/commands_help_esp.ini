[RADIUS OF EARTH]
DEFAULT=0.00
; EN: Values: Any number. This parameter can be used to override the internal value of the Earths radius that is used for distance calculations. Enter the new radius in kilometers. A value of 0 causes TR4W to use the default internal value (which is 6378.1370 km3).
DESCRIPTION=Valores: cualquier nśmero. Este parįmetro puede utilizarse para sobrescribir el valor interno del radio de la Tierra utilizado para los cįlculos de distancia. Introduzca el nuevo radio en kilómetros. Un valor de 0 hace que TR4W utilice el valor interno por defecto (que es 6378,1370 km).

[RANDOM CQ MODE]
DEFAULT=FALSE
; EN: When this parameter is TRUE, the Auto-CQ function will behave differently when selecting CQ MEMORY F1. Instead of always playing the message recorded in F1, the Auto-CQ procedure will randomly pick CQs from memories F1 through F4. This allows you to sound like you are awake. Blank messages in F1 through F4 are ignored.
DESCRIPTION=Cuando este parįmetro es TRUE, la función Auto-CQ se comportarį de forma diferente al seleccionar CQ MEMORY F1. En lugar de reproducir siempre el mensaje grabado en F1, el procedimiento Auto-CQ elegirį aleatoriamente CQs de las memorias F1 a F4. Esto permite sonar como si estuviera despierto. Los mensajes en blanco en F1 a F4 se ignoran.

[RATE DISPLAY]
DEFAULT=QSOS
; EN: Values: QSOS or QSO POINTS. The rate display can show either the rate at which you are making QSOs, or the rate at which your QSO points are increasing.
DESCRIPTION=Valores: QSOS o QSO POINTS. La visualización de ritmo puede mostrar el ritmo al que estį haciendo QSOs o el ritmo al que aumentan sus puntos por QSO.

[RELAY CONTROL PORT]
DEFAULT=NONE
; EN:
DESCRIPTION=

[REMAINING MULT DISPLAY MODE]
DEFAULT=HILIGHT
; EN: Values: NONE, ERASE, HILIGHT. This command allows you to control how the remaining multiplier display function will work. If it is set to NONE, there will not be any display of remaining multipliers. If set to ERASE, the multipliers will be removed from the list as they are worked. If set to HILIGHT, multipliers that you have not worked yet will be highlighted.
DESCRIPTION=Valores: NONE, ERASE, HILIGHT. Este comando le permite controlar cómo funcionarį la visualización de multiplicadores restantes. Si se establece a NONE, no habrį visualización de multiplicadores restantes. Si se establece a ERASE, los multiplicadores se eliminarįn de la lista a medida que se trabajen. Si se establece a HILIGHT, los multiplicadores que aśn no haya trabajado se resaltarįn.

[REMINDER]
