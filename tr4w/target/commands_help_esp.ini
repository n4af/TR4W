DESCRIPTION=Valores: cualquier cadena de texto.

[RADIO ONE RECEIVER ADDRESS]
DEFAULT=0
; EN: Values: Any integer (base 10). These two commands allow you to specify the receiver address when connecting to an Icom or Ten-Tec rig. The rig will have a specific receiver address that TR4W needs to know in order to communicate with it. The number must be entered in base 10.
DESCRIPTION=Valores: cualquier entero (base 10). Estos dos comandos le permiten especificar la dirección de receptor al conectarse a una radio Icom o Ten-Tec. La radio tendrį una dirección de receptor especķfica que TR4W necesita conocer para comunicarse con ella. El nśmero debe introducirse en base 10.

[RADIO ONE SCORE]
