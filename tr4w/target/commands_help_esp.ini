; EN: This command can be used to force the score calculator to use the QSOs for only a single band. If you change the value of the SINGLE BAND SCORE parameter during a contest, you will need to delete your *.RST file before restarting TR4W.
DESCRIPTION=Este comando puede utilizarse para forzar al calculador de puntuación a usar los QSOs de una sola banda. Si cambia el valor del parįmetro SINGLE BAND SCORE durante un concurso, necesitarį eliminar su fichero *.RST antes de reiniciar TR4W.

