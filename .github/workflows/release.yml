# Place at .github/workflows/release.yml in TR4W/TR4W
#
# Triggers:
#   1. Tag push v4.X.Y       -> English-only build + ENG installer
#   2. Tag push v4.X.Y-all   -> Full ENG + 7 per-language installers
#   3. Manual (Actions UI)   -> Run workflow button, "Build all languages" checkbox
#
# Pipeline (TR4W is Windows-only; ALL jobs run on the self-hosted
# [self-hosted, win-ci] lab runner -- nothing runs on GitHub-hosted servers):
#   build (win-ci)                -> compile, NSIS, upload installer artifact
#                                    (UPX is opt-in via FullBuild.ps1's -UseUpx
#                                    switch; CI does not pass it as of 2026-05-28)
#   virustotal-scan (win-ci)      -> download installer(s), scan via VT API
#                                    (Windows PowerShell 5.1: .github/scripts/Invoke-VirusTotalScan.ps1),
#                                    produce virustotal-report.md, upload as artifact
#   release (win-ci)              -> only on tag push; download both artifacts,
#                                    create draft release with installer(s)
#                                    AND the VT report attached
#
# Single source of truth = src/Version.pas; passes /DTR4WVERSION to NSIS.
# The -all suffix on the tag is stripped before comparing to Version.pas
# (so both v4.147.17 and v4.147.17-all must match Version.pas = 4.147.17).
#
# Runner setup (one-time on self-hosted win-ci runner):
#   - Delphi 7 (DCC32.EXE) -- default C:\Program Files (x86)\Borland\Delphi7\Bin\.
#     Override per-runner by setting repo variable DELPHI7_BIN.
#   - NSIS (makensis.exe)  -- default C:\Program Files (x86)\NSIS\. Override with NSIS_BIN.
#   - Indy 10 lib          -- bundled in tr4w\include (no install needed).
#                             Override with $INDY_ROOT only if you want to point
#                             at an external Indy tree.
#   - UPX                  -- no longer required.  CI skips UPX entirely;
#                             FullBuild.ps1 makes it opt-in via -UseUpx.
#
# Secrets required:
#   - VIRUS_TOTAL_API_KEY  -- VT public API key (free tier is fine for the
#                             release cadence; rate-limited but plenty for 1-8
#                             scans per release).

name: Release Build

on:
  push:
    tags:
      - 'v4.*.*'           # matches v4.147.17 and v4.147.17-all
  workflow_dispatch:
    inputs:
      all_languages:
        description: 'Build all language installers (ENG + 7 langs). Slower (~25 min).'
        type: boolean
        default: false
      skip_virustotal:
        description: 'Skip VirusTotal scan (emergency releases only).'
        type: boolean
        default: false

concurrency:
  group: tr4w-release-${{ github.ref }}
  cancel-in-progress: false

# Needed so softprops/action-gh-release can create draft releases.
permissions:
  contents: write

env:
  # Toolchain locations. Override via repo Settings -> Variables -> Actions
  # to point at non-default installs without editing this file.
  # Indy is bundled in tr4w\include -- no external install needed; the
  # FullBuild.ps1 script defaults to the bundled tree when $env:INDY_ROOT
  # is unset.
  DELPHI7_BIN: ${{ vars.DELPHI7_BIN || 'C:\Program Files (x86)\Borland\Delphi7\Bin' }}
  NSIS_BIN:    ${{ vars.NSIS_BIN    || 'C:\Program Files (x86)\NSIS' }}
  # VirusTotal: max malicious detections before blocking the release.
  # TR4W's NSIS + UPX --lzma + bundled inpout32.dll consistently trips
  # ~7 engines on an unsigned build:
  #   - 4-5 ML black-box engines (APEX, Trapmine, Cylance, Defender Wacatac.B!ml,
  #     Xcitium MUPX.Gen) -- pure heuristic on the "unsigned + packed PE" shape
  #   - 1 generic heuristic (VBA32 BScope)
  #   - 1 true positive: DrWeb flags inpout32.dll as a known vulnerable driver
  #     (correct -- inpout32 IS a privilege-escalation primitive; TR4W ships
  #     it for legitimate LPT-port CW keying)
  # Threshold 8 = baseline 7 + 1 buffer for engine churn. Tighten after
  # code-signing is in place (signed PEs eliminate most of the ML noise).
  VT_MALICIOUS_THRESHOLD: '8'

jobs:
  build:
    name: Build TR4W installer
    runs-on: [self-hosted, win-ci]
    timeout-minutes: 60   # All-lang mode can take ~25 min on first run.

    # Exposed outputs so downstream jobs (virustotal-scan, release) don't
    # have to recompute version / mode.
    outputs:
      version: ${{ steps.ver.outputs.version }}
      mode:    ${{ steps.mode.outputs.mode }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Determine build mode
        id: mode
        shell: powershell
        run: |
          # All-languages mode is triggered by EITHER:
          #   a) A tag ending in '-all' (e.g. v4.147.17-all), OR
          #   b) workflow_dispatch with the all_languages input set to true.
          $tagAll = $false
          if ($env:GITHUB_REF -like 'refs/tags/*') {
              $tagAll = $env:GITHUB_REF -match '-all$'
          }
          $inputAll = '${{ inputs.all_languages }}' -eq 'true'
          $allLang = $tagAll -or $inputAll
          $mode = if ($allLang) { 'all_languages' } else { 'english_only' }
          Write-Host "Trigger: $env:GITHUB_EVENT_NAME | Ref: $env:GITHUB_REF | Mode: $mode"
          "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Extract version from src/Version.pas
        id: ver
        shell: powershell
        run: |
          $line = Select-String -Path "$env:GITHUB_WORKSPACE\tr4w\src\Version.pas" `
                                -Pattern "TR4W_CURRENTVERSION_NUMBER\s*=\s*'([^']+)'" `
                                | Select-Object -First 1
          if (-not $line) {
            throw "Could not extract TR4W_CURRENTVERSION_NUMBER from src/Version.pas"
          }
          $version = $line.Matches[0].Groups[1].Value
          Write-Host "Extracted version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate tag matches Version.pas
        if: github.event_name == 'push'
        shell: powershell
        run: |
          # Strip leading 'v' AND trailing '-all' so v4.147.17-all and v4.147.17 both
          # validate against the same Version.pas entry (4.147.17).
          $tag = $env:GITHUB_REF -replace '^refs/tags/v', '' -replace '-all$', ''
          $version = "${{ steps.ver.outputs.version }}"
          if ($tag -ne $version) {
            throw "Tag mismatch: refs/tags/v$tag does not match Version.pas ($version). Bump one or the other before re-tagging."
          }
          Write-Host "Tag v$tag matches Version.pas $version - OK"

      - name: Verify required tools
        shell: powershell
        run: |
          # Indy is bundled in tr4w\include; FullBuild.ps1 defaults to it.
          # UPX is opt-in in FullBuild.ps1 and CI does NOT pass -UseUpx
          # (see param doc in FullBuild.ps1).  Only Delphi + NSIS need an
          # external presence check here.
          $tools = [ordered]@{
            'DCC32 (Delphi 7)' = Join-Path $env:DELPHI7_BIN 'DCC32.EXE'
            'NSIS makensis'    = Join-Path $env:NSIS_BIN    'makensis.exe'
          }
          $missing = @()
          foreach ($k in $tools.Keys) {
            if (-not (Test-Path $tools[$k])) { $missing += "$($k): $($tools[$k]) not found" }
          }
          if ($missing.Count -gt 0) {
            throw "Missing required tools:`n$($missing -join "`n")"
          }
          Write-Host "All required tools present."

      # ---------------------------------------------------------------
      # Both english_only and all_languages go through FullBuild.ps1's
      # Invoke-Packaging chain (which does the dep check + (opt-in UPX) +
      # makensis internally). Single packaging code path = single source
      # of truth for the build, and the new Test-InstallerDependencies
      # pre-flight fires on every release.  UPX is opt-in since 2026-05-28
      # (AV false-positive cost outweighs ~1 MB exe savings); CI does not
      # pass -UseUpx.
      # ---------------------------------------------------------------
      - name: Run FullBuild.ps1 (English only + installer)
        if: steps.mode.outputs.mode == 'english_only'
        shell: powershell
        working-directory: ${{ github.workspace }}\tr4w
        run: |
          .\FullBuild.ps1 `
            -BuildInstallers `
            -ProjectRoot $env:GITHUB_WORKSPACE `
            -Delphi7Bin  $env:DELPHI7_BIN `
            -NSISBin     $env:NSIS_BIN
          if ($LASTEXITCODE -ne 0) { throw "FullBuild.ps1 failed with exit code $LASTEXITCODE" }

      - name: Run FullBuild.ps1 (all languages + installers)
        if: steps.mode.outputs.mode == 'all_languages'
        shell: powershell
        working-directory: ${{ github.workspace }}\tr4w
        run: |
          .\FullBuild.ps1 `
            -AllLanguages `
            -BuildInstallers `
            -ProjectRoot $env:GITHUB_WORKSPACE `
            -Delphi7Bin  $env:DELPHI7_BIN `
            -NSISBin     $env:NSIS_BIN
          if ($LASTEXITCODE -ne 0) { throw "FullBuild.ps1 -AllLanguages failed with exit code $LASTEXITCODE" }

      # ---------------------------------------------------------------
      # Both paths land their installer(s) under tr4w\build\release\.
      # ---------------------------------------------------------------
      - name: Locate installers
        id: artifact
        shell: powershell
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE 'tr4w\build\release'
          if (-not (Test-Path $releaseDir)) {
            throw "Release directory not found: $releaseDir"
          }
          $installers = Get-ChildItem $releaseDir -Filter 'tr4w_setup_*.exe' -File `
                      | Sort-Object Name
          if ($installers.Count -eq 0) {
            throw "No installers found in $releaseDir"
          }
          Write-Host "Found $($installers.Count) installer(s):"
          $installers | ForEach-Object { Write-Host "  - $($_.Name) ($($_.Length) bytes)" }
          "release_dir=$releaseDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "count=$($installers.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload installer artifact(s)
        uses: actions/upload-artifact@v7
        with:
          name: tr4w-installer-${{ steps.ver.outputs.version }}${{ steps.mode.outputs.mode == 'all_languages' && '-all' || '' }}
          path: ${{ steps.artifact.outputs.release_dir }}\tr4w_setup_*.exe
          retention-days: 90
          if-no-files-found: error

  # =================================================================
  # VirusTotal scan -- runs on the self-hosted win-ci runner (PowerShell 7).
  # Pulls the installer artifact from the build job, uploads each installer
  # to VT, polls for completion, builds a Markdown report, and uploads
  # it as a separate artifact for the release job to attach.
  #
  # Fails the job if any installer hits VT_MALICIOUS_THRESHOLD, which
  # in turn blocks the release job (release `needs:` this job).
  # =================================================================
  virustotal-scan:
    name: VirusTotal Scan
    needs: build
    runs-on: [self-hosted, win-ci]
    if: >-
      always()
      && needs.build.result == 'success'
      && !(github.event_name == 'workflow_dispatch' && inputs.skip_virustotal == true)

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: tr4w-installer-${{ needs.build.outputs.version }}${{ needs.build.outputs.mode == 'all_languages' && '-all' || '' }}
          path: installers

      - name: Scan installers with VirusTotal
        env:
          VT_API_KEY: ${{ secrets.VIRUS_TOTAL_API_KEY }}
        shell: powershell
        run: |
          # VT-scan under Windows PowerShell 5.1 (the runner has 5.1
          # machine-wide; the script is runtime-agnostic -- curl.exe upload,
          # no -Form -- so this CI step and FullBuild's local pre-flight share
          # one file). Logic lives in a
          # standalone, unit-tested script (run it with -SelfTest to validate
          # the parse/report logic without the API). The API key is passed via
          # the VT_API_KEY env var above, never on the command line.
          & '${{ github.workspace }}\.github\scripts\Invoke-VirusTotalScan.ps1' `
            -InstallerDir 'installers' `
            -ReportPath   'virustotal-report.md' `
            -Threshold    ([int]'${{ env.VT_MALICIOUS_THRESHOLD }}') `
            -RefName      '${{ github.ref_name }}' `
            -CommitSha    '${{ github.sha }}'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload VT report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: virustotal-report-${{ needs.build.outputs.version }}${{ needs.build.outputs.mode == 'all_languages' && '-all' || '' }}
          path: virustotal-report.md
          retention-days: 90

  # =================================================================
  # Release -- only fires on tag push. Pulls installer + VT report,
  # creates a draft GitHub Release with both attached.
  # workflow_dispatch runs intentionally don't create a release.
  # =================================================================
  release:
    name: Create draft GitHub Release
    needs: [build, virustotal-scan]
    runs-on: [self-hosted, win-ci]
    if: github.event_name == 'push'

    steps:
      # Checkout at the tag with the DEFAULT shallow fetch: actions/checkout
      # then fetches only the single triggering ref and never pulls
      # refs/heads/*. That matters on the self-hosted Windows runner
      # (case-insensitive NTFS, 'files' ref backend): two branch names that
      # differ only in case -- e.g. Issue861PLus vs Issue861Plus -- cannot
      # both be stored on disk, and a previous `fetch-depth: 0` (which fetches
      # EVERY head) aborted the entire release job on that collision
      # ("references that only differ in casing" -> the retry's --unshallow
      # then failed "on a complete repository"). The notes step only needs
      # TAGS + history for `git describe`, not branch heads, so the next step
      # fetches tags explicitly. Checked out first so its clean step does not
      # wipe the artifacts downloaded below.
      - name: Checkout source at the tag
        uses: actions/checkout@v4

      - name: Fetch tags + history for the changelog range
        shell: powershell
        run: |
          # Fetch ONLY refs/tags/* (never refs/heads/*), so a case-only
          # branch-name collision can never break the release again. A very
          # large --depth fully deepens history whether the repo is currently
          # shallow or already complete -- unlike --unshallow, which errors
          # ("does not make sense") once a prior fetch has completed the repo.
          # git describe needs the ancestry from the tag back to the previous
          # tag, and the previous tag's ref itself, both of which this provides.
          git fetch --prune --no-tags --depth=2147483647 origin "+refs/tags/*:refs/tags/*"
          if ($LASTEXITCODE -ne 0) { throw "Tag fetch failed with exit code $LASTEXITCODE" }

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: tr4w-installer-${{ needs.build.outputs.version }}${{ needs.build.outputs.mode == 'all_languages' && '-all' || '' }}
          path: release-files

      - name: Download VT report artifact
        uses: actions/download-artifact@v4
        with:
          name: virustotal-report-${{ needs.build.outputs.version }}${{ needs.build.outputs.mode == 'all_languages' && '-all' || '' }}
          path: release-files

      - name: List release files
        shell: powershell
        run: Get-ChildItem -LiteralPath release-files | Format-Table Name, Length, LastWriteTime

      # Generate the changelog body ourselves against the REAL previous
      # tag. GitHub's built-in generate_release_notes auto-detects the
      # previous tag via semver and skips '-all' tags (they parse as a
      # prerelease), which made e.g. v4.148.4 diff against v4.148.2 and
      # re-list everything already shipped in v4.148.3-all. git describe
      # walks history instead, so the '-all' suffix no longer matters.
      - name: Generate release notes (scoped to the real previous tag)
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $prev = (& git describe --tags --abbrev=0 "$tag^" 2>$null)
          if ($LASTEXITCODE -ne 0) { $prev = $null }
          $req = @{ tag_name = $tag }
          if ($prev) { Write-Host "Previous tag (git ancestry): $prev"; $req.previous_tag_name = $prev }
          else { Write-Host "No previous tag found; GitHub will auto-detect the range." }
          [System.IO.File]::WriteAllText("$PWD\notes-request.json", ($req | ConvertTo-Json -Compress), (New-Object System.Text.UTF8Encoding($false)))
          $resp = & curl.exe -sS -X POST -H "Authorization: Bearer $env:GH_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/generate-notes" -d "@notes-request.json"
          $body = ($resp | ConvertFrom-Json).body
          if (-not $body) { throw "generate-notes returned an empty body. Response: $resp" }
          [System.IO.File]::WriteAllText("$PWD\release-notes.md", $body, (New-Object System.Text.UTF8Encoding($false)))
          Write-Host "--- release notes (previous tag: $prev) ---"
          Write-Host $body

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TR4W v${{ needs.build.outputs.version }}${{ needs.build.outputs.mode == 'all_languages' && ' (all languages)' || '' }}
          # Draft = True so we can review/edit the notes and add manual
          # context (radio support, breaking changes, etc.) before
          # publishing. Promote to a final release via the GitHub UI.
          draft: true
          # Body is generated in the previous step against the real
          # previous tag (git ancestry), so the '-all' suffix no longer
          # widens the range. CHANGES.md / RELEASE_NOTES.md sections can
          # still be pasted in during the draft review.
          body_path: release-notes.md
          # Attach all installer(s) AND the VT report so users can
          # download both from the release page.
          files: |
            release-files/tr4w_setup_*.exe
            release-files/virustotal-report.md
          fail_on_unmatched_files: true
